      calendarPrev: $("#calendarPrev"),
      calendarNext: $("#calendarNext"),
      recordCount: $("#recordCount"),
      recordList: $("#recordList"),
      toast: $("#toast")
    };

    applyTheme(prefState.theme);
    hydrateCalculator();
    hydrateRecordControls();
    resetRecordForm();
    renderAll();

    els.viewButtons.forEach((button) => {
      button.addEventListener("click", () => showView(button.dataset.view));
    });

    els.modeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        calcState.mode = button.dataset.mode;
        saveCalc();
      });
    });

    els.unitButtons.forEach((button) => {
      button.addEventListener("click", () => {
        if (calcState.unit === button.dataset.unit) return;
        const previousUnit = calcState.unit;
        convertCalcUnit(button.dataset.unit);
        convertConverterUnit(previousUnit, button.dataset.unit);
        saveCalc();
      });
    });

    els.themeToggle.addEventListener("click", () => {
      const nextTheme = prefState.theme === "dark" ? "light" : "dark";
      animateThemeChange(nextTheme);
      savePrefs();
    });

    [
      els.distanceInput,
      els.hoursInput,
      els.minutesInput,
      els.secondsInput,
      els.paceMinutesInput,
      els.paceSecondsInput
    ].forEach((input) => {
      input.addEventListener("input", () => {
        calcState[inputStateKey(input)] = input.value;
        saveCalc();
      });
    });

    els.copyButton.addEventListener("click", copyResult);
    els.clearDistance.addEventListener("click", () => {
      calcState.distance = "";
      saveCalc();
      els.distanceInput.focus();
    });
    els.resetButton.addEventListener("click", () => {
      Object.assign(calcState, DEFAULT_CALC_STATE);
      hydrateCalculator();
      saveCalc();
    });
    els.useCalcButton.addEventListener("click", fillRecordFromCalculator);
    els.converterPace.addEventListener("input", updateConverterFromPace);
    els.converterSpeed.addEventListener("input", updateConverterFromSpeed);
    els.clearConverterButton.addEventListener("click", clearConverter);

    els.recordUnit.addEventListener("change", () => {
      updateRecordPace();
    });
    [els.recordDistance, els.recordDuration].forEach((input) => {
      input.addEventListener("input", updateRecordPace);
    });
    els.recordForm.addEventListener("submit", saveRecordFromForm);
    els.newRecordButton.addEventListener("click", resetRecordForm);
    els.parseTextButton.addEventListener("click", () => applyParsedText(els.ocrText.value));
    els.backupButton.addEventListener("click", exportBackup);
    els.importInput.addEventListener("change", importBackup);
    els.exportButton.addEventListener("click", exportCsv);
    els.recordSearch.addEventListener("input", () => {
      prefState.search = els.recordSearch.value;
      savePrefs();
      renderRecords();
    });
    els.recordSurfaceFilter.addEventListener("change", () => {
      prefState.surfaceFilter = els.recordSurfaceFilter.value;
      savePrefs();
      renderRecords();
    });
    els.recordRangeFilter.addEventListener("change", () => {
      prefState.rangeFilter = els.recordRangeFilter.value;
      savePrefs();
      renderRecords();
    });
    els.recordSort.addEventListener("change", () => {
      prefState.sort = els.recordSort.value;
      savePrefs();
      renderRecords();
    });
    els.calendarPrev.addEventListener("click", () => shiftCalendarMonth(-1));
    els.calendarNext.addEventListener("click", () => shiftCalendarMonth(1));

    function showView(view) {
      const next = els.views[view];
      if (!next) return;
      const currentEntry = Object.entries(els.views).find(([, section]) => !section.hidden);
      const current = currentEntry?.[1];
      els.viewButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.view === view);
      });

      if (!current || current === next || motionQuery.matches) {
        Object.entries(els.views).forEach(([key, section]) => {
          section.hidden = key !== view;
          section.classList.remove("view-enter", "view-exit");
        });
        return;
      }

      current.classList.remove("view-enter");
      current.classList.add("view-exit");
      next.hidden = false;
      next.classList.remove("view-exit");
      next.classList.add("view-enter");

      current.addEventListener("animationend", () => {
        current.hidden = true;
        current.classList.remove("view-exit");
      }, { once: true });
      next.addEventListener("animationend", () => {
        next.classList.remove("view-enter");
      }, { once: true });
    }

    function loadJson(key, fallback) {
      try {
        const parsed = JSON.parse(localStorage.getItem(key) || "null");
        return parsed == null ? structuredClone(fallback) : parsed;
      } catch {
        return structuredClone(fallback);
      }
    }

    function saveJson(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
        return true;
      } catch {
        showToast("儲存空間不足");
        return false;
      }
    }

    function saveCalc() {
      saveJson(CALC_STORAGE_KEY, calcState);
      hydrateCalculator();
      renderCalculator();
    }

    function saveRecords() {
      const saved = saveJson(RECORD_STORAGE_KEY, records);
      if (saved) {
        renderRecords();
      }
      return saved;
    }

    function savePrefs() {
      saveJson(PREF_STORAGE_KEY, prefState);
    }

    function applyTheme(theme) {
      const activeTheme = theme === "dark" ? "dark" : "light";
      prefState.theme = activeTheme;
      document.documentElement.dataset.theme = activeTheme;
      const isDark = activeTheme === "dark";
      els.themeToggle.setAttribute("aria-pressed", String(isDark));
      els.themeToggle.setAttribute("aria-label", isDark ? "淺色模式" : "深色模式");
      els.themeToggle.title = isDark ? "淺色模式" : "深色模式";
      document.querySelector('meta[name="theme-color"]')?.setAttribute("content", isDark ? "#000000" : "#F5F7FA");
    }

    function animateThemeChange(theme) {
      const nextTheme = theme === "dark" ? "dark" : "light";
      prefState.theme = nextTheme;
      if (motionQuery.matches) {
        applyTheme(nextTheme);
        return;
      }

      const wipe = document.createElement("div");
      wipe.className = "theme-wipe";
      wipe.setAttribute("aria-hidden", "true");
      const currentBg = getComputedStyle(document.documentElement).getPropertyValue("--bg").trim() || (prefState.theme === "dark" ? "#000000" : "#F5F7FA");
      wipe.style.setProperty("--wipe-color", currentBg);
      document.body.appendChild(wipe);
      wipe.getBoundingClientRect();
      applyTheme(nextTheme);
      wipe.addEventListener("animationend", () => wipe.remove(), { once: true });
      window.setTimeout(() => wipe.remove(), 700);
    }

    function hydrateRecordControls() {
      els.recordSearch.value = prefState.search || "";
      els.recordSurfaceFilter.value = prefState.surfaceFilter || "all";
      els.recordRangeFilter.value = prefState.rangeFilter || "all";
      els.recordSort.value = prefState.sort || "date-desc";
    }

    function shiftCalendarMonth(delta) {
      const date = monthDate(prefState.calendarMonth);
      date.setMonth(date.getMonth() + delta);
      prefState.calendarMonth = monthKey(date);
      pendingCalendarMotion = delta > 0 ? "next" : "prev";
      savePrefs();
      renderCalendar();
    }

    function inputStateKey(input) {
      return {
        distanceInput: "distance",
        hoursInput: "hours",
        minutesInput: "minutes",
        secondsInput: "seconds",
        paceMinutesInput: "paceMinutes",
        paceSecondsInput: "paceSeconds"
      }[input.id];
    }

    function hydrateCalculator() {
      els.distanceInput.value = calcState.distance;
      els.hoursInput.value = calcState.hours;
      els.minutesInput.value = calcState.minutes;
      els.secondsInput.value = calcState.seconds;
      els.paceMinutesInput.value = calcState.paceMinutes;
      els.paceSecondsInput.value = calcState.paceSeconds;
    }

    function renderAll() {
      renderCalculator();
      renderRecords();
    }

    function renderCalculator() {
      els.modeButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.mode === calcState.mode);
      });
      els.unitButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.unit === calcState.unit);
      });

      els.distanceField.classList.toggle("hidden", calcState.mode === "distance");
      els.timeField.classList.toggle("hidden", calcState.mode === "finish");
      els.paceField.classList.toggle("hidden", calcState.mode === "pace");
      els.distanceUnit.textContent = calcState.unit;
      els.timeLabel.textContent = "時間";
      els.paceLabel.textContent = `配速 /${calcState.unit}`;
      renderConverterLabels();

      renderPresets();

      const result = calculate();
      els.resultKicker.textContent = result.kicker;
      els.resultMain.textContent = result.main;
      els.resultUnit.textContent = result.unit;
      els.resultSub.textContent = result.sub;
      els.copyButton.disabled = !result.valid;
      els.copyButton.dataset.copy = result.copy;

      renderSplits(result.paceSeconds);
    }

    function renderPresets() {
      els.presets.innerHTML = "";
      presetDistances.forEach((preset) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = calcState.unit === "km" ? preset.labelKm : preset.labelMi;
        button.dataset.key = preset.key;
        const distance = presetValue(preset);
        button.classList.toggle("active", Math.abs(number(calcState.distance) - distance) < 0.01);
        button.addEventListener("click", () => {
          calcState.distance = formatDistanceInput(distance);
          saveCalc();
        });
        els.presets.appendChild(button);
      });
    }

    function renderSplits(paceSeconds) {
      els.splitGrid.innerHTML = "";
      presetDistances.forEach((preset) => {
        const distance = presetValue(preset);
        const split = document.createElement("div");
        split.className = "split-item";
        split.innerHTML = `
          <div class="split-distance">${calcState.unit === "km" ? preset.labelKm : preset.labelMi}</div>
          <div class="split-time">${paceSeconds > 0 ? formatDuration(distance * paceSeconds) : "--"}</div>
        `;
        els.splitGrid.appendChild(split);
      });
    }

    function calculate() {
      const distance = number(calcState.distance);
      const duration = calcTimeSeconds();
      const pace = calcPaceSeconds();
      const unitText = calcState.unit;
      const empty = {
        valid: false,
        paceSeconds: 0,
        distance,
        duration,
        main: "--",
        unit: "",
        sub: " ",
        copy: ""
      };

      if (calcState.mode === "pace") {
        if (distance <= 0 || duration <= 0) {
          return { ...empty, kicker: `每${unitName()}配速` };
        }
        const calculatedPace = duration / distance;
        return {
          valid: true,
          paceSeconds: calculatedPace,
          distance,
          duration,
          kicker: `每${unitName()}配速`,
          main: formatPace(calculatedPace),
          unit: `/${unitText}`,
          sub: `${formatDistance(distance)} ${unitText} · ${formatDuration(duration)}`,
          copy: `${formatPace(calculatedPace)} /${unitText} (${formatDistance(distance)} ${unitText}, ${formatDuration(duration)})`
        };
      }

      if (calcState.mode === "finish") {
        if (distance <= 0 || pace <= 0) {
          return { ...empty, kicker: "完賽時間" };
        }
        const finishSeconds = distance * pace;
        return {
          valid: true,
          paceSeconds: pace,
          distance,
          duration: finishSeconds,
          kicker: "完賽時間",
          main: formatDuration(finishSeconds),
          unit: "",
          sub: `${formatDistance(distance)} ${unitText} · ${formatPace(pace)} /${unitText}`,
          copy: `${formatDuration(finishSeconds)} (${formatDistance(distance)} ${unitText}, ${formatPace(pace)} /${unitText})`
        };
      }

      if (duration <= 0 || pace <= 0) {
        return { ...empty, kicker: "可跑距離" };
      }
      const possibleDistance = duration / pace;
      return {
        valid: true,
        paceSeconds: pace,
        distance: possibleDistance,
        duration,
        kicker: "可跑距離",
        main: formatDistance(possibleDistance),
        unit: unitText,
        sub: `${formatDuration(duration)} · ${formatPace(pace)} /${unitText}`,
        copy: `${formatDistance(possibleDistance)} ${unitText} (${formatDuration(duration)}, ${formatPace(pace)} /${unitText})`
      };
    }

    function presetValue(preset) {
      if (calcState.unit === "km") return preset.km;
      return preset.mi || preset.km / KM_PER_MILE;
    }

    function unitName() {
      return calcState.unit === "km" ? "公里" : "英里";
    }

    function convertCalcUnit(nextUnit) {
      const previousUnit = calcState.unit;
      calcState.unit = nextUnit;

      const distance = number(calcState.distance);
      if (distance > 0) {
        calcState.distance = formatDistanceInput(previousUnit === "km" ? distance / KM_PER_MILE : distance * KM_PER_MILE);
      }

      const pace = calcPaceSeconds();
      if (pace > 0) {
        const convertedPace = previousUnit === "km" ? pace * KM_PER_MILE : pace / KM_PER_MILE;
        setCalcPace(convertedPace);
      }
    }

    function renderConverterLabels() {
      els.converterPaceUnit.textContent = calcState.unit;
      els.converterSpeedUnit.textContent = `${calcState.unit}/h`;
    }

    function updateConverterFromPace() {
      const paceSeconds = parseTimeToSeconds(els.converterPace.value);
      if (paceSeconds > 0) {
        els.converterSpeed.value = formatSpeed(3600 / paceSeconds);
      } else if (!els.converterPace.value.trim()) {
        els.converterSpeed.value = "";
      }
    }

    function updateConverterFromSpeed() {
      const speed = number(els.converterSpeed.value);
      if (speed > 0) {
        els.converterPace.value = formatPace(3600 / speed);
      } else if (!els.converterSpeed.value.trim()) {
        els.converterPace.value = "";
      }
    }

    function convertConverterUnit(previousUnit, nextUnit) {
      if (previousUnit === nextUnit) return;

      const paceSeconds = parseTimeToSeconds(els.converterPace.value);
      if (paceSeconds > 0) {
        const convertedPace = previousUnit === "km" ? paceSeconds * KM_PER_MILE : paceSeconds / KM_PER_MILE;
        els.converterPace.value = formatPace(convertedPace);
      }

      const speed = number(els.converterSpeed.value);
      if (speed > 0) {
        const convertedSpeed = previousUnit === "km" ? speed / KM_PER_MILE : speed * KM_PER_MILE;
        els.converterSpeed.value = formatSpeed(convertedSpeed);
      } else if (paceSeconds > 0) {
        els.converterSpeed.value = formatSpeed(3600 / parseTimeToSeconds(els.converterPace.value));
      }
    }

    function clearConverter() {
      els.converterPace.value = "";
      els.converterSpeed.value = "";
      els.converterPace.focus();
    }

    function setCalcPace(totalSeconds) {
      const seconds = Math.max(0, Math.round(totalSeconds));
      calcState.paceMinutes = String(Math.floor(seconds / 60));
      calcState.paceSeconds = String(seconds % 60);
    }

    function number(value) {
      const parsed = Number.parseFloat(String(value).replace(",", "."));
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function optionalNumber(value) {
      const text = String(value ?? "").trim();
      if (!text) return "";
      const parsed = Number.parseFloat(text.replace(",", "."));
      return Number.isFinite(parsed) ? parsed : "";
    }

    function optionalInteger(value) {
      const parsed = optionalNumber(value);
      return parsed === "" ? "" : Math.max(0, Math.round(parsed));
    }

    function optionalPercent(value) {
      const parsed = optionalNumber(value);
      if (parsed === "") return "";
      return roundDecimal(Math.min(100, Math.max(0, parsed)), 2);
    }

    function roundDecimal(value, places = 2) {
      return Number(value.toFixed(places));
    }

    function calcTimeSeconds() {
      return Math.max(0, number(calcState.hours)) * 3600
        + Math.max(0, number(calcState.minutes)) * 60
        + Math.max(0, number(calcState.seconds));
    }

    function calcPaceSeconds() {
      return Math.max(0, number(calcState.paceMinutes)) * 60
        + Math.max(0, number(calcState.paceSeconds));
    }

    function formatPace(totalSeconds) {
      const seconds = Math.max(0, Math.round(totalSeconds));
      const minutes = Math.floor(seconds / 60);
      const remainder = seconds % 60;
      return `${minutes}:${String(remainder).padStart(2, "0")}`;
    }

    function formatSpeed(value) {
      if (!Number.isFinite(value) || value <= 0) return "";
      return value.toFixed(1);
    }

    function formatDuration(totalSeconds) {
      const seconds = Math.max(0, Math.round(totalSeconds));
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      const remainder = seconds % 60;

      if (hours > 0) {
        return `${hours}:${String(minutes).padStart(2, "0")}:${String(remainder).padStart(2, "0")}`;
      }
      return `${minutes}:${String(remainder).padStart(2, "0")}`;
    }

    function formatDistance(distance) {
      if (distance >= 100) return distance.toFixed(1);
      return distance.toFixed(2);
    }

    function formatDistanceInput(distance) {
      if (distance >= 100) return distance.toFixed(1);
      return distance.toFixed(2).replace(/\.00$/, "");
    }

    function parseTimeToSeconds(value) {
      const text = String(value || "").trim().replace(/[：]/g, ":");
      if (!text) return 0;

      const apostrophe = text.match(/^(\d{1,2})\s*['’′]\s*(\d{1,2})/);
      if (apostrophe) {
        return Number(apostrophe[1]) * 60 + Number(apostrophe[2]);
      }

      const parts = text.split(":").map((part) => Number(part));
      if (parts.some((part) => !Number.isFinite(part))) return 0;
      if (parts.length === 2) return parts[0] * 60 + parts[1];
      if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
      return 0;
    }

    function formatIsoDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function parseIsoDate(value) {
      const match = String(value || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!match) return null;
      return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
    }

    function monthKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    function monthDate(key) {
      const match = String(key || "").match(/^(\d{4})-(\d{2})$/);
      if (!match) {
        const today = new Date();
        return new Date(today.getFullYear(), today.getMonth(), 1);
      }
      return new Date(Number(match[1]), Number(match[2]) - 1, 1);
    }

    function startOfWeek(date) {
      const start = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      const offset = (start.getDay() + 6) % 7;
      start.setDate(start.getDate() - offset);
      return start;
    }

    function endOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate(), 23, 59, 59, 999);
    }

    function todayIso(offsetDays = 0) {
      const date = new Date();
      date.setDate(date.getDate() + offsetDays);
      return formatIsoDate(date);
    }

    async function copyResult() {
      const text = els.copyButton.dataset.copy;
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const area = document.createElement("textarea");
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
      }
      showToast("已複製");
    }

    function fillRecordFromCalculator() {
      const result = calculate();
      if (!result.valid || result.distance <= 0 || result.duration <= 0) {
        showToast("目前沒有可加入的結果");
        return;
      }

      resetRecordForm();
      els.recordDate.value = todayIso();
      els.recordTitle.value = "跑步";
      els.recordDistance.value = formatDistanceInput(result.distance);
      els.recordUnit.value = calcState.unit;
      els.recordDuration.value = formatDuration(result.duration);
      els.recordPace.value = formatPace(result.paceSeconds);
      showView("records");
      showToast("已帶入計算結果");
    }

    function resetRecordForm() {
      editingRecordId = null;
      els.recordForm.reset();
      els.recordDate.value = todayIso();
      els.recordTitle.value = "跑步";
      els.recordSurface.value = "outdoor";
      els.recordUnit.value = calcState.unit;
      els.ocrText.value = "";
      els.recordFormTitle.textContent = "新增紀錄";
      els.saveRecordButton.lastChild.textContent = " 儲存紀錄";
    }

    function updateRecordPace() {
      const distance = number(els.recordDistance.value);
      const duration = parseTimeToSeconds(els.recordDuration.value);
      if (distance > 0 && duration > 0 && !els.recordPace.value.trim()) {
        els.recordPace.value = formatPace(duration / distance);
      }
    }

    function saveRecordFromForm(event) {
      event.preventDefault();
      const distance = number(els.recordDistance.value);
      const durationSeconds = parseTimeToSeconds(els.recordDuration.value);
      const paceSeconds = parseTimeToSeconds(els.recordPace.value) || (distance > 0 ? durationSeconds / distance : 0);
      const avgHeartRate = optionalInteger(els.recordHeartRate.value);
      const maxHeartRate = optionalInteger(els.recordMaxHeartRate.value);

      if (!els.recordDate.value || distance <= 0 || durationSeconds <= 0) {
        showToast("日期、距離、時間要填");
        return;
      }

      const record = {
        id: editingRecordId || makeId(),
        date: els.recordDate.value,
        title: els.recordTitle.value.trim() || "跑步",
        surface: els.recordSurface.value,
        distance,
        unit: els.recordUnit.value,
        durationSeconds,
        averagePaceSeconds: paceSeconds,
        paceSeconds,
        kilometerPaces: els.recordKilometerPaces.value.trim(),
        calories: Math.max(0, Math.round(number(els.recordCalories.value))) || "",
        avgHeartRate,
        heartRate: avgHeartRate,
        maxHeartRate,
        cadence: optionalInteger(els.recordCadence.value),
        heartRateZones: [
          optionalPercent(els.recordZone1.value),
          optionalPercent(els.recordZone2.value),
          optionalPercent(els.recordZone3.value),
          optionalPercent(els.recordZone4.value),
          optionalPercent(els.recordZone5.value)
        ],
        weather: {
          temperature: optionalNumber(els.recordTemperature.value),
          humidity: optionalPercent(els.recordHumidity.value),
          windSpeed: optionalNumber(els.recordWindSpeed.value),
          windDirection: els.recordWindDirection.value.trim()
        },
        notes: els.recordNotes.value.trim(),
        createdAt: editingRecordId ? (records.find((item) => item.id === editingRecordId)?.createdAt || new Date().toISOString()) : new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };

      if (editingRecordId) {
        records = records.map((item) => item.id === editingRecordId ? record : item);
      } else {
        records = [record, ...records];
        pendingSummaryBonus = {
          count: 1,
          distanceKm: toKm(record.distance, record.unit)
        };
        pendingNewRecordId = record.id;
      }

      if (!saveRecords()) {
        pendingSummaryBonus = null;
        pendingNewRecordId = null;
        return;
      }
      resetRecordForm();
      showToast("已儲存紀錄");
    }

    function applyParsedText(text) {
      const parsed = parseRunText(text);
      let applied = 0;

      if (parsed.date) {
        els.recordDate.value = parsed.date;
        applied += 1;
      }
      if (parsed.title) {
        els.recordTitle.value = parsed.title;
        applied += 1;
      }
      if (parsed.distance) {
        els.recordDistance.value = formatDistanceInput(parsed.distance);
        applied += 1;
      }
      if (parsed.unit) {
        els.recordUnit.value = parsed.unit;
        applied += 1;
      }
      if (parsed.durationSeconds) {
        els.recordDuration.value = formatDuration(parsed.durationSeconds);
        applied += 1;
      }
      if (parsed.paceSeconds) {
        els.recordPace.value = formatPace(parsed.paceSeconds);
        applied += 1;
      }
      if (parsed.kilometerPaces) {
        els.recordKilometerPaces.value = parsed.kilometerPaces;
        applied += 1;
      }
      if (parsed.calories) {
        els.recordCalories.value = parsed.calories;
        applied += 1;
      }
      if (parsed.heartRate) {
        els.recordHeartRate.value = parsed.heartRate;
        applied += 1;
      }
      if (parsed.maxHeartRate) {
        els.recordMaxHeartRate.value = parsed.maxHeartRate;
        applied += 1;
      }
      if (parsed.cadence) {
        els.recordCadence.value = parsed.cadence;
        applied += 1;
      }
      if (parsed.heartRateZones.some((value) => value !== "")) {
        [els.recordZone1, els.recordZone2, els.recordZone3, els.recordZone4, els.recordZone5].forEach((input, index) => {
          if (parsed.heartRateZones[index] !== "") input.value = parsed.heartRateZones[index];
        });
        applied += 1;
      }
      if (parsed.weather.temperature !== "") {
        els.recordTemperature.value = parsed.weather.temperature;
        applied += 1;
      }
      if (parsed.weather.humidity !== "") {
        els.recordHumidity.value = parsed.weather.humidity;
        applied += 1;
      }
      if (parsed.weather.windSpeed !== "") {
        els.recordWindSpeed.value = parsed.weather.windSpeed;
        applied += 1;
      }
      if (parsed.weather.windDirection) {
        els.recordWindDirection.value = parsed.weather.windDirection;
        applied += 1;
      }

      showToast(applied ? "已填入欄位" : "沒有讀到可用欄位");
    }

    function parseRunText(rawText) {
      const text = String(rawText || "")
        .replace(/[，]/g, ".")
        .replace(/[：]/g, ":")
        .replace(/[′’]/g, "'")
        .replace(/[″”]/g, "\"");
      const lines = text.split(/\n+/).map((line) => line.trim()).filter(Boolean);
      const compact = lines.join("\n");
      const unit = /英里|\bmi\b/i.test(compact) ? "mi" : "km";
      const distance = parseDistance(lines, compact);
      const paceSeconds = parsePace(compact);
      const durationSeconds = parseDuration(compact, distance, paceSeconds);
      const title = lines.find((line) => /跑步|路跑|慢跑|晨跑|夜跑/.test(line) && line.length <= 28) || "";
      const date = parseDate(compact);
      const calories = numberNearLabel(lines, /卡路里|熱量|cal|kcal/i, 40, 3000);
      const maxHeartRate = numberNearLabel(lines, /最大心率|最高心率|最大心跳|最高心跳|max(?:imum)?\s*(?:heart\s*rate|hr|bpm)|peak\s*(?:heart\s*rate|hr|bpm)/i, 35, 240);
      const heartRate = numberNearLabel(lines, /平均心率|平均心跳|平均\s*bpm|avg(?:erage)?\s*(?:heart\s*rate|hr|bpm)|韻/i, 35, 230)
        || numberNearLabel(lines.filter((line) => !/最大|最高|max|peak/i.test(line)), /心率|心跳|bpm/i, 35, 230);
      const cadence = numberNearLabel(lines, /步頻|步數\/分|spm|cadence/i, 80, 240);
      const kilometerPaces = parseKilometerPaces(lines);
      const heartRateZones = parseZonePercentages(lines, compact);
      const weather = parseWeather(lines, compact);

      return {
        date,
        title,
        distance,
        unit,
        durationSeconds,
        paceSeconds,
        kilometerPaces,
        calories,
        heartRate,
        maxHeartRate,
        cadence,
        heartRateZones,
        weather
      };
    }

    function parseKilometerPaces(lines) {
      const splits = [];
      const markerIndex = lines.findIndex((line) => /分段|每公里|平均配速/i.test(line));
      const startIndex = markerIndex >= 0 ? markerIndex + 1 : 0;
      for (let index = startIndex; index < lines.length; index += 1) {
        const inline = lines[index].match(/^(\d+(?:\.\d+)?)\s*(?:公里|km|mi|英里|K)?\s+(\d{1,2})[:'′’](\d{2})/i);
        if (inline) {
          splits.push(`${inline[1]}K ${inline[2]}:${inline[3]}`);
          continue;
        }

        const distance = lines[index].match(/^(\d+(?:\.\d+)?)$/);
        if (!distance || /^(公里|km|英里|mi)$/i.test(lines[index + 1] || "")) continue;
        if (number(distance[1]) > 60) continue;

        const paceLine = [lines[index + 1], lines[index + 2]]
          .filter(Boolean)
          .map((line) => line.match(/(\d{1,2})[:'′’](\d{2})/))
          .find(Boolean);
        if (paceLine) {
          const label = distance[1].includes(".") ? distance[1] : `${distance[1]}K`;
          splits.push(`${label} ${paceLine[1]}:${paceLine[2]}`);
        }
      }
      return splits.join("\n");
    }

    function parseZonePercentages(lines, compact) {
      const zones = ["", "", "", "", ""];
      for (let zone = 1; zone <= 5; zone += 1) {
        const direct = compact.match(new RegExp(`(?:Z${zone}|區間\\s*${zone}|Zone\\s*${zone})[^\\d]{0,16}(\\d{1,3}(?:\\.\\d+)?)\\s*%`, "i"));
        if (direct) zones[zone - 1] = optionalPercent(direct[1]);

        for (let index = 0; index < lines.length && zones[zone - 1] === ""; index += 1) {
          if (new RegExp(`^(?:Z${zone}|區間\\s*${zone}|Zone\\s*${zone})$`, "i").test(lines[index])) {
            const neighbor = [lines[index + 1], lines[index - 1]].filter(Boolean).find((line) => /\d{1,3}(?:\.\d+)?\s*%?/.test(line));
            if (neighbor) zones[zone - 1] = optionalPercent(neighbor.match(/\d{1,3}(?:\.\d+)?/)?.[0] || "");
          }
        }
      }
      return zones;
    }

    function parseWeather(lines, compact) {
      const temperatureMatch = compact.match(/(?:氣溫|溫度|temperature|temp)[^\d-]*(-?\d+(?:\.\d+)?)\s*°?\s*C?/i)
        || compact.match(/(-?\d+(?:\.\d+)?)\s*°\s*C?/i);
      const humidityMatch = compact.match(/(?:濕度|humidity)[^\d]*(\d{1,3}(?:\.\d+)?)\s*%/i);
      const windSpeedMatch = compact.match(/(?:風速|wind)[^\d]*(\d+(?:\.\d+)?)\s*(?:m\/s|km\/h|kph|mph)?/i);
      const windDirectionMatch = compact.match(/(?:風向|wind direction)\s*[:：]?\s*(東北|東南|西北|西南|東|西|南|北|NNE|ENE|ESE|SSE|SSW|WSW|WNW|NNW|NE|SE|SW|NW|N|E|S|W)/i)
        || lines.find((line) => /^(東北|東南|西北|西南|東|西|南|北|NNE|ENE|ESE|SSE|SSW|WSW|WNW|NNW|NE|SE|SW|NW|N|E|S|W)$/i.test(line));

      return {
        temperature: temperatureMatch ? optionalNumber(temperatureMatch[1]) : "",
        humidity: humidityMatch ? optionalPercent(humidityMatch[1]) : "",
        windSpeed: windSpeedMatch ? optionalNumber(windSpeedMatch[1]) : "",
        windDirection: Array.isArray(windDirectionMatch) ? windDirectionMatch[1] : (windDirectionMatch || "")
      };
    }

    function parseDistance(lines, compact) {
      const inline = compact.match(/(\d+(?:\.\d+)?)\s*(公里|km|英里|mi)\b/i);
      if (inline) return number(inline[1]);

      for (let index = 0; index < lines.length; index += 1) {
        if (/^(公里|km|英里|mi)$/i.test(lines[index]) && index > 0) {
          const previousNumber = lines[index - 1].match(/^\d+(?:\.\d+)?$/);
          if (previousNumber) return number(previousNumber[0]);
        }
      }

      const decimalLine = lines.find((line) => /^\d{1,3}\.\d{1,3}$/.test(line));
      return decimalLine ? number(decimalLine) : 0;
    }

    function parsePace(compact) {
      const pace = compact.match(/(\d{1,2})\s*'\s*(\d{2})\s*"?/);
      if (pace) return Number(pace[1]) * 60 + Number(pace[2]);

      const labeled = compact.match(/(?:配速|平均配速|pace)[^\d]*(\d{1,2})[:](\d{2})/i);
      if (labeled) return Number(labeled[1]) * 60 + Number(labeled[2]);
      return 0;
    }

    function parseDuration(compact, distance, paceSeconds) {
      const matches = compact.match(/\b\d{1,2}:\d{2}(?::\d{2})?\b/g) || [];
      const candidates = matches
        .map((match) => ({ match, seconds: parseTimeToSeconds(match) }))
        .filter((item) => item.seconds > 0 && item.seconds <= 16 * 3600);

      if (!candidates.length) return 0;

      if (distance > 0 && paceSeconds > 0) {
        const expected = distance * paceSeconds;
        candidates.sort((a, b) => Math.abs(a.seconds - expected) - Math.abs(b.seconds - expected));
        return candidates[0].seconds;
      }

      candidates.sort((a, b) => b.seconds - a.seconds);
      return candidates[0].seconds;
    }

    function parseDate(compact) {
      if (/今天/.test(compact)) return todayIso();
      if (/昨天/.test(compact)) return todayIso(-1);

      const full = compact.match(/(20\d{2})[\/.-](\d{1,2})[\/.-](\d{1,2})/);
      if (full) {
        return `${full[1]}-${String(full[2]).padStart(2, "0")}-${String(full[3]).padStart(2, "0")}`;
      }

      const monthDay = compact.match(/(\d{1,2})[\/.-](\d{1,2})/);
      if (monthDay) {
        const year = new Date().getFullYear();
        return `${year}-${String(monthDay[1]).padStart(2, "0")}-${String(monthDay[2]).padStart(2, "0")}`;
      }
      return "";
    }

    function numberNearLabel(lines, labelPattern, min, max) {
      for (let index = 0; index < lines.length; index += 1) {
        const line = lines[index];
        const inline = line.match(new RegExp(`(\\d{1,5})\\s*(?:${labelPattern.source})`, labelPattern.flags));
        if (inline) {
          const value = Number(inline[1]);
          if (value >= min && value <= max) return value;
        }

        if (labelPattern.test(line)) {
          const neighbors = [lines[index + 1], lines[index - 1], lines[index + 2], lines[index - 2]].filter(Boolean);
          for (const neighbor of neighbors) {
            const match = neighbor.match(/-?\d{1,5}/);
            if (match) {
              const value = Number(match[0]);
              if (value >= min && value <= max) return value;
            }
          }
        }
      }
      return "";
    }

    function renderRecords() {
      renderSummary();
      renderInsights();
      renderCalendar();
      const visibleRecords = getVisibleRecords();
      renderRecordCount(visibleRecords);
      renderRecordList(visibleRecords);
    }

    function renderSummary() {
      const totalKm = records.reduce((sum, record) => sum + toKm(record.distance, record.unit), 0);
      const totalSeconds = records.reduce((sum, record) => sum + (record.durationSeconds || 0), 0);
      const avgPace = totalKm > 0 ? totalSeconds / totalKm : 0;
      const lastRun = [...records].sort((a, b) => String(b.date).localeCompare(String(a.date)))[0];
      const previous = previousSummaryMetrics;
      const items = [
        { key: "count", label: "次數", value: `${records.length}`, numeric: records.length, formatter: (value) => `${Math.round(value)}` },
        { key: "distance", label: "總距離", value: `${formatDistance(totalKm)} km`, numeric: totalKm, formatter: (value) => `${formatDistance(value)} km` },
        { key: "", label: "平均配速", value: avgPace ? `${formatPace(avgPace)} /km` : "--" },
        { key: "", label: "最近", value: lastRun ? lastRun.date.slice(5).replace("-", "/") : "--" }
      ];

      els.summaryGrid.innerHTML = "";
      items.forEach(({ key, label, value, numeric, formatter }) => {
        const item = document.createElement("div");
        item.className = "summary-item";
        item.dataset.summary = key;
        const labelNode = document.createElement("div");
        labelNode.className = "summary-label";
        labelNode.textContent = label;
        const valueNode = document.createElement("div");
        valueNode.className = "summary-value";
        valueNode.textContent = value;
        item.append(labelNode, valueNode);
        els.summaryGrid.appendChild(item);
        if (key && previous && Number.isFinite(previous[key]) && Number.isFinite(numeric) && Math.abs(previous[key] - numeric) > 0.001 && !motionQuery.matches) {
          valueNode.textContent = formatter(previous[key]);
          valueNode.classList.add("is-counting");
          requestAnimationFrame(() => animateNumber(valueNode, previous[key], numeric, formatter));
        }
      });
      previousSummaryMetrics = { count: records.length, distance: totalKm };
      flushSummaryBonus();
    }

    function animateNumber(node, from, to, formatter, duration = 420) {
      const start = performance.now();
      const tick = (now) => {
        const progress = Math.min(1, (now - start) / duration);
        const eased = 1 - Math.pow(1 - progress, 3);
        node.textContent = formatter(from + (to - from) * eased);
        if (progress < 1) {
          requestAnimationFrame(tick);
        } else {
          node.textContent = formatter(to);
          node.classList.remove("is-counting");
        }
      };
      requestAnimationFrame(tick);
    }

    function flushSummaryBonus() {
      if (!pendingSummaryBonus) return;
      const bonus = pendingSummaryBonus;
      pendingSummaryBonus = null;
      spawnSummaryBonus("count", `+${bonus.count}`);
      spawnSummaryBonus("distance", `+${formatBonusKm(bonus.distanceKm)}`);
    }

    function spawnSummaryBonus(key, text) {
      const item = els.summaryGrid.querySelector(`[data-summary="${key}"]`);
      if (!item) return;
      item.classList.remove("is-bumped");
      void item.offsetWidth;
      item.classList.add("is-bumped");
      item.addEventListener("animationend", () => item.classList.remove("is-bumped"), { once: true });
      const pop = document.createElement("span");
      pop.className = "summary-bonus";
      pop.textContent = text;
      item.appendChild(pop);
      pop.addEventListener("animationend", () => pop.remove(), { once: true });
      window.setTimeout(() => pop.remove(), 1000);
    }

    function formatBonusKm(km) {
      const value = Number(km) || 0;
      const text = value >= 10 ? value.toFixed(1) : value.toFixed(2);
      return `${text.replace(/\.00$/, "")} km`;
    }

    function renderInsights() {
      const today = new Date();
      const weekStart = startOfWeek(today);
      const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
      const yearStart = new Date(today.getFullYear(), 0, 1);
      const weekStats = statsForRange(weekStart, endOfDay(today));
      const monthStats = statsForRange(monthStart, endOfDay(today));
      const yearStats = statsForRange(yearStart, endOfDay(today));
      const averageStats = averageRunStats();

      const volumeItems = [
        { label: "本週", value: formatKm(weekStats.km), sub: volumeSub(weekStats), primary: true },
        { label: "本月", value: formatKm(monthStats.km), sub: volumeSub(monthStats), primary: true },
        { label: "本年", value: formatKm(yearStats.km), sub: volumeSub(yearStats), primary: false },
        { label: "平均單次", value: formatKm(averageStats.km), sub: averageStats.count ? `${averageStats.count} 筆平均 · ${formatDuration(averageStats.seconds)}` : "尚無紀錄", primary: false }
      ];

      els.volumeGrid.innerHTML = volumeItems.map(({ label, value, sub, primary }) => `
        <div class="insight-card${primary ? " primary" : ""}">
          <div class="insight-label">${label}</div>
          <div class="insight-value">${value}</div>
          <div class="insight-sub">${sub}</div>
        </div>
      `).join("");

      const fastest = bestRecord((record) => {
        const pace = pacePerKm(record);
        return pace > 0 ? pace : Infinity;
      }, "min");
      const longest = bestRecord((record) => toKm(record.distance || 0, record.unit), "max");
      const best5k = bestDistanceRecord(5);
      const best10k = bestDistanceRecord(10);
      const pbItems = [
        ["最快配速", fastest ? `${formatPace(pacePerKm(fastest))} /km` : "--", fastest ? `${formatRecordMeta(fastest)} · ${escapeHtml(fastest.title)}` : "尚無紀錄", fastest],
        ["最長距離", longest ? `${formatKm(toKm(longest.distance, longest.unit))}` : "--", longest ? `${formatRecordMeta(longest)} · ${escapeHtml(longest.title)}` : "尚無紀錄", longest],
        ["5K PB", best5k ? formatDuration(best5k.durationSeconds) : "--", best5k ? `${formatRecordMeta(best5k)} · ${formatPace(pacePerKm(best5k))} /km` : "距離接近 5K 才會出現", best5k],
        ["10K PB", best10k ? formatDuration(best10k.durationSeconds) : "--", best10k ? `${formatRecordMeta(best10k)} · ${formatPace(pacePerKm(best10k))} /km` : "距離接近 10K 才會出現", best10k]
      ];

      els.pbGrid.innerHTML = pbItems.map(([label, value, sub, record]) => `
        <div class="pb-card">
          <div class="pb-label">${label}${isRecentRecord(record) ? ` <span class="pb-badge">NEW</span>` : ""}</div>
          <div class="pb-value">${value}</div>
          <div class="pb-sub">${sub}</div>
        </div>
      `).join("");

      els.analysisGrid.innerHTML = renderAnalysisCards();
      bindChartTooltips();
    }

    function renderCalendar() {
      const month = monthDate(prefState.calendarMonth);
      prefState.calendarMonth = monthKey(month);
      const year = month.getFullYear();
      const monthIndex = month.getMonth();
      els.calendarLabel.textContent = `${year} 年 ${monthIndex + 1} 月`;

      const byDate = records.reduce((map, record) => {
        if (!record.date || monthKey(parseIsoDate(record.date) || new Date(0)) !== prefState.calendarMonth) return map;
        const item = map.get(record.date) || { km: 0, count: 0 };
        item.km += toKm(record.distance || 0, record.unit);
        item.count += 1;
        map.set(record.date, item);
        return map;
      }, new Map());
      const maxDayKm = Math.max(0, ...[...byDate.values()].map((item) => item.km));

      const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
      const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
      const leading = new Date(year, monthIndex, 1).getDay();
      const today = todayIso();
      const cells = weekdays.map((day) => `<div class="calendar-weekday">${day}</div>`);

      for (let index = 0; index < leading; index += 1) {
        cells.push(`<div class="calendar-day" aria-hidden="true"></div>`);
      }

      for (let day = 1; day <= daysInMonth; day += 1) {
        const date = `${year}-${String(monthIndex + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        const stats = byDate.get(date);
        const classes = ["calendar-day", stats ? "has-run" : "", date === today ? "today" : ""].filter(Boolean).join(" ");
        const attrs = stats ? ` role="button" tabindex="0" data-calendar-date="${date}" title="${date} · ${formatKm(stats.km)}"` : "";
        const style = stats ? ` style="${calendarRunStyle(stats.km, maxDayKm)}"` : "";
        cells.push(`
          <div class="${classes}"${attrs}${style}>
            <span class="date">${day}</span>
            ${stats ? `<span class="distance">${formatDistance(stats.km)}K</span>` : ""}
          </div>
        `);
      }

      els.calendarGrid.classList.remove("calendar-slide-next", "calendar-slide-prev");
      els.calendarGrid.innerHTML = cells.join("");
      if (pendingCalendarMotion && !motionQuery.matches) {
        const className = pendingCalendarMotion === "next" ? "calendar-slide-next" : "calendar-slide-prev";
        pendingCalendarMotion = "";
        void els.calendarGrid.offsetWidth;
        els.calendarGrid.classList.add(className);
        els.calendarGrid.addEventListener("animationend", () => els.calendarGrid.classList.remove(className), { once: true });
      } else {
        pendingCalendarMotion = "";
      }
      els.calendarGrid.querySelectorAll("[data-calendar-date]").forEach((day) => {
        day.addEventListener("click", () => pressCalendarDay(day, () => filterByCalendarDate(day.dataset.calendarDate)));
        day.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            pressCalendarDay(day, () => filterByCalendarDate(day.dataset.calendarDate));
          }
        });
      });
    }

    function pressCalendarDay(day, callback) {
      if (motionQuery.matches) {
        callback();
        return;
      }
      day.classList.remove("calendar-press");
      void day.offsetWidth;
      day.classList.add("calendar-press");
      window.setTimeout(callback, 130);
      day.addEventListener("animationend", () => day.classList.remove("calendar-press"), { once: true });
    }

    function renderRecordCount(visibleRecords) {
      els.recordCount.textContent = records.length ? `顯示 ${visibleRecords.length} / ${records.length} 筆` : "";
    }

    function renderRecordList(visibleRecords = getVisibleRecords()) {
      els.recordList.innerHTML = "";
      if (!records.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "還沒有紀錄";
        els.recordList.appendChild(empty);
        return;
      }
      if (!visibleRecords.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "沒有符合條件的紀錄";
        els.recordList.appendChild(empty);
        return;
      }

      visibleRecords
        .forEach((record) => {
          const card = document.createElement("article");
          card.className = "record-card no-image";
          if (record.id === pendingNewRecordId) card.classList.add("record-card-enter");
          const averagePaceSeconds = getAveragePaceSeconds(record);
          const avgHeartRate = getAverageHeartRate(record);
          const maxHeartRate = getMaxHeartRate(record);
          const detailsHtml = renderRecordDetails(record, avgHeartRate, maxHeartRate);
          const detailsButtonHtml = detailsHtml ? `
                <button type="button" class="icon-button details-toggle" data-toggle-details aria-label="額外資訊" title="額外資訊" aria-expanded="false">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
          ` : "";

          card.innerHTML = `
            <div class="record-card-head">
              <div>
                <h3 class="record-title">${escapeHtml(record.title)}</h3>
                <div class="record-meta">${formatRecordMeta(record)}</div>
              </div>
              <div class="record-card-actions">
                <button type="button" class="icon-button" data-edit="${record.id}" aria-label="編輯" title="編輯">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="m4 20 4.4-1.1L19 8.3 15.7 5 5.1 15.6 4 20Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  </svg>
                </button>
                <button type="button" class="icon-button" data-delete="${record.id}" aria-label="刪除" title="刪除">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M6 7h12M10 11v6M14 11v6M9 7l1-2h4l1 2M8 7l1 13h6l1-13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
                ${detailsButtonHtml}
              </div>
            </div>
            <div class="record-card-body">
              <div>
                <div class="record-stats">
                  <div class="record-stat"><span class="record-mini">距離</span><strong>${formatDistance(record.distance)} ${record.unit}</strong></div>
                  <div class="record-stat"><span class="record-mini">時間</span><strong>${formatDuration(record.durationSeconds)}</strong></div>
                  <div class="record-stat"><span class="record-mini">平均配速</span><strong>${formatPace(averagePaceSeconds)} /${record.unit}</strong></div>
                </div>
                ${detailsHtml ? `<div class="record-detail-panel" aria-hidden="true"><div class="record-detail-body">${detailsHtml}</div></div>` : ""}
              </div>
            </div>
          `;

          card.querySelector("[data-edit]").addEventListener("click", () => editRecord(record.id));
          card.querySelector("[data-delete]").addEventListener("click", () => deleteRecord(record.id));
          card.querySelector("[data-toggle-details]")?.addEventListener("click", (event) => {
            const panel = card.querySelector(".record-detail-panel");
            if (!panel) return;
            const isOpen = !panel.classList.contains("open");
            panel.classList.toggle("open", isOpen);
            panel.setAttribute("aria-hidden", String(!isOpen));
            event.currentTarget.classList.toggle("active", isOpen);
            event.currentTarget.setAttribute("aria-expanded", String(isOpen));
            if (isOpen) window.setTimeout(() => ensureCardVisible(card), 290);
          });
          els.recordList.appendChild(card);
        });
      pendingNewRecordId = null;
    }

    function ensureCardVisible(card) {
      const rect = card.getBoundingClientRect();
      const margin = 18;
      const overflowBottom = rect.bottom - (window.innerHeight - margin);
      if (overflowBottom > 0) {
        window.scrollBy({ top: overflowBottom, behavior: motionQuery.matches ? "auto" : "smooth" });
      }
    }

    function getVisibleRecords() {
      const query = String(prefState.search || "").trim().toLowerCase();
      const range = rangeBounds(prefState.rangeFilter);
      const visible = records.filter((record) => {
        if (prefState.surfaceFilter !== "all" && record.surface !== prefState.surfaceFilter) return false;
        if (range) {
          const date = parseIsoDate(record.date);
          if (!date || date < range.start || date > range.end) return false;
        }
        if (!query) return true;
        const haystack = [
          record.date,
          record.title,
          formatSurface(record.surface),
          formatDistance(record.distance || 0),
          record.unit,
          record.kilometerPaces,
          record.notes
        ].filter(Boolean).join(" ").toLowerCase();
        return haystack.includes(query);
      });

      return sortRecords(visible);
    }

    function sortRecords(list) {
      const sorted = [...list];
      const dateKey = (record) => `${record.date || ""} ${record.createdAt || ""}`;
      sorted.sort((a, b) => {
        if (prefState.sort === "date-asc") return dateKey(a).localeCompare(dateKey(b));
        if (prefState.sort === "distance-desc") return toKm(b.distance || 0, b.unit) - toKm(a.distance || 0, a.unit);
        if (prefState.sort === "pace-asc") {
          const paceA = pacePerKm(a) || Infinity;
          const paceB = pacePerKm(b) || Infinity;
          return paceA - paceB;
        }
        return dateKey(b).localeCompare(dateKey(a));
      });
      return sorted;
    }

    function rangeBounds(range) {
      const today = new Date();
      const end = endOfDay(today);
      if (range === "week") return { start: startOfWeek(today), end };
      if (range === "month") return { start: new Date(today.getFullYear(), today.getMonth(), 1), end };
      if (range === "year") return { start: new Date(today.getFullYear(), 0, 1), end };
      return null;
    }

    function filterByCalendarDate(date) {
      prefState.search = date;
      prefState.rangeFilter = "all";
      hydrateRecordControls();
      savePrefs();
      renderRecords();
      showToast(`${date} 的紀錄`);
    }

    function statsForRange(start, end) {
      return records.reduce((stats, record) => {
        const date = parseIsoDate(record.date);
        if (!date || date < start || date > end) return stats;
        stats.km += toKm(record.distance || 0, record.unit);
        stats.seconds += record.durationSeconds || 0;
        stats.count += 1;
        return stats;
      }, { km: 0, seconds: 0, count: 0 });
    }

    function renderAnalysisCards() {
      const month = monthDate(prefState.calendarMonth);
      const monthSeries = dailyDistanceSeries(month);
      const monthTitle = monthKey(month) === monthKey(new Date()) ? "本月跑量" : `${month.getMonth() + 1}月跑量`;
      const streak = currentStreak();

      return `
        <section class="analysis-card wide" aria-label="本月跑量趨勢">
          <div class="analysis-head">
            <div>
              <div class="analysis-title">${monthTitle}</div>
              <div class="analysis-value">${formatKm(monthSeries.total)}</div>
            </div>
            <div class="analysis-sub">${monthSeries.runDays}/${monthSeries.days}</div>
          </div>
          ${sparkline(monthSeries.points, "trend-chart")}
        </section>
        <section class="analysis-card wide streak-card" aria-label="連續跑步">
          <div class="analysis-head">
            <div>
              <div class="analysis-title">連續跑步</div>
              <div class="analysis-value">${streak.current} 天</div>
            </div>
            <div class="analysis-sub">最長 ${streak.longest} 天</div>
          </div>
          <div class="analysis-title">最近一次</div>
          <div class="metric-value">${streak.lastDate || "--"}</div>
          <div class="analysis-sub">${streak.current ? "維持中" : "等待下一跑"}</div>
        </section>
      `;
    }

    function dailyDistanceSeries(month) {
      const year = month.getFullYear();
      const monthIndex = month.getMonth();
      const days = new Date(year, monthIndex + 1, 0).getDate();
      const values = Array.from({ length: days }, () => 0);
      records.forEach((record) => {
        const date = parseIsoDate(record.date);
        if (!date || date.getFullYear() !== year || date.getMonth() !== monthIndex) return;
        values[date.getDate() - 1] += toKm(record.distance || 0, record.unit);
      });
      return {
        values,
        points: values.map((value, index) => ({
          value,
          label: `${month.getMonth() + 1}/${index + 1}`,
          detail: `${formatDistance(value)} km`,
          interactive: value > 0
        })),
        total: values.reduce((sum, value) => sum + value, 0),
        runDays: values.filter((value) => value > 0).length,
        days
      };
    }

    function currentStreak() {
      const dates = [...new Set(records.map((record) => record.date).filter(Boolean))].sort();
      if (!dates.length) return { current: 0, longest: 0, lastDate: "" };

      let longest = 1;
      let run = 1;
      for (let index = 1; index < dates.length; index += 1) {
        const previous = parseIsoDate(dates[index - 1]);
        const current = parseIsoDate(dates[index]);
        const diff = (current - previous) / 86400000;
        run = diff === 1 ? run + 1 : 1;
        longest = Math.max(longest, run);
      }

      let currentStreakDays = 1;
      for (let index = dates.length - 1; index > 0; index -= 1) {
        const current = parseIsoDate(dates[index]);
        const previous = parseIsoDate(dates[index - 1]);
        if ((current - previous) / 86400000 !== 1) break;
        currentStreakDays += 1;
      }

      const today = parseIsoDate(todayIso());
      const last = parseIsoDate(dates.at(-1));
      const daysSinceLast = Math.round((today - last) / 86400000);
      if (daysSinceLast > 1) currentStreakDays = 0;
      return { current: currentStreakDays, longest, lastDate: dates.at(-1) };
    }

    function averageRunStats() {
      if (!records.length) return { km: 0, seconds: 0, count: 0 };
      const totals = records.reduce((stats, record) => {
        stats.km += toKm(record.distance || 0, record.unit);
        stats.seconds += record.durationSeconds || 0;
        return stats;
      }, { km: 0, seconds: 0 });
      return {
        km: totals.km / records.length,
        seconds: totals.seconds / records.length,
        count: records.length
      };
    }

    function volumeSub(stats) {
      return `${stats.count} 次 · ${formatDuration(stats.seconds)}`;
    }

    function calendarRunStyle(km, maxKm) {
      const ratio = maxKm > 0 ? Math.max(0, Math.min(1, km / maxKm)) : 0;
      const strength = Math.sqrt(ratio);
      const hue = 46 - strength * 34;
      const backgroundLight = 96 - strength * 20;
      const borderLight = 82 - strength * 24;
      const textLight = 36 - strength * 10;
      return [
        `--run-bg: hsl(${hue.toFixed(1)} 96% ${backgroundLight.toFixed(1)}%)`,
        `--run-border: hsl(${hue.toFixed(1)} 92% ${borderLight.toFixed(1)}%)`,
        `--run-distance: hsl(${hue.toFixed(1)} 90% ${textLight.toFixed(1)}%)`
      ].join(";");
    }

    function sparkline(values, className) {
      const data = values.map((entry, index) => {
        if (typeof entry === "object" && entry !== null) {
          const value = Number(entry.value) || 0;
          return {
            value,
            label: entry.label || `第 ${index + 1} 點`,
            detail: entry.detail || formatDistance(value),
            interactive: Boolean(entry.interactive)
          };
        }
        const value = Number(entry) || 0;
        return { value, label: `第 ${index + 1} 點`, detail: formatDistance(value), interactive: value > 0 };
      });
      const clean = data.map((entry) => entry.value);
      if (!clean.some((value) => value > 0)) {
        return `
          <div class="chart-wrap" data-chart>
            <svg class="${className}" viewBox="0 0 220 88" preserveAspectRatio="none" aria-hidden="true"><path class="chart-axis" d="M4 78H216"/></svg>
            <div class="chart-tooltip" data-chart-tooltip hidden></div>
          </div>
        `;
      }
      const width = 220;
      const height = 88;
      const paddingX = 4;
      const paddingTop = 8;
      const paddingBottom = 10;
      const max = Math.max(...clean);
      const span = Math.max(1, max);
      const points = clean.map((value, index) => {
        const x = clean.length === 1 ? width / 2 : paddingX + (index / (clean.length - 1)) * (width - paddingX * 2);
        const y = height - paddingBottom - (value / span) * (height - paddingTop - paddingBottom);
        return [Number(x.toFixed(2)), Number(y.toFixed(2))];
      });
      const line = points.map(([x, y], index) => `${index ? "L" : "M"}${x} ${y}`).join(" ");
      const area = `${line} L${width - paddingX} ${height - paddingBottom} L${paddingX} ${height - paddingBottom} Z`;
      const lastInteractiveIndex = data.reduce((last, item, index) => item.interactive ? index : last, -1);
      const pointNodes = points.map(([x, y], index) => {
        const item = data[index];
        if (!item.interactive) return "";
        const left = (x / width) * 100;
        const top = (y / height) * 100;
        const label = escapeHtml(item.label);
        const detail = escapeHtml(item.detail);
        const pointClass = index === lastInteractiveIndex ? "chart-point last-point" : "chart-point";
        return `<circle class="${pointClass}" cx="${x}" cy="${y}" r="2.4" tabindex="0" data-left="${left.toFixed(2)}" data-top="${top.toFixed(2)}" data-label="${label}" data-detail="${detail}" aria-label="${label} ${detail}"></circle>`;
      }).join("");
      return `
        <div class="chart-wrap" data-chart>
          <svg class="${className}" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-label="跑量折線圖">
            <path class="chart-axis" d="M${paddingX} ${height - paddingBottom}H${width - paddingX}"/>
            <path class="chart-area" d="${area}"/>
            <path class="chart-line" pathLength="1" d="${line}"/>
            ${pointNodes}
          </svg>
          <div class="chart-tooltip" data-chart-tooltip hidden></div>
        </div>
      `;
    }

    function bindChartTooltips() {
      els.analysisGrid.querySelectorAll("[data-chart]").forEach((chart) => {
        const tooltip = chart.querySelector("[data-chart-tooltip]");
        const points = [...chart.querySelectorAll(".chart-point")];
        const show = (point) => {
          tooltip.innerHTML = `<strong>${point.dataset.label}</strong><span>${point.dataset.detail}</span>`;
          tooltip.style.left = `${point.dataset.left}%`;
          tooltip.style.top = `${point.dataset.top}%`;
          tooltip.hidden = false;
        };
        const hide = () => {
          tooltip.hidden = true;
          tooltip.classList.remove("pinned");
        };

        chart.querySelectorAll(".chart-point").forEach((point) => {
          point.addEventListener("pointerenter", () => show(point));
          point.addEventListener("focus", () => show(point));
          point.addEventListener("click", (event) => {
            event.stopPropagation();
            show(point);
            tooltip.classList.add("pinned");
          });
        });
        chart.querySelector("svg")?.addEventListener("click", (event) => {
          if (event.target.classList.contains("chart-point") || !points.length) return;
          const rect = event.currentTarget.getBoundingClientRect();
          const left = ((event.clientX - rect.left) / rect.width) * 100;
          const nearest = points.reduce((best, point) => {
            const distance = Math.abs(Number(point.dataset.left) - left);
            return !best || distance < best.distance ? { point, distance } : best;
          }, null)?.point;
          if (nearest) {
            show(nearest);
            tooltip.classList.add("pinned");
          }
        });
        chart.addEventListener("pointerleave", () => {
          if (!tooltip.classList.contains("pinned")) tooltip.hidden = true;
        });
        chart.addEventListener("click", (event) => {
          if (!event.target.classList.contains("chart-point")) hide();
        });
      });
    }

    function isRecentRecord(record) {
      if (!record?.date) return false;
      const date = parseIsoDate(record.date);
      if (!date) return false;
      return (endOfDay(new Date()) - date) / 86400000 <= 7;
    }

    function formatKm(km) {
      return `${km > 0 ? formatDistance(km) : "0"} km`;
    }

    function pacePerKm(record) {
      const pace = getAveragePaceSeconds(record);
      if (!pace) return 0;
      return record.unit === "mi" ? pace / KM_PER_MILE : pace;
    }

    function bestRecord(scoreFn, direction) {
      let best = null;
      let bestScore = direction === "max" ? -Infinity : Infinity;
      records.forEach((record) => {
        const score = scoreFn(record);
        if (!Number.isFinite(score)) return;
        if (direction === "max" ? score > bestScore : score < bestScore) {
          best = record;
          bestScore = score;
        }
      });
      return best;
    }

    function bestDistanceRecord(targetKm) {
      const tolerance = Math.max(0.15, targetKm * 0.03);
      return bestRecord((record) => {
        const distanceKm = toKm(record.distance || 0, record.unit);
        if (Math.abs(distanceKm - targetKm) > tolerance) return Infinity;
        return record.durationSeconds || Infinity;
      }, "min");
    }

    function toKm(distance, unit) {
      return unit === "mi" ? distance * KM_PER_MILE : distance;
    }

    function getAveragePaceSeconds(record) {
      return record.averagePaceSeconds || record.paceSeconds || 0;
    }

    function getAverageHeartRate(record) {
      return record.avgHeartRate || record.heartRate || "";
    }

    function getMaxHeartRate(record) {
      return record.maxHeartRate || record.peakHeartRate || "";
    }

    function formatSurface(surface) {
      if (surface === "indoor") return "室內";
      if (surface === "outdoor") return "室外";
      return "";
    }

    function formatRecordMeta(record) {
      const items = [record.date, formatSurface(record.surface)].filter(Boolean);
      return items.map(escapeHtml).join(" · ");
    }

    function renderRecordDetails(record, avgHeartRate, maxHeartRate) {
      const heartHtml = renderHeartDetails(avgHeartRate, maxHeartRate, record.heartRateZones);
      const metricHtml = renderDetailMetrics(record);
      const weatherHtml = renderWeatherDetails(record.weather);
      const notesHtml = record.notes ? `<div class="record-notes">${escapeHtml(record.notes)}</div>` : "";
      const body = [heartHtml, metricHtml, weatherHtml, notesHtml].filter(Boolean).join("");
      return body;
    }

    function renderDetailMetrics(record) {
      const items = [
        record.calories ? ["calories", "卡路里", `${record.calories} 卡`] : null,
        record.cadence ? ["cadence", "步頻", record.cadence] : null
      ].filter(Boolean);
      if (!items.length) return "";
      return `
        <section class="detail-metrics" aria-label="其他數據">
          ${items.map(([type, label, value]) => `
            <div class="detail-metric">
              ${detailIcon(type)}
              <span>${label}<strong>${escapeHtml(value)}</strong></span>
            </div>
          `).join("")}
        </section>
      `;
    }

    function detailIcon(type) {
      const icons = {
        calories: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M13.5 3.5c.6 2.9-.6 4.4-2 5.7-1.6 1.5-3 2.8-3 5.3a4.5 4.5 0 0 0 9 0c0-1.5-.7-2.8-1.9-4.2-.3 1.4-1.1 2.2-2.1 2.7.4-2.3-.3-4.4-2-6.2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
        cadence: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 6h.01M17 6h.01M7 18h.01M17 18h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M8 7c2.4 1.7 5.6 1.7 8 0M8 17c2.4-1.7 5.6-1.7 8 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`
      };
      return `<span class="detail-icon">${icons[type] || ""}</span>`;
    }

    function renderHeartDetails(avgHeartRate, maxHeartRate, zones) {
      const zoneValues = normalizedZones(zones);
      const hasZones = zoneValues.some((value) => value !== "" && value != null);
      const heartValues = [
        avgHeartRate ? ["平均心率", avgHeartRate, "bpm"] : null,
        maxHeartRate ? ["最大心率", maxHeartRate, "bpm"] : null
      ].filter(Boolean);
      if (!heartValues.length && !hasZones) return "";

      const valuesHtml = heartValues.length
        ? `<div class="heart-values">${heartValues.map(([label, value, unit]) => `
            <div class="heart-value">
              <span class="record-mini">${label}</span>
              <strong><span class="heart-number">${escapeHtml(value)}</span><span class="heart-unit">${escapeHtml(unit)}</span></strong>
            </div>
          `).join("")}</div>`
        : "";
      const barsHtml = hasZones ? renderZoneBars(zoneValues) : "";
      return `<section class="heart-panel" aria-label="心率">${valuesHtml}${barsHtml}</section>`;
    }

    function renderZoneBars(zones) {
      const colors = ["#4e9fca", "#42a66b", "#e1a739", "#df7646", "#cc4e5c"];
      return `
        <div class="zone-bars" aria-label="心率區間占比">
          ${zones.map((value, index) => {
            const hasValue = value !== "" && value != null;
            const percent = hasValue ? Math.min(100, Math.max(0, number(value))) : 0;
            const label = hasValue ? `${formatCompactNumber(percent)}%` : "--";
            return `
              <div class="zone-bar-item">
                <div class="zone-bar-track" aria-hidden="true">
                  <div class="zone-bar-fill" style="height: ${percent}%; background: ${colors[index]};"></div>
                </div>
                <span>Z${index + 1}</span>
                <span>${label}</span>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function normalizedZones(zones) {
      const values = Array.isArray(zones) ? zones : [];
      return [0, 1, 2, 3, 4].map((index) => values[index] ?? "");
    }

    function renderWeatherDetails(weather) {
      if (!weather) return "";
      const items = [
        weather.temperature !== "" && weather.temperature != null ? ["temperature", "氣溫", `${weather.temperature}°C`] : null,
        weather.humidity !== "" && weather.humidity != null ? ["humidity", "濕度", `${weather.humidity}%`] : null,
        weather.windSpeed !== "" && weather.windSpeed != null ? ["wind", "風速", weather.windSpeed] : null,
        weather.windDirection ? ["direction", "風向", weather.windDirection] : null
      ].filter(Boolean);
      if (!items.length) return "";
      return `
        <section class="weather-row" aria-label="天氣">
          ${items.map(([type, label, value]) => `
            <div class="weather-item">
              ${weatherIcon(type)}
              <span>${label}<strong>${escapeHtml(value)}</strong></span>
            </div>
          `).join("")}
        </section>
      `;
    }

    function weatherIcon(type) {
      const icons = {
        temperature: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M14 14.8V5a3 3 0 0 0-6 0v9.8a5 5 0 1 0 6 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M11 15V8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
        humidity: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3s6 6.2 6 11a6 6 0 0 1-12 0c0-4.8 6-11 6-11Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M9.5 14.5A2.7 2.7 0 0 0 12.2 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
        wind: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 8h10a3 3 0 1 0-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M4 13h14a3 3 0 1 1-3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M4 18h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
        direction: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3 6.5 20l5.5-3 5.5 3L12 3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>`
      };
      return `<span class="weather-icon">${icons[type] || ""}</span>`;
    }

    function formatCompactNumber(value) {
      if (!Number.isFinite(value)) return "";
      return Number(value.toFixed(2)).toString();
    }

    function editRecord(id) {
      const record = records.find((item) => item.id === id);
      if (!record) return;
      editingRecordId = id;
      els.recordFormTitle.textContent = "編輯紀錄";
      els.saveRecordButton.lastChild.textContent = " 更新紀錄";
      els.recordDate.value = record.date;
      els.recordTitle.value = record.title;
      els.recordSurface.value = record.surface || "outdoor";
      els.recordDistance.value = formatDistanceInput(record.distance);
      els.recordUnit.value = record.unit;
      els.recordDuration.value = formatDuration(record.durationSeconds);
      els.recordPace.value = formatPace(getAveragePaceSeconds(record));
      els.recordKilometerPaces.value = record.kilometerPaces || "";
      els.recordCalories.value = record.calories || "";
      els.recordHeartRate.value = getAverageHeartRate(record) || "";
      els.recordMaxHeartRate.value = getMaxHeartRate(record) || "";
      els.recordCadence.value = record.cadence || "";
      [els.recordZone1, els.recordZone2, els.recordZone3, els.recordZone4, els.recordZone5].forEach((input, index) => {
        input.value = record.heartRateZones?.[index] || "";
      });
      els.recordTemperature.value = record.weather?.temperature ?? "";
      els.recordHumidity.value = record.weather?.humidity ?? "";
      els.recordWindSpeed.value = record.weather?.windSpeed ?? "";
      els.recordWindDirection.value = record.weather?.windDirection || "";
      els.recordNotes.value = record.notes || "";
      showView("records");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteRecord(id) {
      const index = records.findIndex((item) => item.id === id);
      if (index < 0) return;
      const [removed] = records.splice(index, 1);
      pendingUndoDelete = { record: removed, index };
      if (!saveRecords()) {
        records.splice(index, 0, removed);
        pendingUndoDelete = null;
        return;
      }
      if (editingRecordId === id) resetRecordForm();
      showToast("已刪除", {
        actionLabel: "復原",
        duration: 5200,
        onAction: restoreDeletedRecord
      });
    }

    function restoreDeletedRecord() {
      if (!pendingUndoDelete) return;
      const { record, index } = pendingUndoDelete;
      pendingUndoDelete = null;
      if (records.some((item) => item.id === record.id)) return;
      const insertAt = Math.max(0, Math.min(index, records.length));
      records.splice(insertAt, 0, record);
      if (saveRecords()) showToast("已復原");
    }

    function exportBackup() {
      const payload = {
        app: "pace-run-records",
        version: 3,
        exportedAt: new Date().toISOString(),
        records
      };
      downloadText(
        `running-records-backup-${todayIso()}.json`,
        JSON.stringify(payload, null, 2),
        "application/json;charset=utf-8"
      );
      showToast("已下載備份");
    }

    async function importBackup(event) {
      const file = event.target.files?.[0];
      event.target.value = "";
      if (!file) return;

      try {
        const payload = JSON.parse(await file.text());
        const incoming = Array.isArray(payload) ? payload : payload.records;
        if (!Array.isArray(incoming)) {
          showToast("備份檔格式不對");
          return;
        }

        const merged = new Map(records.map((record) => [record.id || makeId(), record]));
        incoming.forEach((record) => {
          if (!record || typeof record !== "object") return;
          const id = record.id || makeId();
          merged.set(id, { ...record, id });
        });
        records = [...merged.values()];
        saveRecords();
        showToast(`已匯入 ${incoming.length} 筆`);
      } catch {
        showToast("匯入失敗");
      }
    }

    function exportCsv() {
      if (!records.length) {
        showToast("沒有紀錄可匯出");
        return;
      }
      const header = ["日期", "名稱", "室內/室外", "距離", "單位", "時間", "平均配速", "每公里配速", "卡路里", "平均心率", "最大心率", "步頻", "Z1%", "Z2%", "Z3%", "Z4%", "Z5%", "氣溫", "濕度", "風速", "風向", "備註"];
      const rows = records.map((record) => [
        record.date,
        record.title,
        formatSurface(record.surface),
        formatDistance(record.distance),
        record.unit,
        formatDuration(record.durationSeconds),
        formatPace(getAveragePaceSeconds(record)),
        record.kilometerPaces || "",
        record.calories || "",
        getAverageHeartRate(record) || "",
        getMaxHeartRate(record) || "",
        record.cadence || "",
        ...normalizedZones(record.heartRateZones),
        record.weather?.temperature ?? "",
        record.weather?.humidity ?? "",
        record.weather?.windSpeed ?? "",
        record.weather?.windDirection || "",
        record.notes || ""
      ]);
      const csv = [header, ...rows]
        .map((row) => row.map((cell) => `"${String(cell).replaceAll('"', '""')}"`).join(","))
        .join("\n");
      downloadText(`running-records-${todayIso()}.csv`, `\ufeff${csv}`, "text/csv;charset=utf-8");
      showToast("已匯出 CSV");
    }

    function downloadText(filename, text, type) {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function makeId() {
      if (window.crypto?.randomUUID) return window.crypto.randomUUID();
      return `run-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function showToast(message, options = {}) {
      const { actionLabel = "", onAction = null, duration = actionLabel ? 5200 : 1300 } = options;
      els.toast.replaceChildren();
      const text = document.createElement("span");
      text.className = "toast-message";
      text.textContent = message;
      els.toast.appendChild(text);

      if (actionLabel && typeof onAction === "function") {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "toast-action";
        button.textContent = actionLabel;
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          window.clearTimeout(showToast.timer);
          els.toast.classList.remove("show");
          onAction();
        });
        els.toast.appendChild(button);
      }

      els.toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        els.toast.classList.remove("show");
      }, duration);
    }
  </script>
</body>
</html>
