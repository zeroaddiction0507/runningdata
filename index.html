        category.nextLabel = nextAchievementLabel(category);
      });
      const total = categories.reduce((sum, category) => sum + category.total, 0);
      const unlocked = categories.reduce((sum, category) => sum + category.unlocked, 0);
      return { categories, total, unlocked };
    }

    function achievementCategory(id, name, icon, items) {
      return {
        id,
        name,
        icon,
        items: items.map((item) => ({ ...item, categoryId: id }))
      };
    }

    function nextAchievementLabel(category) {
      const next = category.items.find((item) => !item.unlocked);
      if (next && category.id === "hidden") return "下一個：隱藏成就";
      return next ? `下一個：${next.title}` : "本類完成";
    }

    function kmAchievement(id, title, description, target, current, achievedAt = "") {
      const value = Math.max(0, Number(current) || 0);
      const progress = Math.min(1, value / target);
      return {
        id,
        title,
        description,
        icon: "◇",
        unlocked: value >= target,
        progress,
        progressText: `${formatAchievementKm(Math.min(value, target))} / ${formatAchievementKm(target)} km`,
        achievedAt
      };
    }

    function totalLevelDefinitions() {
      return [
        { id: "level-1", title: "Lv.1 火花起跑", description: "累積里程 0-50 km", start: 0, end: 50, color: "#FACC15" },
        { id: "level-2", title: "Lv.2 黃焰熱身", description: "累積里程 50-250 km", start: 50, end: 250, color: "#F59E0B" },
        { id: "level-3", title: "Lv.3 橘焰推進", description: "累積里程 250-1000 km", start: 250, end: 1000, color: "#F97316" },
        { id: "level-4", title: "Lv.4 烈焰巡航", description: "累積里程 1000-2500 km", start: 1000, end: 2500, color: "#FB6B21" },
        { id: "level-5", title: "Lv.5 赤焰長征", description: "累積里程 2500-5000 km", start: 2500, end: 5000, color: "#EF4444" },
        { id: "level-6", title: "Lv.6 熔岩耐力", description: "累積里程 5000-15000 km", start: 5000, end: 15000, color: "#DC2626" },
        { id: "level-7", title: "Lv.7 紅線遠征", description: "累積里程 15000-50000 km", start: 15000, end: 50000, color: "#B91C1C" },
        { id: "level-8", title: "Lv.8 太陽核心", description: "累積里程 50000 km 以上", start: 50000, end: null, color: "#7F1D1D" }
      ];
    }

    function currentTotalLevel(totalKm) {
      const value = Math.max(0, Number(totalKm) || 0);
      return totalLevelDefinitions().find((level) => value >= level.start && (level.end == null || value < level.end))
        || totalLevelDefinitions().at(-1);
    }

    function totalLevelProgress(totalKm, level) {
      const value = Math.max(0, Number(totalKm) || 0);
      if (!level?.end) return 1;
      return Math.min(1, Math.max(0, (value - level.start) / (level.end - level.start)));
    }

    function levelAchievement(id, title, description, start, end, current, achievedAt = "", color = "") {
      const value = Math.max(0, Number(current) || 0);
      const target = start || end || 1;
      const unlocked = start === 0 ? value > 0 : value >= start;
      const progress = end
        ? Math.min(1, Math.max(0, value - start) / (end - start))
        : Math.min(1, value / start);
      const currentInRange = end
        ? Math.min(Math.max(value, start), end)
        : value;
      const progressText = !unlocked && start > 0
        ? `${formatAchievementKm(Math.min(value, start))} / ${formatAchievementKm(start)} km`
        : end
          ? `${formatAchievementKm(currentInRange)} / ${formatAchievementKm(end)} km`
          : `${formatAchievementKm(value)} km+`;
      return {
        id,
        title,
        description,
        icon: "◇",
        unlocked,
        progress: unlocked ? progress : Math.min(1, value / target),
        progressText,
        achievedAt: unlocked ? achievedAt : "",
        color
      };
    }

    function countAchievement(id, title, description, target, current, unit = "次", achievedAt = "") {
      const value = Math.max(0, Number(current) || 0);
      return {
        id,
        title,
        description,
        icon: "◇",
        unlocked: value >= target,
        progress: Math.min(1, value / target),
        progressText: `${Math.min(value, target)} / ${target} ${unit}`,
        achievedAt
      };
    }

    function paceAchievement(id, title, targetSeconds, fastestSeconds, achievedAt = "") {
      const hasPace = Number.isFinite(fastestSeconds) && fastestSeconds > 0;
      const unlocked = hasPace && fastestSeconds <= targetSeconds;
      const progress = hasPace ? Math.min(1, targetSeconds / fastestSeconds) : 0;
      return {
        id,
        title,
        description: `平均配速達到 ${formatPace(targetSeconds)} /km`,
        icon: "◇",
        unlocked,
        progress,
        progressText: hasPace ? `最佳 ${formatPace(fastestSeconds)} /km` : `目標 ${formatPace(targetSeconds)} /km`,
        achievedAt
      };
    }

    function durationAchievement(id, title, targetSeconds, longestSeconds, achievedAt = "") {
      const current = Math.max(0, Number(longestSeconds) || 0);
      return {
        id,
        title,
        description: `單次跑步時間達到 ${formatDuration(targetSeconds)}`,
        icon: "◇",
        unlocked: current >= targetSeconds,
        progress: Math.min(1, current / targetSeconds),
        progressText: `${formatDuration(Math.min(current, targetSeconds))} / ${formatDuration(targetSeconds)}`,
        achievedAt
      };
    }

    function recordAchievement(id, title, description, record, progressText) {
      return {
        id,
        title,
        description,
        icon: "◇",
        unlocked: Boolean(record),
        progress: record ? 1 : 0,
        progressText,
        achievedAt: record?.date || ""
      };
    }

    function hiddenAchievementItems(source) {
      return [
        hiddenRecordAchievement(
          "hidden-cold-run",
          "寒鋒跑者",
          "單次跑步氣溫低於 10°C",
          "不想跑的天氣，更要出門",
          source,
          (record) => numericOptional(record.weather?.temperature) < 10,
          (record) => `氣溫 ${record.weather?.temperature}°C`
        ),
        hiddenRecordAchievement(
          "hidden-wind-run",
          "逆風破陣",
          "單次跑步風速大於 50",
          "阻力越大，越適合正面穿過",
          source,
          (record) => numericOptional(record.weather?.windSpeed) > 50,
          (record) => `風速 ${record.weather?.windSpeed}`
        ),
        hiddenRecordAchievement(
          "hidden-max-hr",
          "紅線心跳",
          "單次跑步最大心率超過 190 bpm",
          "偶爾聽見引擎逼近極限",
          source,
          (record) => numericOptional(getMaxHeartRate(record)) > 190,
          (record) => `最大心率 ${getMaxHeartRate(record)} bpm`
        ),
        hiddenRecordAchievement(
          "hidden-zone-two",
          "靜流巡航",
          "單次跑步心率 Z2 占比超過 70%",
          "把節奏壓住，讓時間自己堆起來",
          source,
          (record) => numericOptional(record.heartRateZones?.[1]) > 70,
          (record) => `Z2 ${record.heartRateZones?.[1]}%`
        )
      ];
    }

    function hiddenRecordAchievement(id, title, description, hint, source, predicate, progressTextForRecord) {
      const record = firstRecordMatching(source, predicate);
      const item = fixedAchievement(
        id,
        title,
        description,
        Boolean(record),
        record ? 1 : 0,
        record ? progressTextForRecord(record) : "隱藏條件",
        record?.date || ""
      );
      item.icon = "?";
      item.color = "#7F1D1D";
      item.hint = hint;
      return item;
    }

    function firstRecordMatching(source, predicate) {
      return chronologicalRecords(source).find((record) => {
        try {
          return predicate(record);
        } catch {
          return false;
        }
      }) || null;
    }

    function numericOptional(value) {
      if (value === "" || value == null) return NaN;
      const numeric = Number(value);
      return Number.isFinite(numeric) ? numeric : NaN;
    }

    function latestAchievementDate(items) {
      return items
        .map((item) => item.achievedAt)
        .filter(Boolean)
        .sort()
        .at(-1) || "";
    }

    function formatAchievementKm(value) {
      const numeric = Number(value) || 0;
      if (Number.isInteger(numeric)) return String(numeric);
      return formatDistance(numeric).replace(/\.00$/, "").replace(/\.0$/, "");
    }

    function formatAchievementDate(value) {
      const date = parseIsoDate(value);
      return date ? `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, "0")}/${String(date.getDate()).padStart(2, "0")}` : String(value || "");
    }

    function fixedAchievement(id, title, description, unlocked, progress, progressText, achievedAt = "") {
      return {
        id,
        title,
        description,
        icon: "◇",
        unlocked,
        progress: Math.min(1, Math.max(0, progress)),
        progressText,
        achievedAt
      };
    }

    function achievementMetrics(source = records) {
      const today = new Date();
      const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
      const yearStart = new Date(today.getFullYear(), 0, 1);
      const todayEnd = endOfDay(today);
      const monthStats = statsForRecordList(source, monthStart, todayEnd);
      const yearStats = statsForRecordList(source, yearStart, todayEnd);
      const distances = source.map((record) => toKm(record.distance || 0, record.unit));
      const paces = source.map(pacePerKm).filter((pace) => pace > 0);
      const streak = streakForRecords(source);
      const sorted = chronologicalRecords(source);
      const fastestRecord = bestRecordFromSource(source, (record) => {
        const pace = pacePerKm(record);
        return pace > 0 ? pace : Infinity;
      }, "min");
      const longestDistanceRecord = bestRecordFromSource(source, (record) => toKm(record.distance || 0, record.unit), "max");
      const longestDurationRecord = bestRecordFromSource(source, (record) => record.durationSeconds || 0, "max");
      return {
        count: source.length,
        totalKm: distances.reduce((sum, value) => sum + value, 0),
        maxDistanceKm: Math.max(0, ...distances),
        fastestPace: paces.length ? Math.min(...paces) : 0,
        longestDuration: Math.max(0, ...source.map((record) => record.durationSeconds || 0)),
        longestStreak: streak.longest,
        monthKm: monthStats.km,
        yearKm: yearStats.km,
        monthStart,
        yearStart,
        todayEnd,
        firstRecordDate: sorted[0]?.date || "",
        fastestRecord,
        longestDistanceRecord,
        longestDurationRecord
      };
    }

    function chronologicalRecords(source = records) {
      return [...source]
        .map((record, index) => ({ record, index, date: parseIsoDate(record.date) }))
        .filter((entry) => entry.date)
        .sort((a, b) => a.date - b.date || a.index - b.index)
        .map((entry) => entry.record);
    }

    function firstSingleDistanceDate(source, targetKm) {
      return chronologicalRecords(source).find((record) => toKm(record.distance || 0, record.unit) >= targetKm)?.date || "";
    }

    function cumulativeDistanceDate(source, targetKm, start = null, end = null) {
      let total = 0;
      for (const record of chronologicalRecords(source)) {
        const date = parseIsoDate(record.date);
        if (!date || (start && date < start) || (end && date > end)) continue;
        total += toKm(record.distance || 0, record.unit);
        if (total >= targetKm) return record.date;
      }
      return "";
    }

    function nthRecordDate(source, target) {
      return chronologicalRecords(source)[target - 1]?.date || "";
    }

    function firstPaceDate(source, targetSeconds) {
      return chronologicalRecords(source).find((record) => {
        const pace = pacePerKm(record);
        return pace > 0 && pace <= targetSeconds;
      })?.date || "";
    }

    function firstDurationDate(source, targetSeconds) {
      return chronologicalRecords(source).find((record) => (record.durationSeconds || 0) >= targetSeconds)?.date || "";
    }

    function streakAchievementDate(source, target) {
      const dates = [...new Set(source.map((record) => record.date).filter(Boolean))].sort();
      let run = 0;
      let previous = null;
      for (const value of dates) {
        const current = parseIsoDate(value);
        if (!current) continue;
        run = previous && (current - previous) / 86400000 === 1 ? run + 1 : 1;
        if (run >= target) return value;
        previous = current;
      }
      return "";
    }

    function bestRecordFromSource(source, scoreFn, direction) {
      let best = null;
      let bestScore = direction === "max" ? -Infinity : Infinity;
      source.forEach((record) => {
        const score = scoreFn(record);
        if (!Number.isFinite(score)) return;
        if (direction === "max" ? score > bestScore : score < bestScore) {
          best = record;
          bestScore = score;
        }
      });
      return best;
    }

    function statsForRecordList(source, start, end) {
      return source.reduce((stats, record) => {
        const date = parseIsoDate(record.date);
        if (!date || date < start || date > end) return stats;
        stats.km += toKm(record.distance || 0, record.unit);
        stats.seconds += record.durationSeconds || 0;
        stats.count += 1;
        return stats;
      }, { km: 0, seconds: 0, count: 0 });
    }

    function streakForRecords(source) {
      const dates = [...new Set(source.map((record) => record.date).filter(Boolean))].sort();
      if (!dates.length) return { current: 0, longest: 0, lastDate: "" };

      let longest = 1;
      let run = 1;
      for (let index = 1; index < dates.length; index += 1) {
        const previous = parseIsoDate(dates[index - 1]);
        const current = parseIsoDate(dates[index]);
        const diff = (current - previous) / 86400000;
        run = diff === 1 ? run + 1 : 1;
        longest = Math.max(longest, run);
      }

      let currentStreakDays = 1;
      for (let index = dates.length - 1; index > 0; index -= 1) {
        const current = parseIsoDate(dates[index]);
        const previous = parseIsoDate(dates[index - 1]);
        if ((current - previous) / 86400000 !== 1) break;
        currentStreakDays += 1;
      }

      const today = parseIsoDate(todayIso());
      const last = parseIsoDate(dates.at(-1));
      const daysSinceLast = Math.round((today - last) / 86400000);
      if (daysSinceLast > 1) currentStreakDays = 0;
      return { current: currentStreakDays, longest, lastDate: dates.at(-1) };
    }

    function unlockedAchievementIds(source = records) {
      return new Set(flatAchievements(source).filter((item) => item.unlocked).map((item) => item.id));
    }

    function newlyUnlockedAchievements(previousIds, source = records) {
      return flatAchievements(source).filter((item) => item.unlocked && !previousIds.has(item.id));
    }

    function flatAchievements(source = records) {
      return buildAchievementState(source).categories.flatMap((category) => category.items);
    }

    function showAchievementToast(unlocks) {
      const first = unlocks[0];
      const suffix = unlocks.length > 1 ? `，另有 ${unlocks.length - 1} 個` : "";
      pendingAchievementUnlocks = unlocks;
      showToast(`新成就：${first.title}${suffix}`, {
        actionLabel: "查看",
        duration: 6800,
        onAction: () => {
          showView("records");
          setDashboardPanel("achievements", true);
          activeAchievementCategory = first.categoryId;
          renderAchievements();
          els.achievementsPanel.scrollIntoView({ behavior: motionQuery.matches ? "auto" : "smooth", block: "start" });
        }
      });
    }

    function renderCalendar() {
      const month = monthDate(prefState.calendarMonth);
      prefState.calendarMonth = monthKey(month);
      const year = month.getFullYear();
      const monthIndex = month.getMonth();
      els.calendarLabel.textContent = `${year} 年 ${monthIndex + 1} 月`;

      const byDate = records.reduce((map, record) => {
        if (!record.date || monthKey(parseIsoDate(record.date) || new Date(0)) !== prefState.calendarMonth) return map;
        const item = map.get(record.date) || { km: 0, count: 0 };
        item.km += toKm(record.distance || 0, record.unit);
        item.count += 1;
        map.set(record.date, item);
        return map;
      }, new Map());
      const maxDayKm = Math.max(0, ...[...byDate.values()].map((item) => item.km));

      const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
      const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
      const leading = new Date(year, monthIndex, 1).getDay();
      const today = todayIso();
      const cells = weekdays.map((day) => `<div class="calendar-weekday">${day}</div>`);

      for (let index = 0; index < leading; index += 1) {
        cells.push(`<div class="calendar-day" aria-hidden="true"></div>`);
      }

      for (let day = 1; day <= daysInMonth; day += 1) {
        const date = `${year}-${String(monthIndex + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
        const stats = byDate.get(date);
        const classes = ["calendar-day", stats ? "has-run" : "", date === today ? "today" : ""].filter(Boolean).join(" ");
        const attrs = stats ? ` role="button" tabindex="0" data-calendar-date="${date}" title="${date} · ${formatKm(stats.km)}"` : "";
        const style = stats ? ` style="${calendarRunStyle(stats.km, maxDayKm)}"` : "";
        cells.push(`
          <div class="${classes}"${attrs}${style}>
            <span class="date">${day}</span>
            ${stats ? `<span class="distance">${formatDistance(stats.km)}K</span>` : ""}
          </div>
        `);
      }

      els.calendarGrid.classList.remove("calendar-slide-next", "calendar-slide-prev");
      els.calendarGrid.innerHTML = cells.join("");
      if (pendingCalendarMotion && !motionQuery.matches) {
        const className = pendingCalendarMotion === "next" ? "calendar-slide-next" : "calendar-slide-prev";
        pendingCalendarMotion = "";
        void els.calendarGrid.offsetWidth;
        els.calendarGrid.classList.add(className);
        els.calendarGrid.addEventListener("animationend", () => els.calendarGrid.classList.remove(className), { once: true });
      } else {
        pendingCalendarMotion = "";
      }
      els.calendarGrid.querySelectorAll("[data-calendar-date]").forEach((day) => {
        day.addEventListener("click", () => pressCalendarDay(day, () => filterByCalendarDate(day.dataset.calendarDate)));
        day.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            pressCalendarDay(day, () => filterByCalendarDate(day.dataset.calendarDate));
          }
        });
      });
    }

    function pressCalendarDay(day, callback) {
      if (motionQuery.matches) {
        callback();
        return;
      }
      day.classList.remove("calendar-press");
      void day.offsetWidth;
      day.classList.add("calendar-press");
      window.setTimeout(callback, 130);
      day.addEventListener("animationend", () => day.classList.remove("calendar-press"), { once: true });
    }

    function recordLimitValue() {
      return ["10", "30", "50", "all"].includes(prefState.recordLimit) ? prefState.recordLimit : "10";
    }

    function limitVisibleRecords(visibleRecords) {
      const limit = recordLimitValue();
      if (limit === "all") return visibleRecords;
      return visibleRecords.slice(0, Number(limit));
    }

    function renderRecordCount(displayedRecords, visibleRecords) {
      els.recordCount.textContent = records.length ? `顯示 ${displayedRecords.length} / ${visibleRecords.length} 筆` : "";
    }

    function renderRecordList(visibleRecords = getVisibleRecords()) {
      els.recordList.innerHTML = "";
      if (!records.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "還沒有紀錄";
        els.recordList.appendChild(empty);
        return;
      }
      if (!visibleRecords.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "沒有符合條件的紀錄";
        els.recordList.appendChild(empty);
        return;
      }

      visibleRecords
        .forEach((record) => {
          const card = document.createElement("article");
          card.className = "record-card no-image";
          if (record.id === pendingNewRecordId) card.classList.add("record-card-enter");
          const averagePaceSeconds = getAveragePaceSeconds(record);
          const avgHeartRate = getAverageHeartRate(record);
          const maxHeartRate = getMaxHeartRate(record);
          const detailsHtml = renderRecordDetails(record, avgHeartRate, maxHeartRate);
          const detailsButtonHtml = detailsHtml ? `
                <button type="button" class="icon-button details-toggle" data-toggle-details aria-label="額外資訊" title="額外資訊" aria-expanded="false">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
          ` : "";

          card.innerHTML = `
            <div class="record-card-head">
              <div>
                <h3 class="record-title">${escapeHtml(record.title)}</h3>
                <div class="record-meta">${formatRecordMeta(record)}</div>
              </div>
              <div class="record-card-actions">
                <button type="button" class="icon-button" data-edit="${record.id}" aria-label="編輯" title="編輯">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="m4 20 4.4-1.1L19 8.3 15.7 5 5.1 15.6 4 20Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  </svg>
                </button>
                <button type="button" class="icon-button" data-delete="${record.id}" aria-label="刪除" title="刪除">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M6 7h12M10 11v6M14 11v6M9 7l1-2h4l1 2M8 7l1 13h6l1-13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
                <button type="button" class="icon-button" data-share="${record.id}" aria-label="分享圖片" title="分享圖片">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M8 12h8M12 8l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  </svg>
                </button>
                ${detailsButtonHtml}
              </div>
            </div>
            <div class="record-card-body">
              <div>
                <div class="record-stats">
                  <div class="record-stat"><span class="record-mini">距離</span><strong>${formatDistance(record.distance)} ${record.unit}</strong></div>
                  <div class="record-stat"><span class="record-mini">時間</span><strong>${formatDuration(record.durationSeconds)}</strong></div>
                  <div class="record-stat"><span class="record-mini">平均配速</span><strong>${formatPace(averagePaceSeconds)} /${record.unit}</strong></div>
                </div>
                ${detailsHtml ? `<div class="record-detail-panel" aria-hidden="true"><div class="record-detail-body">${detailsHtml}</div></div>` : ""}
              </div>
            </div>
          `;

          card.querySelector("[data-edit]").addEventListener("click", () => editRecord(record.id));
          card.querySelector("[data-delete]").addEventListener("click", () => deleteRecord(record.id));
          card.querySelector("[data-share]").addEventListener("click", () => shareRecordImage(record.id));
          card.querySelector("[data-toggle-details]")?.addEventListener("click", (event) => {
            const panel = card.querySelector(".record-detail-panel");
            if (!panel) return;
            const isOpen = !panel.classList.contains("open");
            panel.classList.toggle("open", isOpen);
            panel.setAttribute("aria-hidden", String(!isOpen));
            event.currentTarget.classList.toggle("active", isOpen);
            event.currentTarget.setAttribute("aria-expanded", String(isOpen));
            if (isOpen) window.setTimeout(() => ensureCardVisible(card), 290);
          });
          els.recordList.appendChild(card);
        });
      pendingNewRecordId = null;
    }

    function ensureCardVisible(card) {
      const rect = card.getBoundingClientRect();
      const margin = 18;
      const overflowBottom = rect.bottom - (window.innerHeight - margin);
      if (overflowBottom > 0) {
        window.scrollBy({ top: overflowBottom, behavior: motionQuery.matches ? "auto" : "smooth" });
      }
    }

    function getVisibleRecords() {
      const query = String(prefState.search || "").trim().toLowerCase();
      const range = rangeBounds(prefState.rangeFilter);
      const visible = records.filter((record) => {
        if (prefState.surfaceFilter !== "all" && record.surface !== prefState.surfaceFilter) return false;
        if (range) {
          const date = parseIsoDate(record.date);
          if (!date || date < range.start || date > range.end) return false;
        }
        if (!query) return true;
        const haystack = [
          record.date,
          record.title,
          formatSurface(record.surface),
          formatDistance(record.distance || 0),
          record.unit,
          record.kilometerPaces,
          record.notes
        ].filter(Boolean).join(" ").toLowerCase();
        return haystack.includes(query);
      });

      return sortRecords(visible);
    }

    function sortRecords(list) {
      const sorted = [...list];
      const dateKey = (record) => `${record.date || ""} ${record.createdAt || ""}`;
      sorted.sort((a, b) => {
        if (prefState.sort === "date-asc") return dateKey(a).localeCompare(dateKey(b));
        if (prefState.sort === "distance-desc") return toKm(b.distance || 0, b.unit) - toKm(a.distance || 0, a.unit);
        if (prefState.sort === "pace-asc") {
          const paceA = pacePerKm(a) || Infinity;
          const paceB = pacePerKm(b) || Infinity;
          return paceA - paceB;
        }
        return dateKey(b).localeCompare(dateKey(a));
      });
      return sorted;
    }

    function rangeBounds(range) {
      const today = new Date();
      const end = endOfDay(today);
      if (range === "week") return { start: startOfWeek(today), end };
      if (range === "month") return { start: new Date(today.getFullYear(), today.getMonth(), 1), end };
      if (range === "year") return { start: new Date(today.getFullYear(), 0, 1), end };
      return null;
    }

    function filterByCalendarDate(date) {
      prefState.search = date;
      prefState.rangeFilter = "all";
      hydrateRecordControls();
      savePrefs();
      renderRecords();
      showToast(`${date} 的紀錄`);
    }

    function statsForRange(start, end) {
      return records.reduce((stats, record) => {
        const date = parseIsoDate(record.date);
        if (!date || date < start || date > end) return stats;
        stats.km += toKm(record.distance || 0, record.unit);
        stats.seconds += record.durationSeconds || 0;
        stats.count += 1;
        return stats;
      }, { km: 0, seconds: 0, count: 0 });
    }

    function renderAnalysisCards() {
      const month = monthDate(prefState.calendarMonth);
      const monthSeries = dailyDistanceSeries(month);
      const monthTitle = monthKey(month) === monthKey(new Date()) ? "本月跑量" : `${month.getMonth() + 1}月跑量`;
      const streak = currentStreak();

      return `
        <section class="analysis-card wide" aria-label="本月跑量趨勢">
          <div class="analysis-head">
            <div>
              <div class="analysis-title">${monthTitle}</div>
              <div class="analysis-value">${formatKm(monthSeries.total)}</div>
            </div>
            <div class="analysis-sub">${monthSeries.runDays}/${monthSeries.days}</div>
          </div>
          ${sparkline(monthSeries.points, "trend-chart")}
        </section>
        <section class="analysis-card wide streak-card" aria-label="連續跑步">
          <div class="analysis-head">
            <div>
              <div class="analysis-title">連續跑步</div>
              <div class="analysis-value">${streak.current} 天</div>
            </div>
            <div class="analysis-sub">最長 ${streak.longest} 天</div>
          </div>
          <div class="analysis-title">最近一次</div>
          <div class="metric-value">${streak.lastDate || "--"}</div>
          <div class="analysis-sub">${streak.current ? "維持中" : "等待下一跑"}</div>
        </section>
      `;
    }

    function dailyDistanceSeries(month) {
      const year = month.getFullYear();
      const monthIndex = month.getMonth();
      const days = new Date(year, monthIndex + 1, 0).getDate();
      const values = Array.from({ length: days }, () => 0);
      records.forEach((record) => {
        const date = parseIsoDate(record.date);
        if (!date || date.getFullYear() !== year || date.getMonth() !== monthIndex) return;
        values[date.getDate() - 1] += toKm(record.distance || 0, record.unit);
      });
      return {
        values,
        points: values.map((value, index) => ({
          value,
          label: `${month.getMonth() + 1}/${index + 1}`,
          detail: `${formatDistance(value)} km`,
          interactive: value > 0
        })),
        total: values.reduce((sum, value) => sum + value, 0),
        runDays: values.filter((value) => value > 0).length,
        days
      };
    }

    function currentStreak() {
      const dates = [...new Set(records.map((record) => record.date).filter(Boolean))].sort();
      if (!dates.length) return { current: 0, longest: 0, lastDate: "" };

      let longest = 1;
      let run = 1;
      for (let index = 1; index < dates.length; index += 1) {
        const previous = parseIsoDate(dates[index - 1]);
        const current = parseIsoDate(dates[index]);
        const diff = (current - previous) / 86400000;
        run = diff === 1 ? run + 1 : 1;
        longest = Math.max(longest, run);
      }

      let currentStreakDays = 1;
      for (let index = dates.length - 1; index > 0; index -= 1) {
        const current = parseIsoDate(dates[index]);
        const previous = parseIsoDate(dates[index - 1]);
        if ((current - previous) / 86400000 !== 1) break;
        currentStreakDays += 1;
      }

      const today = parseIsoDate(todayIso());
      const last = parseIsoDate(dates.at(-1));
      const daysSinceLast = Math.round((today - last) / 86400000);
      if (daysSinceLast > 1) currentStreakDays = 0;
      return { current: currentStreakDays, longest, lastDate: dates.at(-1) };
    }

    function averageRunStats() {
      if (!records.length) return { km: 0, seconds: 0, count: 0 };
      const totals = records.reduce((stats, record) => {
        stats.km += toKm(record.distance || 0, record.unit);
        stats.seconds += record.durationSeconds || 0;
        return stats;
      }, { km: 0, seconds: 0 });
      return {
        km: totals.km / records.length,
        seconds: totals.seconds / records.length,
        count: records.length
      };
    }

    function volumeSub(stats) {
      return `${stats.count} 次 · ${formatDuration(stats.seconds)}`;
    }

    function calendarRunStyle(km, maxKm) {
      const ratio = maxKm > 0 ? Math.max(0, Math.min(1, km / maxKm)) : 0;
      const strength = Math.sqrt(ratio);
      const hue = 46 - strength * 34;
      const backgroundLight = 96 - strength * 20;
      const borderLight = 82 - strength * 24;
      const textLight = 36 - strength * 10;
      return [
        `--run-bg: hsl(${hue.toFixed(1)} 96% ${backgroundLight.toFixed(1)}%)`,
        `--run-border: hsl(${hue.toFixed(1)} 92% ${borderLight.toFixed(1)}%)`,
        `--run-distance: hsl(${hue.toFixed(1)} 90% ${textLight.toFixed(1)}%)`
      ].join(";");
    }

    function sparkline(values, className) {
      const data = values.map((entry, index) => {
        if (typeof entry === "object" && entry !== null) {
          const value = Number(entry.value) || 0;
          return {
            value,
            label: entry.label || `第 ${index + 1} 點`,
            detail: entry.detail || formatDistance(value),
            interactive: Boolean(entry.interactive)
          };
        }
        const value = Number(entry) || 0;
        return { value, label: `第 ${index + 1} 點`, detail: formatDistance(value), interactive: value > 0 };
      });
      const clean = data.map((entry) => entry.value);
      if (!clean.some((value) => value > 0)) {
        return `
          <div class="chart-wrap" data-chart>
            <svg class="${className}" viewBox="0 0 220 88" preserveAspectRatio="none" aria-hidden="true"><path class="chart-axis" d="M4 78H216"/></svg>
            <div class="chart-tooltip" data-chart-tooltip hidden></div>
          </div>
        `;
      }
      const width = 220;
      const height = 88;
      const paddingX = 4;
      const paddingTop = 8;
      const paddingBottom = 10;
      const max = Math.max(...clean);
      const span = Math.max(1, max);
      const points = clean.map((value, index) => {
        const x = clean.length === 1 ? width / 2 : paddingX + (index / (clean.length - 1)) * (width - paddingX * 2);
        const y = height - paddingBottom - (value / span) * (height - paddingTop - paddingBottom);
        return [Number(x.toFixed(2)), Number(y.toFixed(2))];
      });
      const line = points.map(([x, y], index) => `${index ? "L" : "M"}${x} ${y}`).join(" ");
      const area = `${line} L${width - paddingX} ${height - paddingBottom} L${paddingX} ${height - paddingBottom} Z`;
      const lastInteractiveIndex = data.reduce((last, item, index) => item.interactive ? index : last, -1);
      const pointNodes = points.map(([x, y], index) => {
        const item = data[index];
        if (!item.interactive) return "";
        const left = (x / width) * 100;
        const top = (y / height) * 100;
        const label = escapeHtml(item.label);
        const detail = escapeHtml(item.detail);
        const pointClass = index === lastInteractiveIndex ? "chart-point last-point" : "chart-point";
        return `<circle class="${pointClass}" cx="${x}" cy="${y}" r="2.4" tabindex="0" data-left="${left.toFixed(2)}" data-top="${top.toFixed(2)}" data-label="${label}" data-detail="${detail}" aria-label="${label} ${detail}"></circle>`;
      }).join("");
      return `
        <div class="chart-wrap" data-chart>
          <svg class="${className}" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-label="跑量折線圖">
            <path class="chart-axis" d="M${paddingX} ${height - paddingBottom}H${width - paddingX}"/>
            <path class="chart-area" d="${area}"/>
            <path class="chart-line" pathLength="1" d="${line}"/>
            ${pointNodes}
          </svg>
          <div class="chart-tooltip" data-chart-tooltip hidden></div>
        </div>
      `;
    }

    function bindChartTooltips() {
      els.analysisGrid.querySelectorAll("[data-chart]").forEach((chart) => {
        const tooltip = chart.querySelector("[data-chart-tooltip]");
        const points = [...chart.querySelectorAll(".chart-point")];
        const show = (point) => {
          tooltip.innerHTML = `<strong>${point.dataset.label}</strong><span>${point.dataset.detail}</span>`;
          tooltip.style.left = `${point.dataset.left}%`;
          tooltip.style.top = `${point.dataset.top}%`;
          tooltip.hidden = false;
        };
        const hide = () => {
          tooltip.hidden = true;
          tooltip.classList.remove("pinned");
        };

        chart.querySelectorAll(".chart-point").forEach((point) => {
          point.addEventListener("pointerenter", () => show(point));
          point.addEventListener("focus", () => show(point));
          point.addEventListener("click", (event) => {
            event.stopPropagation();
            show(point);
            tooltip.classList.add("pinned");
          });
        });
        chart.querySelector("svg")?.addEventListener("click", (event) => {
          if (event.target.classList.contains("chart-point") || !points.length) return;
          const rect = event.currentTarget.getBoundingClientRect();
          const left = ((event.clientX - rect.left) / rect.width) * 100;
          const nearest = points.reduce((best, point) => {
            const distance = Math.abs(Number(point.dataset.left) - left);
            return !best || distance < best.distance ? { point, distance } : best;
          }, null)?.point;
          if (nearest) {
            show(nearest);
            tooltip.classList.add("pinned");
          }
        });
        chart.addEventListener("pointerleave", () => {
          if (!tooltip.classList.contains("pinned")) tooltip.hidden = true;
        });
        chart.addEventListener("click", (event) => {
          if (!event.target.classList.contains("chart-point")) hide();
        });
      });
    }

    function isRecentRecord(record) {
      if (!record?.date) return false;
      const date = parseIsoDate(record.date);
      if (!date) return false;
      return (endOfDay(new Date()) - date) / 86400000 <= 7;
    }

    function formatKm(km) {
      return `${km > 0 ? formatDistance(km) : "0"} km`;
    }

    function pacePerKm(record) {
      const pace = getAveragePaceSeconds(record);
      if (!pace) return 0;
      return record.unit === "mi" ? pace / KM_PER_MILE : pace;
    }

    function bestRecord(scoreFn, direction) {
      let best = null;
      let bestScore = direction === "max" ? -Infinity : Infinity;
      records.forEach((record) => {
        const score = scoreFn(record);
        if (!Number.isFinite(score)) return;
        if (direction === "max" ? score > bestScore : score < bestScore) {
          best = record;
          bestScore = score;
        }
      });
      return best;
    }

    function bestDistanceRecord(targetKm) {
      const tolerance = Math.max(0.15, targetKm * 0.03);
      return bestRecord((record) => {
        const distanceKm = toKm(record.distance || 0, record.unit);
        if (Math.abs(distanceKm - targetKm) > tolerance) return Infinity;
        return record.durationSeconds || Infinity;
      }, "min");
    }

    function toKm(distance, unit) {
      return unit === "mi" ? distance * KM_PER_MILE : distance;
    }

    function getAveragePaceSeconds(record) {
      return record.averagePaceSeconds || record.paceSeconds || 0;
    }

    function getAverageHeartRate(record) {
      return record.avgHeartRate || record.heartRate || "";
    }

    function getMaxHeartRate(record) {
      return record.maxHeartRate || record.peakHeartRate || "";
    }

    function formatSurface(surface) {
      if (surface === "indoor") return "室內";
      if (surface === "outdoor") return "室外";
      return "";
    }

    function formatRecordMeta(record) {
      const items = [record.date, formatSurface(record.surface)].filter(Boolean);
      return items.map(escapeHtml).join(" · ");
    }

    function renderRecordDetails(record, avgHeartRate, maxHeartRate) {
      const heartHtml = renderHeartDetails(avgHeartRate, maxHeartRate, record.heartRateZones);
      const metricHtml = renderDetailMetrics(record);
      const weatherHtml = renderWeatherDetails(record.weather);
      const notesHtml = record.notes ? `<div class="record-notes">${escapeHtml(record.notes)}</div>` : "";
      const body = [heartHtml, metricHtml, weatherHtml, notesHtml].filter(Boolean).join("");
      return body;
    }

    function renderDetailMetrics(record) {
      const items = [
        record.calories ? ["calories", "卡路里", `${record.calories} 卡`] : null,
        record.cadence ? ["cadence", "步頻", record.cadence] : null
      ].filter(Boolean);
      if (!items.length) return "";
      return `
        <section class="detail-metrics" aria-label="其他數據">
          ${items.map(([type, label, value]) => `
            <div class="detail-metric">
              ${detailIcon(type)}
              <span>${label}<strong>${escapeHtml(value)}</strong></span>
            </div>
          `).join("")}
        </section>
      `;
    }

    function detailIcon(type) {
      const icons = {
        calories: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M13.5 3.5c.6 2.9-.6 4.4-2 5.7-1.6 1.5-3 2.8-3 5.3a4.5 4.5 0 0 0 9 0c0-1.5-.7-2.8-1.9-4.2-.3 1.4-1.1 2.2-2.1 2.7.4-2.3-.3-4.4-2-6.2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
        cadence: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 6h.01M17 6h.01M7 18h.01M17 18h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M8 7c2.4 1.7 5.6 1.7 8 0M8 17c2.4-1.7 5.6-1.7 8 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`
      };
      return `<span class="detail-icon">${icons[type] || ""}</span>`;
    }

    function renderHeartDetails(avgHeartRate, maxHeartRate, zones) {
      const zoneValues = normalizedZones(zones);
      const hasZones = zoneValues.some((value) => value !== "" && value != null);
      const heartValues = [
        avgHeartRate ? ["平均心率", avgHeartRate, "bpm"] : null,
        maxHeartRate ? ["最大心率", maxHeartRate, "bpm"] : null
      ].filter(Boolean);
      if (!heartValues.length && !hasZones) return "";

      const valuesHtml = heartValues.length
        ? `<div class="heart-values">${heartValues.map(([label, value, unit]) => `
            <div class="heart-value">
              <span class="record-mini">${label}</span>
              <strong><span class="heart-number">${escapeHtml(value)}</span><span class="heart-unit">${escapeHtml(unit)}</span></strong>
            </div>
          `).join("")}</div>`
        : "";
      const barsHtml = hasZones ? renderZoneBars(zoneValues) : "";
      return `<section class="heart-panel" aria-label="心率">${valuesHtml}${barsHtml}</section>`;
    }

    function renderZoneBars(zones) {
      const colors = ["#4e9fca", "#42a66b", "#e1a739", "#df7646", "#cc4e5c"];
      return `
        <div class="zone-bars" aria-label="心率區間占比">
          ${zones.map((value, index) => {
            const hasValue = value !== "" && value != null;
            const percent = hasValue ? Math.min(100, Math.max(0, number(value))) : 0;
            const label = hasValue ? `${formatCompactNumber(percent)}%` : "--";
            return `
              <div class="zone-bar-item">
                <div class="zone-bar-track" aria-hidden="true">
                  <div class="zone-bar-fill" style="height: ${percent}%; background: ${colors[index]};"></div>
                </div>
                <span>Z${index + 1}</span>
                <span>${label}</span>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function normalizedZones(zones) {
      const values = Array.isArray(zones) ? zones : [];
      return [0, 1, 2, 3, 4].map((index) => values[index] ?? "");
    }

    function renderWeatherDetails(weather) {
      if (!weather) return "";
      const items = [
        weather.temperature !== "" && weather.temperature != null ? ["temperature", "氣溫", `${weather.temperature}°C`] : null,
        weather.humidity !== "" && weather.humidity != null ? ["humidity", "濕度", `${weather.humidity}%`] : null,
        weather.windSpeed !== "" && weather.windSpeed != null ? ["wind", "風速", weather.windSpeed] : null,
        weather.windDirection ? ["direction", "風向", weather.windDirection] : null
      ].filter(Boolean);
      if (!items.length) return "";
      return `
        <section class="weather-row" aria-label="天氣">
          ${items.map(([type, label, value]) => `
            <div class="weather-item">
              ${weatherIcon(type)}
              <span>${label}<strong>${escapeHtml(value)}</strong></span>
            </div>
          `).join("")}
        </section>
      `;
    }

    function weatherIcon(type) {
      const icons = {
        temperature: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M14 14.8V5a3 3 0 0 0-6 0v9.8a5 5 0 1 0 6 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M11 15V8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
        humidity: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3s6 6.2 6 11a6 6 0 0 1-12 0c0-4.8 6-11 6-11Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M9.5 14.5A2.7 2.7 0 0 0 12.2 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
        wind: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 8h10a3 3 0 1 0-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M4 13h14a3 3 0 1 1-3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M4 18h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
        direction: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3 6.5 20l5.5-3 5.5 3L12 3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>`
      };
      return `<span class="weather-icon">${icons[type] || ""}</span>`;
    }

    function formatCompactNumber(value) {
      if (!Number.isFinite(value)) return "";
      return Number(value.toFixed(2)).toString();
    }

    function shareRecordImage(id) {
      if (!records.some((item) => item.id === id)) return;
      activeShareRecordId = id;
      els.shareSheet.hidden = false;
      requestAnimationFrame(() => els.shareGenerateButton.focus());
    }

    function closeShareSheet() {
      activeShareRecordId = null;
      els.shareSheet.hidden = true;
    }

    async function generateSelectedShareImage() {
      const record = records.find((item) => item.id === activeShareRecordId);
      if (!record) return;
      const options = {
        theme: els.shareTheme.value === "light" ? "light" : "dark",
        format: SHARE_FORMATS[els.shareFormat.value] ? els.shareFormat.value : "portrait"
      };

      try {
        showToast("正在產生分享圖", { duration: 900 });
        const blob = await createRecordShareBlob(record, options);
        const filename = `燃速誌-${record.date || todayIso()}-${options.theme}-${options.format}-${safeFilenamePart(record.title)}.png`;
        const file = typeof File === "function"
          ? new File([blob], filename, { type: "image/png" })
          : null;

        closeShareSheet();
        if (file && navigator.canShare?.({ files: [file] })) {
          try {
            await navigator.share({
              files: [file],
              title: `燃速誌｜${record.title || "跑步紀錄"}`,
              text: recordShareText(record)
            });
            showToast("已開啟分享");
            return;
          } catch (error) {
            if (error?.name === "AbortError") {
              showToast("已取消分享");
              return;
            }
          }
        }

        downloadBlob(filename, blob);
        showToast("已下載分享圖");
      } catch (error) {
        console.error(error);
        showToast("分享圖片失敗");
      }
    }

    async function createRecordShareBlob(record, options = {}) {
      const format = SHARE_FORMATS[options.format] || SHARE_FORMATS.portrait;
      const palette = sharePalette(options.theme);
      const canvas = document.createElement("canvas");
      canvas.width = format.width;
      canvas.height = format.height;
      const ctx = canvas.getContext("2d");
      const box = shareCanvasBox(canvas.width, canvas.height);

      drawShareBackground(ctx, canvas.width, canvas.height, palette);
      fillCanvasRoundRect(ctx, box.cardX, box.cardY, box.cardW, box.cardH, box.radius, palette.card);
      const stripe = ctx.createLinearGradient(box.cardX, box.cardY, box.cardX + box.cardW, box.cardY);
      stripe.addColorStop(0, palette.red);
      stripe.addColorStop(0.6, palette.accent);
      stripe.addColorStop(1, palette.yellow);
      fillCanvasRoundRect(ctx, box.cardX, box.cardY, box.cardW, Math.max(10, box.scale * 15), Math.max(6, box.scale * 8), stripe);

      if (canvas.width > canvas.height) {
        drawLandscapeShare(ctx, record, box, palette);
      } else {
        drawPortraitShare(ctx, record, box, palette);
      }
      return canvasToBlob(canvas);
    }

    function shareCanvasBox(width, height) {
      const minSide = Math.min(width, height);
      const margin = Math.round(minSide * 0.055);
      return {
        width,
        height,
        scale: minSide / 1080,
        margin,
        cardX: margin,
        cardY: margin,
        cardW: width - margin * 2,
        cardH: height - margin * 2,
        radius: Math.round(minSide * 0.04)
      };
    }

    function sharePalette(theme) {
      const dark = theme !== "light";
      return dark ? {
        bg0: "#030712",
        bg1: "#000000",
        card: "#080808",
        text: "#F9FAFB",
        muted: "#A1A1AA",
        line: "#27272A",
        soft: "#171717",
        metric: "#111111",
        accent: "#F97316",
        red: "#EF4444",
        yellow: "#FACC15",
        routeBg: "#0F0F0F",
        routeLine: "#F97316",
        routeSoft: "rgba(249, 115, 22, 0.14)"
      } : {
        bg0: "#F5F7FA",
        bg1: "#FFF7ED",
        card: "#FFFDF8",
        text: "#0F172A",
        muted: "#6B7280",
        line: "#E5E7EB",
        soft: "#FFF7ED",
        metric: "#FFFFFF",
        accent: "#F97316",
        red: "#EF4444",
        yellow: "#FACC15",
        routeBg: "#F8FAFC",
        routeLine: "#F97316",
        routeSoft: "rgba(249, 115, 22, 0.16)"
      };
    }

    function drawShareBackground(ctx, width, height, palette) {
      const bg = ctx.createLinearGradient(0, 0, width, height);
      bg.addColorStop(0, palette.bg0);
      bg.addColorStop(0.58, palette.bg1);
      bg.addColorStop(1, palette.bg0);
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      ctx.globalAlpha = 0.72;
      const glow = ctx.createRadialGradient(width * 0.84, height * 0.08, width * 0.02, width * 0.84, height * 0.08, width * 0.26);
      glow.addColorStop(0, palette.yellow);
      glow.addColorStop(0.42, palette.accent);
      glow.addColorStop(1, "rgba(249, 115, 22, 0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(width * 0.84, height * 0.08, width * 0.26, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawPortraitShare(ctx, record, box, palette) {
      const { scale: s, cardX, cardY, cardW, cardH } = box;
      const x = cardX + 42 * s;
      const w = cardW - 84 * s;
      const compact = box.height <= 1120;
      const footerY = cardY + cardH - (compact ? 22 : 48) * s;
      const route = record.route?.points?.length ? record.route : null;
      const zones = normalizedZones(record.heartRateZones);
      const hasZones = zones.some((value) => value !== "" && value != null);

      drawShareHeader(ctx, record, x, cardY + 74 * s, w, s, palette);
      let y = cardY + (compact ? 172 : 208) * s;
      const routeGap = route ? 28 * s : 0;
      const routeW = route ? Math.min(w * 0.43, 360 * s) : 0;
      const leftW = route ? w - routeW - routeGap : w;
      const routeX = x + leftW + routeGap;
      const routeY = cardY + (compact ? 172 : 202) * s;
      const routeH = route ? (compact ? 244 * s : Math.min(310 * s, cardH * 0.24)) : 0;

      y = drawCanvasWrappedText(ctx, record.title || "跑步", x, y, leftW, 40 * s, 2, {
        fontSize: 39 * s,
        weight: 1000,
        color: palette.text
      }) + (compact ? 38 : 50) * s;
      y = drawShareDistance(ctx, record, x, y, leftW, s, palette) + (compact ? 42 : 60) * s;

      if (route) {
        drawShareRoutePanel(ctx, routeX, routeY, routeW, routeH, route, palette, s);
        y = Math.max(y, routeY + routeH + (compact ? 28 : 34) * s);
      }

      const bigGap = compact ? 22 * s : 36 * s;
      const bigW = (w - bigGap) / 2;
      const bigH = compact ? 104 * s : 132 * s;
      drawShareMetric(ctx, x, y, bigW, bigH, "時間", formatDuration(record.durationSeconds || 0), palette, s);
      drawShareMetric(ctx, x + bigW + bigGap, y, bigW, bigH, "平均配速", `${formatPace(getAveragePaceSeconds(record))} /${record.unit || "km"}`, palette, s);
      y += bigH + (compact ? 20 : 34) * s;

      const metricItems = shareMetricItems(record).slice(0, compact ? 2 : 6);
      const columns = compact ? 2 : 3;
      const gap = compact ? 16 * s : 22 * s;
      const smallW = (w - gap * (columns - 1)) / columns;
      const smallH = compact ? 62 * s : 78 * s;
      const smallStep = compact ? 76 * s : 96 * s;
      metricItems.forEach(([label, value], index) => {
        const row = Math.floor(index / columns);
        const col = index % columns;
        drawShareSmallMetric(ctx, x + col * (smallW + gap), y + row * smallStep, smallW, smallH, label, value, palette, s);
      });
      y += Math.ceil(metricItems.length / columns) * smallStep + (compact ? 8 : 20) * s;

      if (hasZones) {
        drawCanvasText(ctx, "心率區間", x, y + 24 * s, compact ? 24 * s : 28 * s, 1000, palette.text);
        drawShareZoneBars(ctx, x, y + (compact ? 36 : 42) * s, w, compact ? 108 * s : 130 * s, zones, palette, s);
        y += (compact ? 142 : 178) * s;
      }

      const weatherItems = shareWeatherItems(record.weather).slice(0, 4);
      if (weatherItems.length && y + 80 * s < footerY - 34 * s) {
        drawCanvasText(ctx, "天氣", x, y + 24 * s, compact ? 24 * s : 28 * s, 1000, palette.text);
        drawShareWeather(ctx, x, y + 52 * s, w, weatherItems, palette, s);
      }

      drawShareFooter(ctx, x, footerY, w, palette, s);
    }

    function drawLandscapeShare(ctx, record, box, palette) {
      const { scale: s, cardX, cardY, cardW, cardH } = box;
      const x = cardX + 48 * s;
      const top = cardY + 78 * s;
      const footerY = cardY + cardH - 46 * s;
      const gap = 40 * s;
      const route = record.route?.points?.length ? record.route : null;
      const rightW = route ? Math.max(cardW * 0.36, 430 * s) : 0;
      const leftW = cardW - 96 * s - rightW - (route ? gap : 0);
      const zones = normalizedZones(record.heartRateZones);
      const hasZones = zones.some((value) => value !== "" && value != null);

      drawShareHeader(ctx, record, x, top, leftW, s, palette);
      let y = top + 120 * s;
      y = drawCanvasWrappedText(ctx, record.title || "跑步", x, y, leftW, 44 * s, 2, {
        fontSize: 42 * s,
        weight: 1000,
        color: palette.text
      }) + 48 * s;
      y = drawShareDistance(ctx, record, x, y, leftW, s, palette) + 52 * s;

      const bigW = (leftW - 28 * s) / 2;
      drawShareMetric(ctx, x, y, bigW, 126 * s, "時間", formatDuration(record.durationSeconds || 0), palette, s);
      drawShareMetric(ctx, x + bigW + 28 * s, y, bigW, 126 * s, "平均配速", `${formatPace(getAveragePaceSeconds(record))} /${record.unit || "km"}`, palette, s);
      y += 156 * s;

      const smallItems = shareMetricItems(record).slice(0, 6);
      const smallW = (leftW - 32 * s) / 3;
      smallItems.forEach(([label, value], index) => {
        const row = Math.floor(index / 3);
        const col = index % 3;
        drawShareSmallMetric(ctx, x + col * (smallW + 16 * s), y + row * 86 * s, smallW, 70 * s, label, value, palette, s);
      });
      y += Math.ceil(smallItems.length / 3) * 86 * s + 18 * s;

      if (hasZones) {
        drawCanvasText(ctx, "心率區間", x, y + 22 * s, 26 * s, 1000, palette.text);
        drawShareZoneBars(ctx, x, y + 36 * s, leftW, 112 * s, zones, palette, s);
      }

      const weatherItems = shareWeatherItems(record.weather).slice(0, 4);
      if (weatherItems.length) {
        drawShareWeather(ctx, x, footerY - 102 * s, leftW, weatherItems, palette, s);
      }

      if (route) {
        drawShareRoutePanel(ctx, x + leftW + gap, top + 16 * s, rightW, footerY - top - 96 * s, route, palette, s);
      }
      drawShareFooter(ctx, x, footerY, cardW - 96 * s, palette, s);
    }

    function drawShareHeader(ctx, record, x, y, width, scale, palette) {
      drawCanvasText(ctx, "燃速誌", x, y, 45 * scale, 1000, palette.text);
      drawCanvasText(ctx, "RUN SUMMARY", x, y + 40 * scale, 21 * scale, 900, palette.accent);
      ctx.textAlign = "right";
      drawCanvasText(ctx, `${record.date || "--"}${formatSurface(record.surface) ? ` · ${formatSurface(record.surface)}` : ""}`, x + width, y + 2 * scale, 27 * scale, 900, palette.muted);
      ctx.textAlign = "left";
    }

    function drawShareDistance(ctx, record, x, y, width, scale, palette) {
      const distanceValue = formatDistance(record.distance || 0);
      const distanceSize = fitCanvasFont(ctx, distanceValue, width * 0.62, 148 * scale, 82 * scale, 1000);
      drawCanvasText(ctx, distanceValue, x, y + distanceSize, distanceSize, 1000, palette.text);
      const distanceWidth = ctx.measureText(distanceValue).width;
      drawCanvasText(ctx, record.unit || "km", x + distanceWidth + 12 * scale, y + distanceSize - 16 * scale, 46 * scale, 1000, palette.text);
      fillCanvasRoundRect(ctx, x, y + distanceSize + 22 * scale, Math.min(width * 0.44, distanceWidth + 98 * scale), 9 * scale, 5 * scale, palette.accent);
      return y + distanceSize + 34 * scale;
    }

    function drawShareMetric(ctx, x, y, width, height, label, value, palette, scale) {
      fillCanvasRoundRect(ctx, x, y, width, height, 22 * scale, palette.soft);
      fillCanvasRoundRect(ctx, x, y, 7 * scale, height, 4 * scale, palette.accent);
      drawCanvasText(ctx, label, x + 28 * scale, y + height * 0.34, 23 * scale, 900, palette.muted);
      drawCanvasText(ctx, value, x + 28 * scale, y + height * 0.76, fitCanvasFont(ctx, value, width - 56 * scale, 42 * scale, 26 * scale, 1000), 1000, palette.text);
    }

    function drawShareSmallMetric(ctx, x, y, width, height, label, value, palette, scale) {
      fillCanvasRoundRect(ctx, x, y, width, height, 16 * scale, palette.metric);
      ctx.strokeStyle = palette.line;
      ctx.lineWidth = Math.max(1, 2 * scale);
      strokeCanvasRoundRect(ctx, x, y, width, height, 16 * scale);
      drawCanvasText(ctx, label, x + 20 * scale, y + height * 0.36, 20 * scale, 900, palette.muted);
      drawCanvasText(ctx, String(value), x + 20 * scale, y + height * 0.76, fitCanvasFont(ctx, String(value), width - 40 * scale, 28 * scale, 18 * scale, 1000), 1000, palette.text);
    }

    function drawShareRoutePanel(ctx, x, y, width, height, route, palette, scale) {
      fillCanvasRoundRect(ctx, x, y, width, height, 22 * scale, palette.routeBg);
      ctx.strokeStyle = palette.line;
      ctx.lineWidth = Math.max(1, 2 * scale);
      strokeCanvasRoundRect(ctx, x, y, width, height, 22 * scale);
      drawCanvasText(ctx, "路線", x + 24 * scale, y + 42 * scale, 24 * scale, 1000, palette.text);
      drawRouteMap(ctx, route.points || [], x + 22 * scale, y + 58 * scale, width - 44 * scale, height - 82 * scale, palette, scale);
    }

    function drawRouteMap(ctx, points, x, y, width, height, palette, scale) {
      fillCanvasRoundRect(ctx, x, y, width, height, 16 * scale, palette.routeSoft);
      if (!points.length) return;
      const bounds = routeBounds(points);
      const latSpan = Math.max(0.000001, bounds.maxLat - bounds.minLat);
      const lonSpan = Math.max(0.000001, bounds.maxLon - bounds.minLon);
      const pad = 24 * scale;
      const drawW = width - pad * 2;
      const drawH = height - pad * 2;
      const routeScale = Math.min(drawW / lonSpan, drawH / latSpan);
      const midLat = (bounds.minLat + bounds.maxLat) / 2;
      const midLon = (bounds.minLon + bounds.maxLon) / 2;
      const centerX = x + width / 2;
      const centerY = y + height / 2;
      const project = (point) => ({
        x: centerX + (point.lon - midLon) * routeScale,
        y: centerY - (point.lat - midLat) * routeScale
      });

      ctx.save();
      canvasRoundRectPath(ctx, x, y, width, height, 16 * scale);
      ctx.clip();
      ctx.strokeStyle = palette.line;
      ctx.lineWidth = Math.max(1, 1.2 * scale);
      ctx.globalAlpha = 0.45;
      for (let i = 1; i <= 3; i += 1) {
        const gx = x + (width / 4) * i;
        const gy = y + (height / 4) * i;
        ctx.beginPath();
        ctx.moveTo(gx, y);
        ctx.lineTo(gx, y + height);
        ctx.moveTo(x, gy);
        ctx.lineTo(x + width, gy);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      ctx.strokeStyle = palette.routeLine;
      ctx.lineWidth = Math.max(5, 7 * scale);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.beginPath();
      points.forEach((point, index) => {
        const pos = project(point);
        if (index === 0) ctx.moveTo(pos.x, pos.y);
        else ctx.lineTo(pos.x, pos.y);
      });
      ctx.stroke();

      const start = project(points[0]);
      const end = project(points[points.length - 1]);
      drawRouteDot(ctx, start.x, start.y, 8 * scale, "#22C55E");
      drawRouteDot(ctx, end.x, end.y, 9 * scale, palette.red);
      ctx.restore();
    }

    function drawRouteDot(ctx, x, y, radius, color) {
      ctx.fillStyle = "#FFFFFF";
      ctx.beginPath();
      ctx.arc(x, y, radius + 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawShareZoneBars(ctx, x, y, width, height, zones, palette, scale) {
      const colors = ["#4e9fca", "#42a66b", "#e1a739", "#df7646", "#cc4e5c"];
      const gap = 20 * scale;
      const itemWidth = (width - gap * 4) / 5;
      zones.forEach((value, index) => {
        const percent = value !== "" && value != null ? Math.min(100, Math.max(0, number(value))) : 0;
        const barX = x + index * (itemWidth + gap);
        const trackY = y + 8 * scale;
        const trackH = height * 0.52;
        fillCanvasRoundRect(ctx, barX, trackY, itemWidth, trackH, 10 * scale, palette.line);
        const fillHeight = Math.max(4 * scale, (trackH * percent) / 100);
        fillCanvasRoundRect(ctx, barX, trackY + trackH - fillHeight, itemWidth, fillHeight, 9 * scale, colors[index]);
        ctx.textAlign = "center";
        drawCanvasText(ctx, `Z${index + 1}`, barX + itemWidth / 2, y + trackH + 42 * scale, 21 * scale, 1000, palette.text);
        drawCanvasText(ctx, percent ? `${formatCompactNumber(percent)}%` : "--", barX + itemWidth / 2, y + trackH + 68 * scale, 18 * scale, 900, palette.muted);
        ctx.textAlign = "left";
      });
    }

    function drawShareWeather(ctx, x, y, width, items, palette, scale) {
      const itemW = width / Math.max(1, items.length);
      items.forEach(([label, value], index) => {
        const itemX = x + itemW * index;
        drawCanvasText(ctx, label, itemX, y + 24 * scale, 19 * scale, 900, palette.muted);
        drawCanvasText(ctx, value, itemX, y + 56 * scale, 27 * scale, 1000, palette.text, itemW - 12 * scale);
      });
    }

    function drawShareFooter(ctx, x, y, width, palette, scale) {
      fillCanvasRoundRect(ctx, x, y - 18 * scale, width, Math.max(1, 1.2 * scale), 1, palette.line);
      drawCanvasText(ctx, "Generated by 燃速誌", x, y, 23 * scale, 900, palette.muted);
      ctx.textAlign = "right";
      drawCanvasText(ctx, "Keep running.", x + width, y, 23 * scale, 900, palette.accent);
      ctx.textAlign = "left";
    }

    function shareMetricItems(record) {
      const avgHeartRate = getAverageHeartRate(record);
      const maxHeartRate = getMaxHeartRate(record);
      const monthKm = recordMonthKm(record);
      return [
        avgHeartRate ? ["平均心率", `${avgHeartRate} bpm`] : null,
        maxHeartRate ? ["最大心率", `${maxHeartRate} bpm`] : null,
        record.calories ? ["卡路里", `${record.calories} 卡`] : null,
        record.cadence ? ["步頻", record.cadence] : null,
        monthKm > 0 ? ["本月累積", formatKm(monthKm)] : null,
        formatSurface(record.surface) ? ["場地", formatSurface(record.surface)] : null
      ].filter(Boolean);
    }

    function shareWeatherItems(weather) {
      if (!weather) return [];
      return [
        weather.temperature !== "" && weather.temperature != null ? ["氣溫", `${weather.temperature}°C`] : null,
        weather.humidity !== "" && weather.humidity != null ? ["濕度", `${weather.humidity}%`] : null,
        weather.windSpeed !== "" && weather.windSpeed != null ? ["風速", String(weather.windSpeed)] : null,
        weather.windDirection ? ["風向", String(weather.windDirection)] : null
      ].filter(Boolean);
    }

    function recordMonthKm(record) {
      const date = parseIsoDate(record.date);
      if (!date) return 0;
      return records.reduce((sum, item) => {
        const itemDate = parseIsoDate(item.date);
        if (!itemDate) return sum;
        if (itemDate.getFullYear() !== date.getFullYear() || itemDate.getMonth() !== date.getMonth()) return sum;
        return sum + toKm(item.distance || 0, item.unit);
      }, 0);
    }

    function recordShareText(record) {
      return `${record.title || "跑步"}｜${formatDistance(record.distance || 0)} ${record.unit || "km"}｜${formatDuration(record.durationSeconds || 0)}｜${formatPace(getAveragePaceSeconds(record))}/${record.unit || "km"}｜燃速誌`;
    }

    function drawCanvasText(ctx, text, x, y, size, weight, color, maxWidth = undefined) {
      ctx.font = shareCanvasFont(size, weight);
      ctx.fillStyle = color;
      ctx.textBaseline = "alphabetic";
      ctx.fillText(String(text), x, y, maxWidth);
    }

    function drawCanvasWrappedText(ctx, text, x, y, maxWidth, lineHeight, maxLines, options) {
      ctx.font = shareCanvasFont(options.fontSize, options.weight);
      ctx.fillStyle = options.color;
      const chars = Array.from(String(text || ""));
      const lines = [];
      let line = "";
      chars.forEach((char) => {
        const next = line + char;
        if (ctx.measureText(next).width > maxWidth && line) {
          lines.push(line);
          line = char.trimStart();
        } else {
          line = next;
        }
      });
      if (line) lines.push(line);

      const visible = lines.slice(0, maxLines);
      if (lines.length > maxLines) {
        let last = visible[visible.length - 1];
        while (last.length && ctx.measureText(`${last}...`).width > maxWidth) {
          last = Array.from(last).slice(0, -1).join("");
        }
        visible[visible.length - 1] = `${last}...`;
      }
      visible.forEach((lineText, index) => ctx.fillText(lineText, x, y + index * lineHeight));
      return y + (visible.length - 1) * lineHeight;
    }

    function fitCanvasFont(ctx, text, maxWidth, startSize, minSize, weight) {
      let size = startSize;
      while (size > minSize) {
        ctx.font = shareCanvasFont(size, weight);
        if (ctx.measureText(String(text)).width <= maxWidth) return size;
        size -= 4;
      }
      return minSize;
    }

    function shareCanvasFont(size, weight = 900) {
      return `${weight} ${size}px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif`;
    }

    function fillCanvasRoundRect(ctx, x, y, width, height, radius, fillStyle) {
      canvasRoundRectPath(ctx, x, y, width, height, radius);
      ctx.fillStyle = fillStyle;
      ctx.fill();
    }

    function strokeCanvasRoundRect(ctx, x, y, width, height, radius) {
      canvasRoundRectPath(ctx, x, y, width, height, radius);
      ctx.stroke();
    }

    function canvasRoundRectPath(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + width - r, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + r);
      ctx.lineTo(x + width, y + height - r);
      ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
      ctx.lineTo(x + r, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function canvasToBlob(canvas) {
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) {
            resolve(blob);
            return;
          }
          reject(new Error("Canvas export failed."));
        }, "image/png");
      });
    }

    function safeFilenamePart(value) {
      const text = String(value || "run")
        .trim()
        .replace(/[\\/:*?"<>|]+/g, "-")
        .replace(/\s+/g, "-")
        .slice(0, 32);
      return text || "run";
    }

    function editRecord(id) {
      const record = records.find((item) => item.id === id);
      if (!record) return;
      editingRecordId = id;
      els.recordFormTitle.textContent = "編輯紀錄";
      els.saveRecordButton.lastChild.textContent = " 更新紀錄";
      els.recordDate.value = record.date;
      els.recordTitle.value = record.title;
      els.recordSurface.value = record.surface || "outdoor";
      els.recordDistance.value = formatDistanceInput(record.distance);
      els.recordUnit.value = record.unit;
      els.recordDuration.value = formatDuration(record.durationSeconds);
      els.recordPace.value = formatPace(getAveragePaceSeconds(record));
      els.recordKilometerPaces.value = record.kilometerPaces || "";
      els.recordCalories.value = record.calories || "";
      els.recordHeartRate.value = getAverageHeartRate(record) || "";
      els.recordMaxHeartRate.value = getMaxHeartRate(record) || "";
      els.recordCadence.value = record.cadence || "";
      [els.recordZone1, els.recordZone2, els.recordZone3, els.recordZone4, els.recordZone5].forEach((input, index) => {
        input.value = record.heartRateZones?.[index] || "";
      });
      els.recordTemperature.value = record.weather?.temperature ?? "";
      els.recordHumidity.value = record.weather?.humidity ?? "";
      els.recordWindSpeed.value = record.weather?.windSpeed ?? "";
      els.recordWindDirection.value = record.weather?.windDirection || "";
      els.recordNotes.value = record.notes || "";
      setCurrentRouteData(record.route ? cloneRouteData(record.route) : null);
      showView("records");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteRecord(id) {
      const index = records.findIndex((item) => item.id === id);
      if (index < 0) return;
      const [removed] = records.splice(index, 1);
      pendingUndoDelete = { record: removed, index };
      if (!saveRecords()) {
        records.splice(index, 0, removed);
        pendingUndoDelete = null;
        return;
      }
      if (editingRecordId === id) resetRecordForm();
      showToast("已刪除", {
        actionLabel: "復原",
        duration: 5200,
        onAction: restoreDeletedRecord
      });
    }

    function restoreDeletedRecord() {
      if (!pendingUndoDelete) return;
      const { record, index } = pendingUndoDelete;
      pendingUndoDelete = null;
      if (records.some((item) => item.id === record.id)) return;
      const insertAt = Math.max(0, Math.min(index, records.length));
      records.splice(insertAt, 0, record);
      if (saveRecords()) showToast("已復原");
    }

    function exportBackup() {
      const payload = {
        app: "pace-run-records",
        version: 3,
        exportedAt: new Date().toISOString(),
        records
      };
      downloadText(
        `running-records-backup-${todayIso()}.json`,
        JSON.stringify(payload, null, 2),
        "application/json;charset=utf-8"
      );
      showToast("已下載備份");
    }

    async function importBackup(event) {
      const file = event.target.files?.[0];
      event.target.value = "";
      if (!file) return;

      try {
        const payload = JSON.parse(await file.text());
        const incoming = Array.isArray(payload) ? payload : payload.records;
        if (!Array.isArray(incoming)) {
          showToast("備份檔格式不對");
          return;
        }

        const merged = new Map(records.map((record) => [record.id || makeId(), record]));
        incoming.forEach((record) => {
          if (!record || typeof record !== "object") return;
          const id = record.id || makeId();
          merged.set(id, { ...record, id });
        });
        records = [...merged.values()];
        saveRecords();
        showToast(`已匯入 ${incoming.length} 筆`);
      } catch {
        showToast("匯入失敗");
      }
    }

    function exportCsv() {
      if (!records.length) {
        showToast("沒有紀錄可匯出");
        return;
      }
      const header = ["日期", "名稱", "室內/室外", "距離", "單位", "時間", "平均配速", "每公里配速", "卡路里", "平均心率", "最大心率", "步頻", "Z1%", "Z2%", "Z3%", "Z4%", "Z5%", "氣溫", "濕度", "風速", "風向", "備註"];
      const rows = records.map((record) => [
        record.date,
        record.title,
        formatSurface(record.surface),
        formatDistance(record.distance),
        record.unit,
        formatDuration(record.durationSeconds),
        formatPace(getAveragePaceSeconds(record)),
        record.kilometerPaces || "",
        record.calories || "",
        getAverageHeartRate(record) || "",
        getMaxHeartRate(record) || "",
        record.cadence || "",
        ...normalizedZones(record.heartRateZones),
        record.weather?.temperature ?? "",
        record.weather?.humidity ?? "",
        record.weather?.windSpeed ?? "",
        record.weather?.windDirection || "",
        record.notes || ""
      ]);
      const csv = [header, ...rows]
        .map((row) => row.map((cell) => `"${String(cell).replaceAll('"', '""')}"`).join(","))
        .join("\n");
      downloadText(`running-records-${todayIso()}.csv`, `\ufeff${csv}`, "text/csv;charset=utf-8");
      showToast("已匯出 CSV");
    }

    function downloadText(filename, text, type) {
      const blob = new Blob([text], { type });
      downloadBlob(filename, blob);
    }

    function downloadBlob(filename, blob) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function makeId() {
      if (window.crypto?.randomUUID) return window.crypto.randomUUID();
      return `run-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function showToast(message, options = {}) {
      const { actionLabel = "", onAction = null, duration = actionLabel ? 5200 : 1300 } = options;
      els.toast.replaceChildren();
      const text = document.createElement("span");
      text.className = "toast-message";
      text.textContent = message;
      els.toast.appendChild(text);

      if (actionLabel && typeof onAction === "function") {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "toast-action";
        button.textContent = actionLabel;
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          window.clearTimeout(showToast.timer);
          els.toast.classList.remove("show");
          onAction();
        });
        els.toast.appendChild(button);
      }

      els.toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        els.toast.classList.remove("show");
      }, duration);
    }
  </script>
</body>
</html>
