<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F5F7FA">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="燃速誌">
  <title>燃速誌</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #F5F7FA;
      --panel: #ffffff;
      --ink: #111827;
      --muted: #6B7280;
      --line: #F0F2F5;
      --track: #F97316;
      --track-soft: #FFF7ED;
      --sun: #FACC15;
      --coral: #EF4444;
      --sky: #0F172A;
      --sky-soft: #F3F4F6;
      --shadow: 0 16px 34px rgba(17, 24, 39, 0.1);
      --radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Roboto, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    .theme-wipe {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      background: var(--wipe-color);
      opacity: 1;
      animation: theme-wipe 520ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
      contain: paint;
      will-change: opacity;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(100%, 860px);
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 16px max(28px, env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .profile-card {
      --level-color: #FACC15;
      --level-soft: color-mix(in srgb, var(--level-color) 18%, #ffffff);
      display: grid;
      gap: 12px;
      margin-bottom: 12px;
      padding: 12px;
      border: 1px solid color-mix(in srgb, var(--level-color) 34%, var(--line));
      border-left: 6px solid var(--level-color);
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--level-soft), #ffffff 68%);
      box-shadow: 0 12px 28px rgba(17, 24, 39, 0.08);
      color: #111827;
      overflow: hidden;
    }

    .profile-main {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }

    .profile-avatar {
      display: grid;
      width: 44px;
      height: 44px;
      place-items: center;
      border-radius: 50%;
      background: color-mix(in srgb, var(--level-color) 72%, #111827);
      color: #ffffff;
      font-size: 1.25rem;
      font-weight: 1000;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.28);
    }

    .profile-fields {
      display: grid;
      gap: 8px;
    }

    .profile-inline {
      display: grid;
      grid-template-columns: minmax(0, 0.62fr) minmax(0, 1.38fr);
      gap: 8px;
    }

    .profile-field {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .profile-field span,
    .profile-level-label,
    .profile-next {
      color: rgba(17, 24, 39, 0.62);
      font-size: 0.68rem;
      font-weight: 900;
      line-height: 1;
    }

    .profile-field input {
      width: 100%;
      min-height: 34px;
      border: 1px solid rgba(17, 24, 39, 0.14);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.56);
      color: #111827;
      font-weight: 950;
      outline: 0;
      padding: 7px 8px;
      transition: border-color 150ms ease, box-shadow 150ms ease, background-color 150ms ease;
    }

    .profile-field input:focus {
      border-color: color-mix(in srgb, var(--level-color) 70%, #111827);
      background: rgba(255, 255, 255, 0.74);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--level-color) 24%, transparent);
    }

    .profile-level {
      display: grid;
      gap: 7px;
      align-content: center;
    }

    .profile-level-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }

    .profile-level-name {
      color: #111827;
      font-size: 1.02rem;
      font-weight: 1000;
      line-height: 1.05;
    }

    .profile-total {
      color: #111827;
      font-size: 1.1rem;
      font-weight: 1000;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .profile-level-bar {
      height: 7px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.1);
      overflow: hidden;
    }

    .profile-level-bar span {
      display: block;
      width: var(--profile-progress, 0%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ffffff, var(--level-color));
      transition: width 420ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 10px;
    }

    .brand-mark {
      display: grid;
      flex: 0 0 38px;
      width: 38px;
      height: 38px;
      place-items: center;
      border: 1px solid rgba(17, 24, 39, 0.12);
      border-radius: var(--radius);
      background: var(--ink);
      color: #ffffff;
    }

    h1 {
      margin: 0;
      font-size: 1.24rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .app-tabs,
    .segmented {
      display: grid;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #E5E7EB;
    }

    .app-tabs {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 12px;
    }

    .segmented {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-bottom: 12px;
    }

    .segmented.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      width: 132px;
      margin: 0;
    }

    .app-tabs button,
    .segmented button {
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #9CA3AF;
      cursor: pointer;
      font-weight: 800;
      transition: background-color 160ms ease, box-shadow 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .app-tabs button.active,
    .segmented button.active {
      background: var(--ink);
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(17, 24, 39, 0.16);
    }

    .view[hidden],
    .field.hidden {
      display: none;
    }

    .view {
      transform-origin: center 22px;
    }

    .view.view-enter {
      animation: view-enter 260ms cubic-bezier(0.2, 0.85, 0.22, 1) both;
    }

    .view.view-exit {
      animation: view-exit 170ms ease both;
      pointer-events: none;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .icon-button,
    .action-button {
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--ink);
      box-shadow: 0 6px 18px rgba(17, 24, 39, 0.08);
      cursor: pointer;
      transition: background-color 150ms ease, border-color 150ms ease, box-shadow 150ms ease, color 150ms ease, transform 150ms ease;
    }

    .icon-button {
      width: 42px;
      height: 42px;
    }

    .theme-toggle svg:last-child,
    html[data-theme="dark"] .theme-toggle svg:first-child {
      display: none;
    }

    html[data-theme="dark"] .theme-toggle svg:last-child {
      display: block;
    }

    .action-button {
      min-height: 44px;
      grid-auto-flow: column;
      gap: 8px;
      padding: 0 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .action-button.primary {
      border-color: var(--track);
      background: var(--track);
      color: #ffffff;
    }

    .action-button.secondary {
      background: var(--track-soft);
      border-color: rgba(249, 115, 22, 0.28);
      color: #9A3412;
    }

    .action-button.warning {
      background: #fff0ea;
      border-color: rgba(255, 90, 61, 0.28);
      color: #b63420;
    }

    .icon-button:hover,
    .action-button:hover {
      background: #F9FAFB;
      border-color: #D1D5DB;
      box-shadow: 0 8px 20px rgba(17, 24, 39, 0.1);
    }

    .icon-button:active,
    .action-button:active,
    .presets button:active {
      transform: scale(0.98);
    }

    .route-art {
      position: relative;
      overflow: hidden;
      min-height: 72px;
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #F3F4F6;
    }

    .route-art svg {
      display: block;
      width: 100%;
      height: 72px;
    }

    .route-art .sun {
      fill: var(--sun);
    }

    .route-art .hill {
      fill: #E5E7EB;
    }

    .route-art .route {
      fill: none;
      stroke: var(--track);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .route-art .dash {
      fill: none;
      stroke: rgba(255, 255, 255, 0.9);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 6 9;
    }

    .route-art .pin {
      fill: var(--coral);
      stroke: #ffffff;
      stroke-width: 3;
    }

    .result {
      padding: 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .result-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .result-kicker {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 800;
    }

    .result-value {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 8px;
      min-height: 56px;
    }

    .result-main {
      font-size: clamp(2.55rem, 13vw, 4.4rem);
      line-height: 0.95;
      color: var(--sky);
      font-weight: 900;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .result-unit {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .result-sub {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.35;
      font-size: 0.96rem;
      font-variant-numeric: tabular-nums;
    }

    .copy-button {
      flex: 0 0 42px;
      margin-top: 4px;
    }

    .form,
    .record-form {
      display: grid;
      gap: 9px;
      padding: 12px 14px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field-head,
    .section-head,
    .split-head,
    .record-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    label,
    .label {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 800;
    }

    .distance-line,
    .time-line,
    .record-grid,
    .actions-row {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
    }

    .distance-line {
      grid-template-columns: minmax(0, 1fr) 76px;
    }

    .time-line {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .pace-line {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .record-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .record-distance-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 96px;
      gap: 8px;
    }

    .record-grid .wide {
      grid-column: 1 / -1;
    }

    .zone-grid,
    .weather-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .weather-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .input-wrap {
      position: relative;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--ink);
      outline: none;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    input,
    select {
      min-height: 46px;
      padding: 14px 10px 6px;
      font-size: 1.03rem;
    }

    input {
      text-align: right;
    }

    select {
      appearance: none;
      text-align: center;
      cursor: pointer;
    }

    textarea {
      min-height: 76px;
      resize: vertical;
      padding: 10px 11px;
      line-height: 1.45;
      font-size: 0.98rem;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--sky);
      box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.1);
    }

    input[type="date"] {
      text-align: left;
    }

    .input-unit {
      position: absolute;
      top: 6px;
      right: 12px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 900;
      pointer-events: none;
    }

    .distance-unit {
      display: grid;
      min-height: 46px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #F9FAFB;
      color: var(--ink);
      cursor: pointer;
      font-size: 1.04rem;
      font-weight: 900;
      transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
    }

    .distance-unit:hover {
      border-color: rgba(249, 115, 22, 0.42);
      box-shadow: 0 8px 18px rgba(17, 24, 39, 0.08);
      transform: translateY(-1px);
    }

    .presets {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 7px;
    }

    .presets button {
      min-height: 42px;
      border: 1px solid rgba(249, 115, 22, 0.28);
      border-radius: var(--radius);
      background: var(--track-soft);
      color: #9A3412;
      cursor: pointer;
      font-size: 0.86rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .presets button:nth-child(4),
    .presets button:nth-child(5) {
      background: #fff3d7;
      border-color: rgba(255, 176, 0, 0.36);
      color: #8a5c00;
    }

    .presets button.active {
      background: var(--track);
      border-color: var(--track);
      color: #ffffff;
    }

    .split-band {
      border-top: 1px solid var(--line);
      background: #fff7e5;
      padding: 14px 16px 16px;
    }

    .converter-band {
      border-top: 1px solid var(--line);
      background: #F9FAFB;
      padding: 14px 16px 16px;
    }

    .converter-band .split-head .label {
      color: #9A3412;
    }

    .converter-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .split-head {
      margin-bottom: 10px;
    }

    .split-head .label {
      color: #8a5c00;
    }

    .split-grid,
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .split-item,
    .summary-item {
      min-height: 58px;
      border: 1px solid rgba(255, 176, 0, 0.28);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.82);
      padding: 9px 10px;
    }

    .split-distance,
    .summary-label,
    .record-meta,
    .record-mini {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .split-time,
    .summary-value {
      margin-top: 4px;
      color: var(--ink);
      font-size: 1.05rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .records-layout {
      display: grid;
      gap: 16px;
    }

    .record-surface {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .section-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0;
    }

    .summary-band {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: #F9FAFB;
    }

    .summary-item {
      position: relative;
      min-height: 52px;
      border-color: #F1F1F1;
      background: #ffffff;
      padding: 8px 10px;
      overflow: visible;
    }

    .summary-item:first-child,
    .summary-item:nth-child(2) {
      display: grid;
      align-content: center;
      gap: 2px;
      border-left: 3px solid var(--track);
      background: #ffffff;
      border-color: #F1F1F1;
      padding: 9px 11px;
    }

    .summary-item:first-child .summary-value,
    .summary-item:nth-child(2) .summary-value {
      order: -1;
      margin-top: 0;
      font-size: 1.74rem;
      line-height: 0.98;
      color: var(--sky);
    }

    .summary-item.is-bumped .summary-value {
      animation: stat-bump 520ms cubic-bezier(0.2, 1.2, 0.26, 1) both;
    }

    .summary-value.is-counting {
      animation: stat-count 360ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .summary-bonus {
      position: absolute;
      top: 8px;
      right: 9px;
      z-index: 2;
      color: var(--track);
      font-size: 0.9rem;
      font-weight: 1000;
      line-height: 1;
      text-shadow: 0 2px 8px rgba(249, 115, 22, 0.2);
      animation: bonus-pop 880ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
      pointer-events: none;
      white-space: nowrap;
    }

    .file-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .file-name {
      min-height: 44px;
      display: grid;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--muted);
      padding: 0 12px;
      font-size: 0.88rem;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .route-file-line {
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .file-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .file-button {
      min-height: 44px;
      padding: 0 12px;
    }

    .route-clear-button {
      width: 44px;
      height: 44px;
      box-shadow: none;
    }

    .list-head {
      margin: 18px 0 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .list-head .section-title {
      display: flex;
      align-items: center;
      flex: 0 0 auto;
      gap: 7px;
      white-space: nowrap;
    }

    .list-head .section-title::before {
      content: "";
      flex: 0 0 8px;
      width: 8px;
      height: 24px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--coral), var(--track));
    }

    .record-tools,
    .insights-panel,
    .achievements-panel,
    .calendar-panel,
    .records-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: 0 8px 22px rgba(17, 24, 39, 0.045);
    }

    .record-tools {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
      padding: 10px;
    }

    .tool-row {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(0, 1fr);
      gap: 8px;
    }

    .record-tools input,
    .record-tools select {
      min-height: 42px;
      padding-top: 13px;
      font-size: 0.96rem;
    }

    .search-wrap input {
      padding-left: 34px;
    }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      width: 16px;
      height: 16px;
      color: var(--muted);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .insights-panel {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
      padding: 10px;
    }

    .collapsible-panel {
      overflow: hidden;
    }

    .collapsible-toggle {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--ink);
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      text-align: left;
      cursor: pointer;
      font: inherit;
    }

    .collapsible-title {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .collapsible-kicker {
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 900;
    }

    .collapsible-title strong {
      color: var(--ink);
      font-size: 0.96rem;
      line-height: 1.15;
      font-weight: 1000;
      white-space: nowrap;
    }

    .collapsible-control {
      display: inline-grid;
      grid-auto-flow: column;
      align-items: center;
      gap: 6px;

      font-variant-numeric: tabular-nums;

    .achievement-tab {

      height: 30px;

      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 4px;
    }

      outline: none;

    }

      animation: calendar-slide-next 230ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .calendar-grid.calendar-slide-prev {
      animation: calendar-slide-prev 230ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

      gap: 6px;

      border-color: var(--line);
      background: #ffffff;

      color: #ffffff;

      line-height: 1.1;

      padding: 9px;
    }

    .heart-values {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .heart-value {
      min-height: 44px;
      border-top: 0;
      border-left: 3px solid rgba(239, 68, 68, 0.74);
      background: #ffffff;
      padding: 6px 8px;
    }

    .heart-value .record-mini {
      color: #9CA3AF;
      font-size: 0.72rem;
      font-weight: 800;
    }

    .heart-value strong {
      display: flex;
      align-items: baseline;
      gap: 4px;
      margin-top: 1px;
      color: var(--ink);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .heart-number {
      font-size: 1.42rem;
      font-weight: 900;
    }

    .heart-unit {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 900;
    }

    .zone-bars {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
      align-items: end;
      min-height: 74px;
      padding-top: 4px;
    }

    .zone-bar-item {
      display: grid;
      gap: 4px;
      align-content: end;
      min-width: 0;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 900;
      text-align: center;
    }

    .zone-bar-track {
      display: flex;
      align-items: end;
      height: 42px;
      border-radius: 3px;
      background: #E5E7EB;
      overflow: hidden;
    }

    .zone-bar-fill {
      width: 100%;
      min-height: 2px;
      border-radius: 3px 3px 0 0;
    }

    .weather-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      border-left: 3px solid #E5E7EB;
      border-radius: 6px;
      background: #ffffff;
      padding: 9px;
    }

    .weather-item {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 5px;
      align-items: center;
      min-width: 0;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .weather-icon {
      display: grid;
      width: 22px;
      height: 22px;
      place-items: center;
      color: #4B5563;
    }

    .weather-item strong {
      display: block;
      color: var(--ink);
      font-size: 0.84rem;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .record-notes {
      border-left: 3px solid rgba(249, 115, 22, 0.38);
      color: var(--muted);
      padding-left: 8px;
      font-size: 0.82rem;
      font-weight: 800;
      line-height: 1.45;
    }

    .list-actions {
      display: flex;
      flex-wrap: nowrap;
      justify-content: flex-end;
      gap: 6px;
      min-width: 0;
    }

    .list-actions .action-button {
      min-height: 38px;
      gap: 5px;
      padding: 0 8px;
      border-color: #F1F1F1;
      box-shadow: none;
      font-size: 0.88rem;
    }

    .empty-state {
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      padding: 18px;
      text-align: center;
      font-weight: 900;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      pointer-events: none;
      border-radius: 999px;
      background: #202124;
      color: #ffffff;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-weight: 800;
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 10;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }

    .toast-action {
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      color: #ffffff;
      cursor: pointer;
      font-weight: 900;
      padding: 5px 9px;
    }

    .toast-action:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    .share-sheet[hidden] {
      display: none;
    }

    .share-sheet {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .share-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.42);
      backdrop-filter: blur(6px);
    }

    .share-panel {
      position: relative;
      z-index: 1;
      width: min(100%, 420px);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      color: var(--ink);
      box-shadow: 0 28px 80px rgba(17, 24, 39, 0.26);
      padding: 16px;
      animation: share-panel-enter 220ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .share-panel-head,
    .share-panel-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .share-panel-head span {
      display: block;
      color: var(--track);
      font-size: 0.68rem;
      font-weight: 1000;
      line-height: 1;
      text-transform: uppercase;
    }

    .share-panel-head strong {
      display: block;
      margin-top: 4px;
      font-size: 1.1rem;
      font-weight: 1000;
    }

    .share-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .share-option {
      display: grid;
      gap: 6px;
    }

    .share-option span,
    .share-hint {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .share-hint {
      margin: 12px 0 0;
      line-height: 1.5;
    }

    .share-panel-actions {
      justify-content: flex-end;
      margin-top: 16px;
    }

    html[data-theme="dark"] {
      --bg: #000000;
      --panel: #000000;
      --ink: #F9FAFB;
      --muted: #9CA3AF;
      --line: #26303B;
      --track-soft: rgba(249, 115, 22, 0.14);
      --sky: #F9FAFB;
      --sky-soft: #000000;
      --shadow: 0 16px 34px rgba(0, 0, 0, 0.34);
    }

    html[data-theme="dark"] .brand-mark,
    html[data-theme="dark"] .segmented button.active,
    html[data-theme="dark"] .app-tabs button.active,
    html[data-theme="dark"] .record-card-actions .details-toggle {
      background: #000000;
      color: #F9FAFB;
      box-shadow: inset 0 0 0 1px #F9FAFB;
    }

    html[data-theme="dark"] .panel,
    html[data-theme="dark"] .record-surface,
    html[data-theme="dark"] .section-head,
    html[data-theme="dark"] .record-card,
    html[data-theme="dark"] .record-card-head,
    html[data-theme="dark"] .record-card-body,
    html[data-theme="dark"] .record-tools,
    html[data-theme="dark"] .insights-panel,
    html[data-theme="dark"] .achievements-panel,
    html[data-theme="dark"] .calendar-panel,
    html[data-theme="dark"] .records-panel,
    html[data-theme="dark"] .insight-card,
    html[data-theme="dark"] .pb-card,
    html[data-theme="dark"] .analysis-card,
    html[data-theme="dark"] .achievement-tab,
    html[data-theme="dark"] .achievement-item,
    html[data-theme="dark"] .heart-panel,
    html[data-theme="dark"] .heart-value,
    html[data-theme="dark"] .detail-metric,
    html[data-theme="dark"] .weather-row,
    html[data-theme="dark"] .file-name,
    html[data-theme="dark"] .share-panel,
    html[data-theme="dark"] .icon-button,
    html[data-theme="dark"] .action-button,
    html[data-theme="dark"] input,
    html[data-theme="dark"] select,
    html[data-theme="dark"] textarea {
      background: #000000;
      color: var(--ink);
    }

    html[data-theme="dark"] .app-tabs,
    html[data-theme="dark"] .segmented,
    html[data-theme="dark"] .summary-band,
    html[data-theme="dark"] .converter-band,
    html[data-theme="dark"] .record-detail-panel,
    html[data-theme="dark"] .route-art,
    html[data-theme="dark"] .distance-unit {
      background: #000000;
    }

    html[data-theme="dark"] .split-band {
      background: #000000;
    }

    html[data-theme="dark"] .summary-item,
    html[data-theme="dark"] .split-item,
    html[data-theme="dark"] .achievement-mark {
      background: #000000;
      border-color: var(--line);
    }

    html[data-theme="dark"] .share-backdrop {
      background: rgba(0, 0, 0, 0.72);
    }

    html[data-theme="dark"] .calendar-day.has-run {
      background: #000000;
      border-color: var(--run-border, rgba(249, 115, 22, 0.34));
      color: var(--ink);
      box-shadow: inset 0 -3px 0 var(--run-distance, var(--track));
    }

    html[data-theme="dark"] .calendar-day.today {
      box-shadow: inset 0 0 0 2px var(--track);
    }

    html[data-theme="dark"] .record-card:hover {
      border-color: rgba(249, 115, 22, 0.34);
      box-shadow: 0 20px 36px rgba(0, 0, 0, 0.42);
    }

    html[data-theme="dark"] .record-card-actions .details-toggle:hover,
    html[data-theme="dark"] .record-card-actions .details-toggle.active {
      background: var(--track);
      border-color: var(--track);
      color: #ffffff;
    }

    html[data-theme="dark"] .icon-button:hover,
    html[data-theme="dark"] .action-button:hover {
      background: #000000;
      border-color: #374151;
    }

    html[data-theme="dark"] .chart-tooltip {
      background: #000000;
      border-color: #374151;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.34);
    }

    html[data-theme="dark"] .chart-point {
      fill: #000000;
    }

    html[data-theme="dark"] .profile-card {
      --level-soft: color-mix(in srgb, var(--level-color) 28%, #000000);
      background: linear-gradient(135deg, var(--level-soft), #000000 72%);
      border-color: color-mix(in srgb, var(--level-color) 46%, #26303B);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.42);
      color: #F9FAFB;
    }

    html[data-theme="dark"] .profile-field span,
    html[data-theme="dark"] .profile-level-label,
    html[data-theme="dark"] .profile-next {
      color: rgba(249, 250, 251, 0.66);
    }

    html[data-theme="dark"] .profile-field input {
      background: rgba(0, 0, 0, 0.46);
      border-color: rgba(249, 250, 251, 0.18);
      color: #F9FAFB;
    }

    html[data-theme="dark"] .profile-field input:focus {
      border-color: color-mix(in srgb, var(--level-color) 62%, #F9FAFB);
      background: rgba(0, 0, 0, 0.62);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--level-color) 24%, transparent);
    }

    html[data-theme="dark"] .profile-level-name,
    html[data-theme="dark"] .profile-total {
      color: #F9FAFB;
    }

    html[data-theme="dark"] .profile-level-bar {
      background: rgba(249, 250, 251, 0.12);
    }

    html[data-theme="dark"] .achievement-item.hidden-locked {
      background: linear-gradient(135deg, rgba(127, 29, 29, 0.18), #000000);
      border-color: rgba(249, 250, 251, 0.24);
    }

    html[data-theme="dark"] input:focus,
    html[data-theme="dark"] select:focus,
    html[data-theme="dark"] textarea:focus {
      border-color: #F9FAFB;
      box-shadow: 0 0 0 3px rgba(249, 250, 251, 0.12);
    }

    @media (min-width: 720px) {
      .app {
        padding-top: 28px;
      }

      .main-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 240px;
        gap: 14px;
        align-items: start;
      }

      .profile-card {
        grid-template-columns: minmax(0, 1fr) minmax(220px, 0.58fr);
        align-items: center;
      }

      .route-art {
        min-height: 100%;
        margin: 0;
      }

      .route-art svg {
        height: 100%;
        min-height: 358px;
      }

      .split-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .records-layout {
        gap: 24px;
        grid-template-columns: minmax(0, 1.04fr) minmax(300px, 0.96fr);
        align-items: start;
      }

      .list-head {
        margin-top: 0;
      }
    }

    @media (max-width: 420px) {
      .topbar {
        align-items: flex-start;
      }

      .segmented.two {
        width: 118px;
      }

      .top-actions {
        gap: 6px;
      }

      .theme-toggle {
        width: 38px;
        height: 38px;
      }

      .profile-card {
        padding: 10px;
      }

      .profile-inline {
        grid-template-columns: 1fr;
      }

      .presets {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .list-head {
        align-items: center;
        gap: 6px;
      }

      .list-head .section-title {
        font-size: 0.95rem;
      }

      .list-head .section-title::before {
        flex-basis: 7px;
        width: 7px;
        height: 22px;
      }

      .list-actions {
        gap: 4px;
      }

      .list-actions .action-button {
        min-height: 38px;
        gap: 4px;
        padding: 0 7px;
        font-size: 0.84rem;
      }

      .list-actions .action-button svg {
        width: 16px;
        height: 16px;
      }

      .records-panel-head {
        flex-wrap: wrap;
      }

      .record-list-controls {
        width: 100%;
        justify-content: space-between;
      }

      .time-line,
      .converter-grid,
      .record-grid,
      .record-stats,
      .tool-row,
      .insight-grid,
      .pb-grid,
      .analysis-grid,
      .weather-row,
      .zone-grid,
      .weather-grid {
        grid-template-columns: 1fr 1fr;
      }

      .analysis-card.wide,
      .metric-grid {
        grid-column: 1 / -1;
      }

      .metric-grid {
        grid-template-columns: 1fr;
      }

      .time-line .input-wrap:first-child,
      .record-grid .wide,
      .record-grid .full-mobile {
        grid-column: 1 / -1;
      }

      .record-card-body {
        grid-template-columns: minmax(0, 1fr) 74px;
      }

      .share-sheet {
        align-items: end;
        place-items: end center;
        padding: 10px;
      }

      .share-panel {
        width: 100%;
        border-radius: 18px 18px 12px 12px;
      }

      .share-options {
        grid-template-columns: 1fr;
      }

      .record-distance-line {
        grid-template-columns: minmax(0, 1fr) 78px;
      }

      input,
      select {
        font-size: 1.04rem;
        padding-left: 8px;
        padding-right: 8px;
      }
    }

    @keyframes theme-wipe {
      0% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes view-enter {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.985);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes view-exit {
      from {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      to {
        opacity: 0;
        transform: translateY(-8px) scale(0.992);
      }
    }

    @keyframes share-panel-enter {
      from {
        opacity: 0;
        transform: translate3d(0, 12px, 0) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    @keyframes stat-bump {
      0% {
        transform: translateY(0) scale(1);
      }

      38% {
        transform: translateY(-3px) scale(1.08);
      }

      100% {
        transform: translateY(0) scale(1);
      }
    }

    @keyframes bonus-pop {
      0% {
        opacity: 0;
        transform: translateY(8px) scale(0.76);
      }

      18% {
        opacity: 1;
        transform: translateY(-4px) scale(1.16);
      }

      72% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translateY(-34px) scale(1);
      }
    }

    @keyframes chart-draw {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes point-pop {
      0% {
        opacity: 0.85;
        transform: scale(1);
        transform-box: fill-box;
        transform-origin: center;
      }

      46% {
        opacity: 1;
        transform: scale(1.55);
      }

      100% {
        opacity: 0.9;
        transform: scale(1);
      }
    }

    @keyframes calendar-press {
      0% {
        transform: scale(1);
      }

      45% {
        transform: scale(0.96);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes calendar-slide-next {
      from {
        opacity: 0;
        transform: translateX(10px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes calendar-slide-prev {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes record-card-enter {
      0% {
        opacity: 0;
        transform: translateY(-10px) scale(0.98);
      }

      54% {
        opacity: 1;
        transform: translateY(3px) scale(1.012);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M5.4 4.8a9 9 0 1 0 13.2 0" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            <path d="M9 2h6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </div>
        <h1>燃速誌</h1>
      </div>

      <div class="top-actions">
        <button type="button" class="icon-button theme-toggle" id="themeToggle" aria-label="深色模式" title="深色模式" aria-pressed="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 3v2M12 19v2M5.6 5.6 7 7M17 17l1.4 1.4M3 12h2M19 12h2M5.6 18.4 7 17M17 7l1.4-1.4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
          </svg>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M20 15.2A7.7 7.7 0 0 1 8.8 4 8.5 8.5 0 1 0 20 15.2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>

    <section class="profile-card" id="profileCard" aria-label="個人檔案">
      <div class="profile-main">
        <div class="profile-avatar" id="profileAvatar" aria-hidden="true">R</div>
        <div class="profile-fields">
          <label class="profile-field" for="profileName">
            <span>名字</span>
            <input id="profileName" type="text" autocomplete="name" placeholder="Runner">
          </label>
          <div class="profile-inline">
            <label class="profile-field" for="profileAge">
              <span>歲數</span>
              <input id="profileAge" type="number" min="0" max="120" inputmode="numeric" placeholder="--">
            </label>
            <label class="profile-field" for="profileGoal">
              <span>目標</span>
              <input id="profileGoal" type="text" autocomplete="off" placeholder="本月 50 km">
            </label>
          </div>
        </div>
      </div>
      <div class="profile-level">
        <div class="profile-level-label">累積等級</div>
        <div class="profile-level-row">
          <div class="profile-level-name" id="profileLevelName">Lv.1</div>
          <div class="profile-total" id="profileTotalKm">0 km</div>
        </div>
        <div class="profile-level-bar" aria-hidden="true">
          <span id="profileLevelFill"></span>
        </div>
        <div class="profile-next" id="profileNextLevel">開始累積第一筆跑步</div>
      </div>
    </section>

    <nav class="app-tabs" aria-label="頁面">
      <button type="button" class="active" data-view="calculator">配速</button>
      <button type="button" data-view="records">紀錄</button>
    </nav>

    <section class="view" id="calculatorView">
      <div class="main-grid">
        <section class="panel" aria-label="配速計算">
          <nav class="segmented" aria-label="計算模式">
            <button type="button" class="active" data-mode="pace">配速</button>
            <button type="button" data-mode="finish">完賽</button>
            <button type="button" data-mode="distance">距離</button>
          </nav>

          <section class="result" aria-live="polite">
            <div class="result-row">
              <div>
                <p class="result-kicker" id="resultKicker">每公里配速</p>
                <div class="result-value">
                  <span class="result-main" id="resultMain">5:00</span>
                  <span class="result-unit" id="resultUnit">/km</span>
                </div>
                <p class="result-sub" id="resultSub">5.00 km · 25:00</p>
              </div>
              <button type="button" class="icon-button copy-button" id="copyButton" aria-label="複製結果" title="複製結果">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <rect x="8" y="8" width="11" height="12" rx="2" stroke="currentColor" stroke-width="2"/>
                  <path d="M5 16V6a2 2 0 0 1 2-2h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
          </section>

    function showView(view) {
      const next = els.views[view];
      if (!next) return;
      const currentEntry = Object.entries(els.views).find(([, section]) => !section.hidden);
      const current = currentEntry?.[1];
      els.viewButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.view === view);
      });

      if (!current || current === next || motionQuery.matches) {
        Object.entries(els.views).forEach(([key, section]) => {
          section.hidden = key !== view;
          section.classList.remove("view-enter", "view-exit");
        });
        return;
      }

      current.classList.remove("view-enter");
      current.classList.add("view-exit");
      next.hidden = false;
      next.classList.remove("view-exit");
      next.classList.add("view-enter");

      current.addEventListener("animationend", () => {
        current.hidden = true;
        current.classList.remove("view-exit");
      }, { once: true });
      next.addEventListener("animationend", () => {
        next.classList.remove("view-enter");
      }, { once: true });
    }

    function loadJson(key, fallback) {
      try {
        const parsed = JSON.parse(localStorage.getItem(key) || "null");
        return parsed == null ? structuredClone(fallback) : parsed;
      } catch {
        return structuredClone(fallback);
      }
    }

    function saveJson(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
        return true;
      } catch {
        showToast("儲存空間不足");
        return false;
      }
    }

    function saveCalc() {

      if (saved) {
        renderRecords();
      }
      return saved;
    }

    }

    function applyTheme(theme) {
      const activeTheme = theme === "dark" ? "dark" : "light";
      prefState.theme = activeTheme;
      document.documentElement.dataset.theme = activeTheme;
      const isDark = activeTheme === "dark";
      els.themeToggle.setAttribute("aria-pressed", String(isDark));
      els.themeToggle.setAttribute("aria-label", isDark ? "淺色模式" : "深色模式");
      els.themeToggle.title = isDark ? "淺色模式" : "深色模式";
      document.querySelector('meta[name="theme-color"]')?.setAttribute("content", isDark ? "#000000" : "#F5F7FA");
    }

    function animateThemeChange(theme) {
      const nextTheme = theme === "dark" ? "dark" : "light";
      prefState.theme = nextTheme;
      if (motionQuery.matches) {
        applyTheme(nextTheme);
        return;
      }

      const wipe = document.createElement("div");
      wipe.className = "theme-wipe";
      wipe.setAttribute("aria-hidden", "true");
      const currentBg = getComputedStyle(document.documentElement).getPropertyValue("--bg").trim() || (prefState.theme === "dark" ? "#000000" : "#F5F7FA");
      wipe.style.setProperty("--wipe-color", currentBg);
      document.body.appendChild(wipe);
      wipe.getBoundingClientRect();
      applyTheme(nextTheme);
      wipe.addEventListener("animationend", () => wipe.remove(), { once: true });
      window.setTimeout(() => wipe.remove(), 700);
    }

      els.recordSearch.value = prefState.search || "";

    function hydrateDashboardPanels() {
      prefState.dashboardOpen = { ...DEFAULT_PREF_STATE.dashboardOpen, ...(prefState.dashboardOpen || {}) };
      els.collapseToggles.forEach((button) => {
        const key = button.dataset.collapseToggle;

      });

    function toggleDashboardPanel(key) {
      const isOpen = prefState.dashboardOpen?.[key] !== false;
      setDashboardPanel(key, !isOpen, true);
    }

    function setDashboardPanel(key, isOpen, persist = true) {
      if (!key) return;
      prefState.dashboardOpen = { ...DEFAULT_PREF_STATE.dashboardOpen, ...(prefState.dashboardOpen || {}) };
      prefState.dashboardOpen[key] = Boolean(isOpen);
      const button = document.querySelector(`[data-collapse-toggle="${key}"]`);
      const body = document.querySelector(`[data-collapse-body="${key}"]`);
      const panel = button?.closest(".collapsible-panel")
        || body?.closest(".collapsible-panel");
      panel?.classList.toggle("is-collapsed", !isOpen);
      if (button) {
        button.setAttribute("aria-expanded", String(isOpen));
        const state = button.querySelector("[data-collapse-state]");
        if (state) state.textContent = isOpen ? "收合" : "展開";
      }
      if (body) {
        body.setAttribute("aria-hidden", String(!isOpen));
        if (persist && !motionQuery.matches) {
          animateCollapseBody(body, isOpen);
        } else {
          body.hidden = !isOpen;
          body.classList.remove("is-animating");
          body.style.height = "";
          body.style.opacity = "";
          body.style.transform = "";
        }
      }
      if (persist) savePrefs();
    }

    function animateCollapseBody(body, isOpen) {
      body.classList.remove("is-animating");
      body.style.overflow = "hidden";
      body.style.height = "";
      body.style.opacity = "";
      body.style.transform = "";

      if (isOpen) {
        body.hidden = false;
        body.style.height = "0px";
        body.style.opacity = "0";
        body.style.transform = "translateY(-4px)";
        body.getBoundingClientRect();
        body.classList.add("is-animating");
        body.style.height = `${body.scrollHeight}px`;
        body.style.opacity = "1";
        body.style.transform = "translateY(0)";
      } else {
        body.style.height = `${body.scrollHeight}px`;
        body.style.opacity = "1";
        body.style.transform = "translateY(0)";
        body.getBoundingClientRect();
        body.classList.add("is-animating");
        body.style.height = "0px";
        body.style.opacity = "0";
        body.style.transform = "translateY(-4px)";
      }

      const finish = (event) => {
        if (event.propertyName !== "height") return;
        body.removeEventListener("transitionend", finish);
        body.classList.remove("is-animating");
        body.style.overflow = "";
        body.style.height = "";
        body.style.opacity = "";
        body.style.transform = "";
        if (!isOpen) body.hidden = true;
      };
      body.addEventListener("transitionend", finish);
    }

        button.classList.toggle("active", Math.abs(number(calcState.distance) - distance) < 0.01);
        button.addEventListener("click", () => {

    function renderSplits(paceSeconds) {
      els.splitGrid.innerHTML = "";
      presetDistances.forEach((preset) => {
        const distance = presetValue(preset);
        const split = document.createElement("div");
        split.className = "split-item";
