<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F5F7FA">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="配速紀錄">
  <title>配速紀錄</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #F5F7FA;
      --panel: #ffffff;
      --ink: #111827;
      --muted: #6B7280;
      --line: #F0F2F5;
      --track: #F97316;
      --track-soft: #FFF7ED;
      --sun: #FACC15;
      --coral: #EF4444;
      --sky: #0F172A;
      --sky-soft: #F3F4F6;
      --shadow: 0 16px 34px rgba(17, 24, 39, 0.1);
      --radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Roboto, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    .theme-wipe {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      background: var(--wipe-color);
      opacity: 1;
      animation: theme-wipe 520ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
      contain: paint;
      will-change: opacity;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(100%, 860px);
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 16px max(28px, env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 10px;
    }

    .brand-mark {
      display: grid;
      flex: 0 0 38px;
      width: 38px;
      height: 38px;
      place-items: center;
      border: 1px solid rgba(17, 24, 39, 0.12);
      border-radius: var(--radius);
      background: var(--ink);
      color: #ffffff;
    }

    h1 {
      margin: 0;
      font-size: 1.24rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .app-tabs,
    .segmented {
      display: grid;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #E5E7EB;
    }

    .app-tabs {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-bottom: 12px;
    }

    .segmented {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-bottom: 12px;
    }

    .segmented.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      width: 132px;
      margin: 0;
    }

    .app-tabs button,
    .segmented button {
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #9CA3AF;
      cursor: pointer;
      font-weight: 800;
      transition: background-color 160ms ease, box-shadow 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .app-tabs button.active,
    .segmented button.active {
      background: var(--ink);
      color: #ffffff;
      box-shadow: 0 8px 18px rgba(17, 24, 39, 0.16);
    }

    .view[hidden],
    .field.hidden {
      display: none;
    }

    .view {
      transform-origin: center 22px;
    }

    .view.view-enter {
      animation: view-enter 260ms cubic-bezier(0.2, 0.85, 0.22, 1) both;
    }

    .view.view-exit {
      animation: view-exit 170ms ease both;
      pointer-events: none;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .icon-button,
    .action-button {
      display: inline-grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--ink);
      box-shadow: 0 6px 18px rgba(17, 24, 39, 0.08);
      cursor: pointer;
      transition: background-color 150ms ease, border-color 150ms ease, box-shadow 150ms ease, color 150ms ease, transform 150ms ease;
    }

    .icon-button {
      width: 42px;
      height: 42px;
    }

    .theme-toggle svg:last-child,
    html[data-theme="dark"] .theme-toggle svg:first-child {
      display: none;
    }

    html[data-theme="dark"] .theme-toggle svg:last-child {
      display: block;
    }

    .action-button {
      min-height: 44px;
      grid-auto-flow: column;
      gap: 8px;
      padding: 0 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .action-button.primary {
      border-color: var(--track);
      background: var(--track);
      color: #ffffff;
    }

    .action-button.secondary {
      background: var(--track-soft);
      border-color: rgba(249, 115, 22, 0.28);
      color: #9A3412;
    }

    .action-button.warning {
      background: #fff0ea;
      border-color: rgba(255, 90, 61, 0.28);
      color: #b63420;
    }

    .icon-button:hover,
    .action-button:hover {
      background: #F9FAFB;
      border-color: #D1D5DB;
      box-shadow: 0 8px 20px rgba(17, 24, 39, 0.1);
    }

    .icon-button:active,
    .action-button:active,
    .presets button:active {
      transform: scale(0.98);
    }

    .route-art {
      position: relative;
      overflow: hidden;
      min-height: 72px;
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #F3F4F6;
    }

    .route-art svg {
      display: block;
      width: 100%;
      height: 72px;
    }

    .route-art .sun {
      fill: var(--sun);
    }

    .route-art .hill {
      fill: #E5E7EB;
    }

    .route-art .route {
      fill: none;
      stroke: var(--track);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .route-art .dash {
      fill: none;
      stroke: rgba(255, 255, 255, 0.9);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 6 9;
    }

    .route-art .pin {
      fill: var(--coral);
      stroke: #ffffff;
      stroke-width: 3;
    }

    .result {
      padding: 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .result-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .result-kicker {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 800;
    }

    .result-value {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 8px;
      min-height: 56px;
    }

    .result-main {
      font-size: clamp(2.55rem, 13vw, 4.4rem);
      line-height: 0.95;
      color: var(--sky);
      font-weight: 900;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .result-unit {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .result-sub {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.35;
      font-size: 0.96rem;
      font-variant-numeric: tabular-nums;
    }

    .copy-button {
      flex: 0 0 42px;
      margin-top: 4px;
    }

    .form,
    .record-form {
      display: grid;
      gap: 9px;
      padding: 12px 14px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field-head,
    .section-head,
    .split-head,
    .record-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    label,
    .label {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 800;
    }

    .distance-line,
    .time-line,
    .record-grid,
    .actions-row {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
    }

    .distance-line {
      grid-template-columns: minmax(0, 1fr) 76px;
    }

    .time-line {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .pace-line {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .record-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .record-distance-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 96px;
      gap: 8px;
    }

    .record-grid .wide {
      grid-column: 1 / -1;
    }

    .zone-grid,
    .weather-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .weather-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .input-wrap {
      position: relative;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--ink);
      outline: none;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    input,
    select {
      min-height: 46px;
      padding: 14px 10px 6px;
      font-size: 1.03rem;
    }

    input {
      text-align: right;
    }

    select {
      appearance: none;
      text-align: center;
      cursor: pointer;
    }

    textarea {
      min-height: 76px;
      resize: vertical;
      padding: 10px 11px;
      line-height: 1.45;
      font-size: 0.98rem;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--sky);
      box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.1);
    }

    input[type="date"] {
      text-align: left;
    }

    .input-unit {
      position: absolute;
      top: 6px;
      right: 12px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 900;
      pointer-events: none;
    }

    .distance-unit {
      display: grid;
      min-height: 46px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #F9FAFB;
      color: var(--ink);
      font-size: 1.04rem;
      font-weight: 900;
    }

    .presets {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 7px;
    }

    .presets button {
      min-height: 42px;
      border: 1px solid rgba(249, 115, 22, 0.28);
      border-radius: var(--radius);
      background: var(--track-soft);
      color: #9A3412;
      cursor: pointer;
      font-size: 0.86rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .presets button:nth-child(4),
    .presets button:nth-child(5) {
      background: #fff3d7;
      border-color: rgba(255, 176, 0, 0.36);
      color: #8a5c00;
    }

    .presets button.active {
      background: var(--track);
      border-color: var(--track);
      color: #ffffff;
    }

    .split-band {
      border-top: 1px solid var(--line);
      background: #fff7e5;
      padding: 14px 16px 16px;
    }

    .converter-band {
      border-top: 1px solid var(--line);
      background: #F9FAFB;
      padding: 14px 16px 16px;
    }

    .converter-band .split-head .label {
      color: #9A3412;
    }

    .converter-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .split-head {
      margin-bottom: 10px;
    }

    .split-head .label {
      color: #8a5c00;
    }

    .split-grid,
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .split-item,
    .summary-item {
      min-height: 58px;
      border: 1px solid rgba(255, 176, 0, 0.28);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.82);
      padding: 9px 10px;
    }

    .split-distance,
    .summary-label,
    .record-meta,
    .record-mini {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .split-time,
    .summary-value {
      margin-top: 4px;
      color: var(--ink);
      font-size: 1.05rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .records-layout {
      display: grid;
      gap: 16px;
    }

    .record-surface {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .section-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0;
    }

    .summary-band {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: #F9FAFB;
    }

    .summary-item {
      position: relative;
      min-height: 52px;
      border-color: #F1F1F1;
      background: #ffffff;
      padding: 8px 10px;
      overflow: visible;
    }

    .summary-item:first-child,
    .summary-item:nth-child(2) {
      display: grid;
      align-content: center;
      gap: 2px;
      border-left: 3px solid var(--track);
      background: #ffffff;
      border-color: #F1F1F1;
      padding: 9px 11px;
    }

    .summary-item:first-child .summary-value,
    .summary-item:nth-child(2) .summary-value {
      order: -1;
      margin-top: 0;
      font-size: 1.74rem;
      line-height: 0.98;
      color: var(--sky);
    }

    .summary-item.is-bumped .summary-value {
      animation: stat-bump 520ms cubic-bezier(0.2, 1.2, 0.26, 1) both;
    }

    .summary-value.is-counting {
      animation: stat-count 360ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .summary-bonus {
      position: absolute;
      top: 8px;
      right: 9px;
      z-index: 2;
      color: var(--track);
      font-size: 0.9rem;
      font-weight: 1000;
      line-height: 1;
      text-shadow: 0 2px 8px rgba(249, 115, 22, 0.2);
      animation: bonus-pop 880ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
      pointer-events: none;
      white-space: nowrap;
    }

    .text-tools {
      display: grid;
      gap: 10px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .file-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .file-name {
      min-height: 44px;
      display: grid;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--muted);
      padding: 0 12px;
      font-size: 0.88rem;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .list-head {
      margin: 18px 0 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .list-head .section-title {
      display: flex;
      align-items: center;
      flex: 0 0 auto;
      gap: 7px;
      white-space: nowrap;
    }

    .list-head .section-title::before {
      content: "";
      flex: 0 0 8px;
      width: 8px;
      height: 24px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--coral), var(--track));
    }

    .record-tools,
    .insights-panel,
    .calendar-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: 0 8px 22px rgba(17, 24, 39, 0.045);
    }

    .record-tools {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
      padding: 10px;
    }

    .tool-row {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(0, 1fr);
      gap: 8px;
    }

    .record-tools input,
    .record-tools select {
      min-height: 42px;
      padding-top: 13px;
      font-size: 0.96rem;
    }

    .search-wrap input {
      padding-left: 34px;
    }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      width: 16px;
      height: 16px;
      color: var(--muted);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .insights-panel {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
      padding: 10px;
    }

    .insight-grid,
    .pb-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .insight-card,
    .pb-card {
      min-height: 58px;
      border: 1px solid var(--line);
      border-left: 3px solid #E5E7EB;
      border-radius: 6px;
      background: #ffffff;
      padding: 8px 9px;
    }

    .insight-card.primary {
      border-left-color: var(--track);
    }

    .insight-label,
    .pb-label,
    .record-count-note {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 900;
    }

    .insight-value,
    .pb-value {
      margin-top: 3px;
      color: var(--ink);
      font-size: 1.18rem;
      font-weight: 900;
      line-height: 1.05;
      font-variant-numeric: tabular-nums;
    }

    .insight-card.primary .insight-value {
      font-size: 1.3rem;
    }

    .insight-sub,
    .pb-sub {
      margin-top: 6px;
      color: #9CA3AF;
      font-size: 0.7rem;
      font-weight: 760;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .analysis-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .analysis-card {
      min-height: 112px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      padding: 9px;
      overflow: hidden;
    }

    .analysis-card.wide {
      grid-column: 1 / -1;
    }

    .analysis-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .analysis-title,
    .metric-label {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 900;
    }

    .analysis-value,
    .metric-value {
      color: var(--ink);
      font-size: 1.15rem;
      line-height: 1.05;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .analysis-sub {
      margin-top: 2px;
      color: #9CA3AF;
      font-size: 0.7rem;
      font-weight: 800;
    }

    .chart-wrap {
      position: relative;
      min-height: 96px;
    }

    .trend-chart {
      width: 100%;
      height: 88px;
      display: block;
    }

    .chart-tooltip {
      position: absolute;
      z-index: 2;
      max-width: 150px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.12);
      padding: 6px 8px;
      font-size: 0.72rem;
      font-weight: 900;
      line-height: 1.25;
      pointer-events: none;
      transform: translate(-50%, -112%);
      white-space: nowrap;
    }

    .chart-tooltip[hidden] {
      display: none;
    }

    .chart-tooltip strong,
    .chart-tooltip span {
      display: block;
    }

    .chart-tooltip span {
      margin-top: 2px;
      color: var(--muted);
      font-weight: 800;
    }

    .chart-axis {
      stroke: var(--line);
      stroke-width: 1;
    }

    .chart-line {
      fill: none;
      stroke: var(--track);
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 1;
      stroke-dashoffset: 1;
      animation: chart-draw 540ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .chart-area {
      fill: rgba(249, 115, 22, 0.12);
    }

    .chart-point {
      fill: #ffffff;
      stroke: var(--track);
      stroke-width: 1.8;
      cursor: pointer;
      opacity: 0.85;
      transition: opacity 160ms ease, r 160ms ease;
    }

    .chart-point:hover,
    .chart-point:focus {
      opacity: 1;
      outline: none;
    }

    .chart-point.last-point {
      transform-box: fill-box;
      transform-origin: center;
      animation: point-pop 420ms cubic-bezier(0.2, 0.8, 0.2, 1) 520ms both;
    }

    .streak-card .analysis-head {
      margin-bottom: 12px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .metric-tile {
      border-left: 3px solid #E5E7EB;
      padding-left: 8px;
      min-width: 0;
    }

    .metric-tile.highlight {
      border-left-color: var(--track);
    }

    .pb-badge {
      display: inline-grid;
      place-items: center;
      min-height: 18px;
      padding: 0 6px;
      border-radius: 999px;
      background: var(--track);
      color: #ffffff;
      font-size: 0.62rem;
      font-weight: 900;
      letter-spacing: 0;
    }

    .calendar-panel {
      margin-bottom: 10px;
      padding: 10px;
    }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .calendar-head strong {
      color: var(--ink);
      font-size: 0.92rem;
      font-weight: 900;
    }

    .calendar-head .icon-button {
      width: 30px;
      height: 30px;
      box-shadow: none;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 4px;
    }

    .calendar-weekday,
    .calendar-day {
      min-width: 0;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .calendar-weekday {
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 900;
      padding-bottom: 4px;
    }

    .calendar-day {
      display: grid;
      align-content: center;
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 900;
      background: transparent;
      transform: translate3d(0, 0, 0);
      transition: transform 140ms ease, border-color 140ms ease, color 140ms ease;
    }

    .calendar-day.has-run {
      border-color: var(--run-border, rgba(249, 115, 22, 0.2));
      background: var(--run-bg, var(--track-soft));
      color: var(--run-text, var(--ink));
      cursor: pointer;
    }

    .calendar-day.has-run:hover,
    .calendar-day.has-run:focus {
      transform: translate3d(0, -1px, 0);
      outline: none;
    }

    .calendar-day.calendar-press {
      animation: calendar-press 150ms ease-out both;
    }

    .calendar-grid.calendar-slide-next {
      animation: calendar-slide-next 230ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .calendar-grid.calendar-slide-prev {
      animation: calendar-slide-prev 230ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .calendar-day.today {
      border-color: var(--track);
      box-shadow: inset 0 0 0 2px var(--track);
      color: var(--ink);
    }

    .calendar-day .date {
      display: block;
      line-height: 1;
    }

    .calendar-day .distance {
      display: block;
      margin-top: 4px;
      color: var(--run-distance, var(--track));
      font-size: 0.66rem;
      white-space: nowrap;
    }

    .record-count-note {
      margin: 0 0 8px;
      text-align: right;
    }

    .record-list {
      display: grid;
      gap: 12px;
    }

    .record-card {
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: 0 8px 22px rgba(17, 24, 39, 0.065);
      overflow: hidden;
      transform: translate3d(0, 0, 0);
      transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
    }

    .record-card:hover {
      transform: translate3d(0, -5px, 0);
      border-color: rgba(249, 115, 22, 0.24);
      box-shadow: 0 18px 34px rgba(17, 24, 39, 0.14);
    }

    .record-card.record-card-enter {
      animation: record-card-enter 420ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .record-card::before {
      content: "";
      display: block;
      height: 4px;
      background: linear-gradient(90deg, var(--coral), var(--track) 66%, #F59E0B);
    }

    .record-card-head,
    .record-card-body {
      padding: 11px 12px;
    }

    .record-card-head {
      align-items: center;
      border-bottom: 0;
      background: #ffffff;
      padding-top: 7px;
      padding-bottom: 0;
    }

    .record-card-head > div:first-child {
      min-width: 0;
    }

    .record-card-actions {
      display: flex;
      flex: 0 0 auto;
      gap: 6px;
    }

    .record-card-actions .icon-button {
      width: 32px;
      height: 32px;
      border-color: var(--line);
      background: #ffffff;
      box-shadow: none;
    }

    .record-card-actions .icon-button:hover {
      border-color: rgba(249, 115, 22, 0.42);
      color: var(--track);
    }

    .record-card-actions .details-toggle {
      border-color: var(--ink);
      background: var(--ink);
      color: #ffffff;
    }

    .record-card-actions .details-toggle:hover,
    .record-card-actions .details-toggle.active {
      border-color: var(--track);
      background: var(--track);
      color: #ffffff;
    }

    .record-title {
      display: flex;
      align-items: center;
      gap: 7px;
      margin: 0;
      font-size: 0.98rem;
      line-height: 1.1;
      font-weight: 900;
    }

    .record-title::before {
      content: "";
      width: 4px;
      height: 13px;
      border-radius: 999px;
      background: var(--coral);
    }

    .record-card .record-meta {
      color: #9CA3AF;
      font-size: 0.73rem;
      font-weight: 800;
      line-height: 1.1;
    }

    .record-card-body {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 82px;
      gap: 10px;
      align-items: start;
      padding-top: 5px;
      background: #ffffff;
    }

    .record-card.no-image .record-card-body {
      grid-template-columns: 1fr;
    }

    .record-stats {
      display: grid;
      grid-template-columns: 1.25fr 0.9fr 0.95fr;
      gap: 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 7px 0;
    }

    .record-stat {
      min-height: 58px;
      border: 0;
      border-right: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      padding: 7px 10px 6px;
      box-shadow: none;
    }

    .record-stat:last-child {
      border-right: 0;
    }

    .record-stat:first-child {
      position: relative;
      overflow: hidden;
      background: transparent;
      color: var(--ink);
      box-shadow: none;
    }

    .record-stat:first-child::after {
      content: "";
      position: absolute;
      left: 10px;
      bottom: 2px;
      width: 58px;
      height: 3px;
      border: 0;
      border-radius: 50%;
      background: var(--track);
    }

    .record-stat:nth-child(3) {
      color: var(--ink);
    }

    .record-stat strong {
      position: relative;
      display: block;
      margin-top: 3px;
      font-size: 1rem;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .record-stat:first-child .record-mini {
      color: var(--muted);
    }

    .record-stat:first-child strong {
      color: var(--sky);
      font-size: 1.6rem;
      line-height: 1;
    }

    .record-extra {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .details-toggle svg {
      transition: transform 240ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .details-toggle.active svg {
      transform: rotate(180deg);
    }

    .record-detail-panel {
      display: grid;
      grid-template-rows: 0fr;
      margin-top: 0;
      border: 0 solid transparent;
      border-radius: var(--radius);
      background: #F9FAFB;
      padding: 0 10px;
      opacity: 0;
      overflow: hidden;
      transform: translateY(-4px);
      transition: grid-template-rows 280ms cubic-bezier(0.2, 0.8, 0.2, 1), margin-top 240ms ease-out, padding 240ms ease-out, opacity 220ms ease-out, transform 260ms ease-out, border-color 240ms ease-out;
    }

    .record-detail-panel.open {
      grid-template-rows: 1fr;
      margin-top: 12px;
      border-width: 1px;
      border-color: var(--line);
      padding: 10px;
      opacity: 1;
      transform: translateY(0);
    }

    .record-detail-body {
      display: grid;
      gap: 10px;
      padding-top: 0;
      overflow: hidden;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 220ms ease-out, transform 260ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .record-detail-panel.open .record-detail-body {
      opacity: 1;
      transform: translateY(0);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .detail-metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .detail-metric {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 6px;
      align-items: center;
      min-height: 40px;
      border-left: 2px solid #E5E7EB;
      background: #ffffff;
      padding: 7px 8px;
      color: var(--muted);
      font-weight: 900;
      font-size: 0.78rem;
    }

    .detail-icon {
      display: grid;
      width: 22px;
      height: 22px;
      place-items: center;
      color: #4B5563;
    }

    .detail-icon svg,
    .weather-icon svg {
      width: 18px;
      height: 18px;
    }

    .detail-icon svg [stroke],
    .weather-icon svg [stroke] {
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .detail-metric strong {
      display: block;
      color: var(--ink);
      font-size: 0.96rem;
      font-variant-numeric: tabular-nums;
    }

    .heart-panel {
      display: grid;
      gap: 8px;
      border-left: 4px solid var(--coral);
      border-radius: 6px;
      background: #ffffff;
      padding: 9px;
    }

    .heart-values {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .heart-value {
      min-height: 44px;
      border-top: 0;
      border-left: 3px solid rgba(239, 68, 68, 0.74);
      background: #ffffff;
      padding: 6px 8px;
    }

    .heart-value .record-mini {
      color: #9CA3AF;
      font-size: 0.72rem;
      font-weight: 800;
    }

    .heart-value strong {
      display: flex;
      align-items: baseline;
      gap: 4px;
      margin-top: 1px;
      color: var(--ink);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .heart-number {
      font-size: 1.42rem;
      font-weight: 900;
    }

    .heart-unit {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 900;
    }

    .zone-bars {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
      align-items: end;
      min-height: 74px;
      padding-top: 4px;
    }

    .zone-bar-item {
      display: grid;
      gap: 4px;
      align-content: end;
      min-width: 0;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 900;
      text-align: center;
    }

    .zone-bar-track {
      display: flex;
      align-items: end;
      height: 42px;
      border-radius: 3px;
      background: #E5E7EB;
      overflow: hidden;
    }

    .zone-bar-fill {
      width: 100%;
      min-height: 2px;
      border-radius: 3px 3px 0 0;
    }

    .weather-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      border-left: 3px solid #E5E7EB;
      border-radius: 6px;
      background: #ffffff;
      padding: 9px;
    }

    .weather-item {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 5px;
      align-items: center;
      min-width: 0;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .weather-icon {
      display: grid;
      width: 22px;
      height: 22px;
      place-items: center;
      color: #4B5563;
    }

    .weather-item strong {
      display: block;
      color: var(--ink);
      font-size: 0.84rem;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .record-notes {
      border-left: 3px solid rgba(249, 115, 22, 0.38);
      color: var(--muted);
      padding-left: 8px;
      font-size: 0.82rem;
      font-weight: 800;
      line-height: 1.45;
    }

    .list-actions {
      display: flex;
      flex-wrap: nowrap;
      justify-content: flex-end;
      gap: 6px;
      min-width: 0;
    }

    .list-actions .action-button {
      min-height: 38px;
      gap: 5px;
      padding: 0 8px;
      border-color: #F1F1F1;
      box-shadow: none;
      font-size: 0.88rem;
    }

    .empty-state {
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      padding: 18px;
      text-align: center;
      font-weight: 900;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      pointer-events: none;
      border-radius: 999px;
      background: #202124;
      color: #ffffff;
      padding: 10px 14px;
      font-size: 0.9rem;
      font-weight: 800;
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 10;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }

    .toast-action {
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      color: #ffffff;
      cursor: pointer;
      font-weight: 900;
      padding: 5px 9px;
    }

    .toast-action:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    html[data-theme="dark"] {
      --bg: #000000;
      --panel: #000000;
      --ink: #F9FAFB;
      --muted: #9CA3AF;
      --line: #26303B;
      --track-soft: rgba(249, 115, 22, 0.14);
      --sky: #F9FAFB;
      --sky-soft: #000000;
      --shadow: 0 16px 34px rgba(0, 0, 0, 0.34);
    }

    html[data-theme="dark"] .brand-mark,
    html[data-theme="dark"] .segmented button.active,
    html[data-theme="dark"] .app-tabs button.active,
    html[data-theme="dark"] .record-card-actions .details-toggle {
      background: #000000;
      color: #F9FAFB;
      box-shadow: inset 0 0 0 1px #F9FAFB;
    }

    html[data-theme="dark"] .panel,
    html[data-theme="dark"] .record-surface,
    html[data-theme="dark"] .section-head,
    html[data-theme="dark"] .record-card,
    html[data-theme="dark"] .record-card-head,
    html[data-theme="dark"] .record-card-body,
    html[data-theme="dark"] .record-tools,
    html[data-theme="dark"] .insights-panel,
    html[data-theme="dark"] .calendar-panel,
    html[data-theme="dark"] .insight-card,
    html[data-theme="dark"] .pb-card,
    html[data-theme="dark"] .analysis-card,
    html[data-theme="dark"] .heart-panel,
    html[data-theme="dark"] .heart-value,
    html[data-theme="dark"] .detail-metric,
    html[data-theme="dark"] .weather-row,
    html[data-theme="dark"] .icon-button,
    html[data-theme="dark"] .action-button,
    html[data-theme="dark"] input,
    html[data-theme="dark"] select,
    html[data-theme="dark"] textarea {
      background: #000000;
      color: var(--ink);
    }

    html[data-theme="dark"] .app-tabs,
    html[data-theme="dark"] .segmented,
    html[data-theme="dark"] .summary-band,
    html[data-theme="dark"] .converter-band,
    html[data-theme="dark"] .record-detail-panel,
    html[data-theme="dark"] .route-art,
    html[data-theme="dark"] .distance-unit {
      background: #000000;
    }

    html[data-theme="dark"] .split-band {
      background: #000000;
    }

    html[data-theme="dark"] .summary-item,
    html[data-theme="dark"] .split-item {
      background: #000000;
      border-color: var(--line);
    }

    html[data-theme="dark"] .calendar-day.has-run {
      background: #000000;
      border-color: var(--run-border, rgba(249, 115, 22, 0.34));
      color: var(--ink);
      box-shadow: inset 0 -3px 0 var(--run-distance, var(--track));
    }

    html[data-theme="dark"] .calendar-day.today {
      box-shadow: inset 0 0 0 2px var(--track);
    }

    html[data-theme="dark"] .record-card:hover {
      border-color: rgba(249, 115, 22, 0.34);
      box-shadow: 0 20px 36px rgba(0, 0, 0, 0.42);
    }

    html[data-theme="dark"] .record-card-actions .details-toggle:hover,
    html[data-theme="dark"] .record-card-actions .details-toggle.active {
      background: var(--track);
      border-color: var(--track);
      color: #ffffff;
    }

    html[data-theme="dark"] .icon-button:hover,
    html[data-theme="dark"] .action-button:hover {
      background: #000000;
      border-color: #374151;
    }

    html[data-theme="dark"] .chart-tooltip {
      background: #000000;
      border-color: #374151;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.34);
    }

    html[data-theme="dark"] .chart-point {
      fill: #000000;
    }

    html[data-theme="dark"] input:focus,
    html[data-theme="dark"] select:focus,
    html[data-theme="dark"] textarea:focus {
      border-color: #F9FAFB;
      box-shadow: 0 0 0 3px rgba(249, 250, 251, 0.12);
    }

    @media (min-width: 720px) {
      .app {
        padding-top: 28px;
      }

      .main-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 240px;
        gap: 14px;
        align-items: start;
      }

      .route-art {
        min-height: 100%;
        margin: 0;
      }

      .route-art svg {
        height: 100%;
        min-height: 358px;
      }

      .split-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .records-layout {
        gap: 24px;
        grid-template-columns: minmax(0, 1.04fr) minmax(300px, 0.96fr);
        align-items: start;
      }

      .list-head {
        margin-top: 0;
      }
    }

    @media (max-width: 420px) {
      .topbar {
        align-items: flex-start;
      }

      .segmented.two {
        width: 118px;
      }

      .top-actions {
        gap: 6px;
      }

      .theme-toggle {
        width: 38px;
        height: 38px;
      }

      .presets {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .list-head {
        align-items: center;
        gap: 6px;
      }

      .list-head .section-title {
        font-size: 0.95rem;
      }

      .list-head .section-title::before {
        flex-basis: 7px;
        width: 7px;
        height: 22px;
      }

      .list-actions {
        gap: 4px;
      }

      .list-actions .action-button {
        min-height: 38px;
        gap: 4px;
        padding: 0 7px;
        font-size: 0.84rem;
      }

      .list-actions .action-button svg {
        width: 16px;
        height: 16px;
      }

      .time-line,
      .converter-grid,
      .record-grid,
      .record-stats,
      .tool-row,
      .insight-grid,
      .pb-grid,
      .analysis-grid,
      .weather-row,
      .zone-grid,
      .weather-grid {
        grid-template-columns: 1fr 1fr;
      }

      .analysis-card.wide,
      .metric-grid {
        grid-column: 1 / -1;
      }

      .metric-grid {
        grid-template-columns: 1fr;
      }

      .time-line .input-wrap:first-child,
      .record-grid .wide,
      .record-grid .full-mobile {
        grid-column: 1 / -1;
      }

      .record-card-body {
        grid-template-columns: minmax(0, 1fr) 74px;
      }

      .record-distance-line {
        grid-template-columns: minmax(0, 1fr) 78px;
      }

      input,
      select {
        font-size: 1.04rem;
        padding-left: 8px;
        padding-right: 8px;
      }
    }

    @keyframes theme-wipe {
      0% {
        opacity: 1;
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes view-enter {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.985);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes view-exit {
      from {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      to {
        opacity: 0;
        transform: translateY(-8px) scale(0.992);
      }
    }

    @keyframes stat-bump {
      0% {
        transform: translateY(0) scale(1);
      }

      38% {
        transform: translateY(-3px) scale(1.08);
      }

      100% {
        transform: translateY(0) scale(1);
      }
    }

    @keyframes bonus-pop {
      0% {
        opacity: 0;
        transform: translateY(8px) scale(0.76);
      }

      18% {
        opacity: 1;
        transform: translateY(-4px) scale(1.16);
      }

      72% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translateY(-34px) scale(1);
      }
    }

    @keyframes chart-draw {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes point-pop {
      0% {
        opacity: 0.85;
        transform: scale(1);
        transform-box: fill-box;
        transform-origin: center;
      }

      46% {
        opacity: 1;
        transform: scale(1.55);
      }

      100% {
        opacity: 0.9;
        transform: scale(1);
      }
    }

    @keyframes calendar-press {
      0% {
        transform: scale(1);
      }

      45% {
        transform: scale(0.96);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes calendar-slide-next {
      from {
        opacity: 0;
        transform: translateX(10px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes calendar-slide-prev {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes record-card-enter {
      0% {
        opacity: 0;
        transform: translateY(-10px) scale(0.98);
      }

      54% {
        opacity: 1;
        transform: translateY(3px) scale(1.012);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>

  <script>
    const KM_PER_MILE = 1.609344;
    const CALC_STORAGE_KEY = "pace-calculator-state-v2";
    const RECORD_STORAGE_KEY = "pace-run-records-v1";
    const PREF_STORAGE_KEY = "pace-run-preferences-v1";
    const DEFAULT_CALC_STATE = {
      mode: "pace",
      unit: "km",
      distance: "5",
      hours: "0",
      minutes: "25",
      seconds: "0",
      paceMinutes: "5",
      paceSeconds: "0"
    };
    const DEFAULT_PREF_STATE = {
      theme: "light",
      search: "",
      surfaceFilter: "all",
      rangeFilter: "all",
      sort: "date-desc",
      calendarMonth: ""
    };

    const presetDistances = [
      { key: "one", labelKm: "1K", labelMi: "1 mi", km: 1, mi: 1 },
      { key: "five", labelKm: "5K", labelMi: "5K", km: 5 },
      { key: "ten", labelKm: "10K", labelMi: "10K", km: 10 },
      { key: "half", labelKm: "半馬", labelMi: "半馬", km: 21.0975 },
      { key: "full", labelKm: "全馬", labelMi: "全馬", km: 42.195 }
    ];

    const calcState = loadJson(CALC_STORAGE_KEY, DEFAULT_CALC_STATE);
    const prefState = { ...DEFAULT_PREF_STATE, ...loadJson(PREF_STORAGE_KEY, DEFAULT_PREF_STATE) };
    if (!prefState.calendarMonth) prefState.calendarMonth = monthKey(new Date());
    let records = loadJson(RECORD_STORAGE_KEY, []);
    let editingRecordId = null;
    let pendingSummaryBonus = null;
    let pendingNewRecordId = null;
    let pendingUndoDelete = null;
    let previousSummaryMetrics = null;
    let pendingCalendarMotion = "";
    const motionQuery = window.matchMedia("(prefers-reduced-motion: reduce)");

    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => [...document.querySelectorAll(selector)];

    const els = {
      views: {
        calculator: $("#calculatorView"),
        records: $("#recordsView")
      },
      viewButtons: $$("[data-view]"),
      modeButtons: $$("[data-mode]"),
      unitButtons: $$("[data-unit]"),
      themeToggle: $("#themeToggle"),
      distanceField: $("#distanceField"),
      timeField: $("#timeField"),
      paceField: $("#paceField"),
      distanceInput: $("#distanceInput"),
      hoursInput: $("#hoursInput"),
      minutesInput: $("#minutesInput"),
      secondsInput: $("#secondsInput"),
      paceMinutesInput: $("#paceMinutesInput"),
      paceSecondsInput: $("#paceSecondsInput"),
      distanceUnit: $("#distanceUnit"),
      timeLabel: $("#timeLabel"),
      paceLabel: $("#paceLabel"),
      presets: $("#presets"),
      resultKicker: $("#resultKicker"),
      resultMain: $("#resultMain"),
      resultUnit: $("#resultUnit"),
      resultSub: $("#resultSub"),
      splitGrid: $("#splitGrid"),
      copyButton: $("#copyButton"),
      resetButton: $("#resetButton"),
      clearDistance: $("#clearDistance"),
      useCalcButton: $("#useCalcButton"),
      converterPace: $("#converterPace"),
      converterSpeed: $("#converterSpeed"),
      converterPaceUnit: $("#converterPaceUnit"),
      converterSpeedUnit: $("#converterSpeedUnit"),
      clearConverterButton: $("#clearConverterButton"),
      summaryGrid: $("#summaryGrid"),
      recordForm: $("#recordForm"),
      recordFormTitle: $("#recordFormTitle"),
      newRecordButton: $("#newRecordButton"),
      recordDate: $("#recordDate"),
      recordTitle: $("#recordTitle"),
      recordSurface: $("#recordSurface"),
      recordDistance: $("#recordDistance"),
      recordUnit: $("#recordUnit"),
      recordDuration: $("#recordDuration"),
      recordPace: $("#recordPace"),
      recordKilometerPaces: $("#recordKilometerPaces"),
      recordCalories: $("#recordCalories"),
      recordHeartRate: $("#recordHeartRate"),
      recordMaxHeartRate: $("#recordMaxHeartRate"),
      recordCadence: $("#recordCadence"),
      recordZone1: $("#recordZone1"),
      recordZone2: $("#recordZone2"),
      recordZone3: $("#recordZone3"),
      recordZone4: $("#recordZone4"),
      recordZone5: $("#recordZone5"),
      recordTemperature: $("#recordTemperature"),
      recordHumidity: $("#recordHumidity"),
      recordWindSpeed: $("#recordWindSpeed"),
      recordWindDirection: $("#recordWindDirection"),
      recordNotes: $("#recordNotes"),
      parseTextButton: $("#parseTextButton"),
      ocrText: $("#ocrText"),
      saveRecordButton: $("#saveRecordButton"),
      backupButton: $("#backupButton"),
      importInput: $("#importInput"),
      exportButton: $("#exportButton"),
      recordSearch: $("#recordSearch"),
      recordSurfaceFilter: $("#recordSurfaceFilter"),
      recordRangeFilter: $("#recordRangeFilter"),
      recordSort: $("#recordSort"),
      volumeGrid: $("#volumeGrid"),
      pbGrid: $("#pbGrid"),
      analysisGrid: $("#analysisGrid"),
      calendarGrid: $("#calendarGrid"),
